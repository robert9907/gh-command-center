        // ── Copy to clipboard ──
        function copyHtml(){
          if(!aiPageHtml){alert("Build a page first.");return;}
          navigator.clipboard.writeText(aiPageHtml).then(function(){
            alert("✅ Full page HTML copied to clipboard  -  paste into Elementor Custom HTML widget");
          }).catch(function(){
            var ta = document.createElement("textarea");
            ta.value = aiPageHtml;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            alert("✅ Copied!");
          });
        }

        // ── Download HTML file ──
        function downloadHtml(){
          if(!aiPageHtml){alert("Build a page first.");return;}
          var slug = aiBlueprint && aiBlueprint.suggestedSlug ? aiBlueprint.suggestedSlug : "new-page";
          var blob = new Blob([aiPageHtml], {type:"text/html"});
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = slug + ".html";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }

        // ── Delete prompt ──
        function deletePrompt(id){
          if(!confirm("Delete this prompt?")) return;
          setAiPrompts(function(prev){return prev.filter(function(p){return p.id !== id;});});
          if(aiSelectedPrompt && aiSelectedPrompt.id === id){
            setAiSelectedPrompt(null);
            setAiBlueprint(null);
            setAiPageHtml("");
          }
          setHasChanges(true);
        }

        // ── Filtered prompts ──
        var filteredPrompts = aiPrompts.filter(function(p){
          if(aiFilter !== "all" && p.ageGroup !== aiFilter) return false;
          if(aiStatusFilter !== "all" && p.status !== aiStatusFilter) return false;
          return true;
        });

        // ── Stats ──
        var totalPrompts = aiPrompts.length;
        var newCount = aiPrompts.filter(function(p){return p.status === "new";}).length;
        var outlinedCount = aiPrompts.filter(function(p){return p.status === "outlined";}).length;
        var builtCount = aiPrompts.filter(function(p){return p.status === "built";}).length;
        var inBuilderCount = aiPrompts.filter(function(p){return p.status === "in-builder";}).length;
        var publishedCount = aiPrompts.filter(function(p){return p.status === "published";}).length;

        return (
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 116px)",overflow:"hidden"}}>
            
            {/* Header */}
            <div style={{padding:"12px 20px",borderBottom:bdr,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:isDark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)"}}>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <span style={{fontSize:18,fontWeight:800,color:tc}}>🤖 AI Prompt Intelligence</span>
                <div style={{display:"flex",gap:8}}>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:"rgba(96,165,250,0.12)",color:"#60A5FA",fontWeight:700}}>{totalPrompts} prompts</span>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:"rgba(251,146,60,0.12)",color:"#FB923C",fontWeight:700}}>{newCount} new</span>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:"rgba(167,139,250,0.12)",color:"#A78BFA",fontWeight:700}}>{outlinedCount} outlined</span>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:"rgba(74,222,128,0.12)",color:"#4ADE80",fontWeight:700}}>{builtCount} built</span>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:"rgba(59,130,246,0.12)",color:"#3B82F6",fontWeight:700}}>{inBuilderCount} in builder</span>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="password" placeholder="Claude API Key" value={aiApiKey} onChange={function(e){setAiApiKey(e.target.value);localStorage.setItem("gh-cc-pb-apikey",e.target.value);}}
                  style={{width:200,padding:"8px 12px",borderRadius:8,border:bdr,background:isDark?"rgba(255,255,255,0.04)":"#fff",color:tc,fontSize:12}} />
              </div>
            </div>

            {/* Main 3-column layout */}
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>
              
              {/* LEFT: Discovery + Prompt Database */}
              <div style={{width:320,borderRight:bdr,display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
                
                {/* Discovery Section */}
                <div style={{padding:16,borderBottom:bdr,flexShrink:0}}>
                  <div style={{fontSize:12,fontWeight:800,color:"#60A5FA",letterSpacing:".08em",marginBottom:10}}>PROMPT DISCOVERY</div>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    <input type="text" placeholder="Topic: Medicare turning 65, ACA self-employed..." value={aiDiscoverTopic} onChange={function(e){setAiDiscoverTopic(e.target.value);}}
                      style={{flex:1,padding:"10px 12px",borderRadius:10,border:bdr,background:isDark?"rgba(255,255,255,0.04)":"#fff",color:tc,fontSize:13}}
                      onKeyDown={function(e){if(e.key==="Enter")discoverPrompts();}} />
                    <button onClick={discoverPrompts} disabled={aiDiscovering}
                      style={{padding:"10px 16px",borderRadius:10,border:"none",background:aiDiscovering?"rgba(96,165,250,0.3)":"linear-gradient(135deg,#3B82F6,#60A5FA)",color:"#fff",fontSize:12,fontWeight:700,cursor:aiDiscovering?"wait":"pointer",whiteSpace:"nowrap"}}>
                      {aiDiscovering ? "..." : "🔍 Discover"}
                    </button>
                  </div>
                  
                  {/* Discovered prompts */}
                  {aiDiscoveredPrompts.length > 0 && (
                    <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                      {aiDiscoveredPrompts.sort(function(a,b){var order={A:0,B:1,C:2};return (order[a.score]||2)-(order[b.score]||2);}).map(function(p,i){
                        var scoreColor = p.score==="A"?"#4ADE80":p.score==="B"?"#FBBF24":"#6B7B8D";
                        return (
                          <div key={i} style={{padding:"10px 12px",borderRadius:10,background:p.score==="A"?"rgba(74,222,128,0.08)":(isDark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.02)"),border:p.score==="A"?"1px solid rgba(74,222,128,0.25)":bdr}}>
                            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
                              <span style={{fontSize:11,padding:"2px 6px",borderRadius:4,background:scoreColor+"20",color:scoreColor,fontWeight:800,flexShrink:0}}>{p.score==="A"?"🔥 A":p.score}</span>
                              <div style={{fontSize:12,color:tc,lineHeight:1.5,flex:1}}>"{p.prompt}"</div>
                            </div>
                            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:p.ageGroup==="medicare"?"rgba(74,222,128,0.15)":"rgba(96,165,250,0.15)",color:p.ageGroup==="medicare"?"#4ADE80":"#60A5FA",fontWeight:700}}>{p.ageGroup.toUpperCase()}</span>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"rgba(167,139,250,0.15)",color:"#A78BFA"}}>{p.intent}</span>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"rgba(251,146,60,0.15)",color:"#FB923C"}}>{p.geoLevel}</span>
                              {p.emotional && <span style={{fontSize:9}}>💭</span>}
                              <button onClick={function(){savePrompt(p);}} style={{marginLeft:"auto",fontSize:10,padding:"3px 8px",borderRadius:6,border:"none",background:"linear-gradient(135deg,#16A34A,#4ADE80)",color:"#fff",cursor:"pointer",fontWeight:700}}>+ Save</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                {/* Filters */}
                <div style={{padding:"10px 16px",borderBottom:bdr,display:"flex",gap:8,flexShrink:0}}>
                  <select value={aiFilter} onChange={function(e){setAiFilter(e.target.value);}} style={{flex:1,padding:"6px 10px",borderRadius:8,border:bdr,background:isDark?"rgba(255,255,255,0.04)":"#fff",color:tc,fontSize:11}}>
                    <option value="all">All Types</option>
                    <option value="medicare">Medicare 65+</option>
                    <option value="aca">ACA Under 65</option>
                  </select>
                  <select value={aiStatusFilter} onChange={function(e){setAiStatusFilter(e.target.value);}} style={{flex:1,padding:"6px 10px",borderRadius:8,border:bdr,background:isDark?"rgba(255,255,255,0.04)":"#fff",color:tc,fontSize:11}}>
                    <option value="all">All Status</option>
                    <option value="new">New</option>
                    <option value="outlined">Outlined</option>
                    <option value="built">Built</option>
                    <option value="in-builder">In Builder</option>
                    <option value="published">Published</option>
                  </select>
                </div>

                {/* Prompt List */}
                <div style={{flex:1,overflowY:"auto",padding:12}}>
                  {filteredPrompts.length === 0 ? (
                    <div style={{textAlign:"center",padding:40,color:mc}}>
                      <div style={{fontSize:32,marginBottom:12}}>🎯</div>
                      <div style={{fontSize:13}}>No prompts yet</div>
                      <div style={{fontSize:11,marginTop:4}}>Use Discovery to find decision-stage prompts</div>
                    </div>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {filteredPrompts.map(function(p){
                        var isSelected = aiSelectedPrompt && aiSelectedPrompt.id === p.id;
                        var statusColor = p.status === "new" ? "#FB923C" : p.status === "outlined" ? "#A78BFA" : p.status === "built" ? "#4ADE80" : p.status === "in-builder" ? "#3B82F6" : "#0D9488";
                        var scoreColor = p.score==="A"?"#4ADE80":p.score==="B"?"#FBBF24":"#6B7B8D";
                        return (
                          <div key={p.id} onClick={function(){setAiSelectedPrompt(p);if(p.blueprint)setAiBlueprint(p.blueprint);else setAiBlueprint(null);setAiPageHtml("");}}
                            style={{padding:"12px 14px",borderRadius:12,cursor:"pointer",background:isSelected?"rgba(96,165,250,0.12)":p.score==="A"?"rgba(74,222,128,0.06)":(isDark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.02)"),border:isSelected?"1.5px solid rgba(96,165,250,0.4)":p.score==="A"?"1px solid rgba(74,222,128,0.2)":bdr,transition:"all .12s"}}>
                            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                              <span style={{fontSize:10,padding:"2px 5px",borderRadius:4,background:scoreColor+"20",color:scoreColor,fontWeight:800,flexShrink:0}}>{p.score==="A"?"🔥A":p.score||"C"}</span>
                              <div style={{fontSize:12,color:tc,lineHeight:1.5,fontWeight:isSelected?600:400,flex:1}}>"{p.prompt}"</div>
                            </div>
                            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:p.ageGroup==="medicare"?"rgba(74,222,128,0.15)":"rgba(96,165,250,0.15)",color:p.ageGroup==="medicare"?"#4ADE80":"#60A5FA",fontWeight:700}}>{p.ageGroup.toUpperCase()}</span>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"rgba(167,139,250,0.15)",color:"#A78BFA"}}>{p.intent}</span>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:statusColor+"20",color:statusColor,fontWeight:700}}>{p.status.toUpperCase().replace("-"," ")}</span>
                              {p.status === "in-builder" && p.pbKey && (
                                <button onClick={function(e){e.stopPropagation();goToPageBuilder(p.pbKey);}} style={{fontSize:9,padding:"2px 8px",borderRadius:4,border:"1px solid rgba(59,130,246,0.3)",background:"transparent",color:"#3B82F6",cursor:"pointer",fontWeight:600}}>→ Page Builder</button>
                              )}
                              <button onClick={function(e){e.stopPropagation();deletePrompt(p.id);}} style={{marginLeft:"auto",fontSize:10,padding:"2px 6px",borderRadius:4,border:"1px solid rgba(248,113,113,0.3)",background:"transparent",color:"#F87171",cursor:"pointer"}}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              {/* CENTER: Blueprint Editor */}
              <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",borderRight:bdr}}>
                <div style={{padding:"12px 16px",borderBottom:bdr,flexShrink:0}}>
                  <div style={{fontSize:12,fontWeight:800,color:"#A78BFA",letterSpacing:".08em"}}>NEPQ BLUEPRINT</div>
                  <div style={{fontSize:11,color:mc,marginTop:2}}>{aiSelectedPrompt ? "Prompt selected  -  generate or edit blueprint" : "Select a prompt from the left panel"}</div>
                </div>
                
                {aiSelectedPrompt ? (
                  <div style={{flex:1,overflowY:"auto",padding:16}}>
                    {/* Selected prompt display */}
                    <div style={{padding:"14px 16px",borderRadius:12,background:isDark?"rgba(96,165,250,0.08)":"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.2)",marginBottom:16}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#60A5FA",marginBottom:6}}>SOURCE PROMPT</div>
                      <div style={{fontSize:14,color:tc,lineHeight:1.6}}>"{aiSelectedPrompt.prompt}"</div>
                    </div>
                    
                    {/* Generate button */}
                    {!aiBlueprint && (
                      <button onClick={function(){generateBlueprint(aiSelectedPrompt);}} disabled={aiBlueprintLoading}
                        style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:aiBlueprintLoading?"rgba(167,139,250,0.3)":"linear-gradient(135deg,#8B5CF6,#A78BFA)",color:"#fff",fontSize:14,fontWeight:700,cursor:aiBlueprintLoading?"wait":"pointer",marginBottom:16}}>
                        {aiBlueprintLoading ? "⏳ Generating Blueprint..." : "✨ Generate NEPQ Blueprint"}
                      </button>
                    )}
                    
                    {/* Blueprint display */}
                    {aiBlueprint && (
                      <div style={{display:"flex",flexDirection:"column",gap:16}}>
                        {/* H1 */}
                        <div style={{padding:16,borderRadius:12,background:isDark?"rgba(255,255,255,0.03)":"#fff",border:bdr}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#FB923C",marginBottom:8}}>H1 (PAIN/CONSEQUENCE)</div>
                          <div style={{fontSize:18,fontWeight:700,color:tc,lineHeight:1.4}}>{aiBlueprint.h1Line1}</div>
                          <div style={{fontSize:18,fontWeight:700,color:tc,lineHeight:1.4}}>{aiBlueprint.h1Line2}</div>

        // ── smartInsert  -  places snippet before semantic anchors, not at EOF ──
        function smartInsert(html,snippet){
          var anchors=['class="gh-faq"','class="gh-author"','class="gh-footer-trust"','</article>','</main>'];
          for(var i=0;i<anchors.length;i++){
            var pos=html.indexOf(anchors[i]);
            if(pos>-1){
              var tagStart=html.lastIndexOf('<',pos);
              if(tagStart>-1) return html.slice(0,tagStart)+"\n"+snippet+"\n"+html.slice(tagStart);
            }
          }
          return html+"\n"+snippet;
        }

        // ── replaceOrInsertTable  -  rips existing <table> and replaces in-place ──
        // Finds the first <table> in the content area, removes it (plus any wrapping
        // figure/div), and drops the gh-comparison HTML at that exact position.
        // Falls back to smartInsert if no native table is found.
        function replaceOrInsertTable(html,snippet){
          var contentStart=html.indexOf('<main');
          if(contentStart===-1) contentStart=html.indexOf('<article');
          if(contentStart===-1) contentStart=0;
          var searchRegion=html.slice(contentStart);
          var tStartRel=searchRegion.search(/<table[\s>]/i);
          if(tStartRel===-1) return smartInsert(html,snippet);
          var tStart=contentStart+tStartRel;
          // Walk back  -  check for wrapping <figure> or <div> within 300 chars
          var wrapStart=tStart;
          var pre=html.slice(Math.max(0,tStart-300),tStart).replace(/\s+$/,'');
          var wrapMatch=pre.match(/<(figure|div)[^>]*>\s*$/i);
          if(wrapMatch){
            var wt=wrapMatch[1].toLowerCase();
            var wpos=tStart-300+pre.lastIndexOf('<'+wt);
            if(wpos>=contentStart) wrapStart=wpos;
          }
          // Find closing </table>
          var tEndRel=searchRegion.toLowerCase().indexOf('</table>',tStartRel);
          if(tEndRel===-1) return smartInsert(html,snippet);
          var tEnd=contentStart+tEndRel+8; // 8 = '</table>'.length
          // Check for wrapper closing tag
          var replaceEnd=tEnd;
          if(wrapStart<tStart&&wrapMatch){
            var wt2=wrapMatch[1].toLowerCase();
            var after=html.slice(tEnd,tEnd+200);
            var closeIdx=after.toLowerCase().indexOf('</'+wt2+'>');
            if(closeIdx>-1&&closeIdx<80) replaceEnd=tEnd+closeIdx+wt2.length+3;
          }
          return html.slice(0,wrapStart)+"\n"+snippet+"\n"+html.slice(replaceEnd);
        }

          var prompts={

          };
          if(!prompts[checkId]||!apiKey) return null;

              method:"POST",
              headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
              body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompts[checkId]}]})
            });

        // ── cleanOrphanedContent  -  strips junk injected after footer by old Fix All ──
        function cleanOrphanedContent(html){
          var lower=html.toLowerCase();
          // Find the last occurrence of the footer container or closing tag
          var footerIdx=lower.lastIndexOf('class="gh-footer-trust"');
          if(footerIdx===-1) footerIdx=lower.lastIndexOf('</footer>');
          if(footerIdx===-1) return {html:html,cleaned:false,count:0};
          // Find the end of that footer tag/block  -  scan forward for its closing tag
          var searchFrom=footerIdx;
          var footerClose=-1;
          // Try to find </div> that closes gh-footer-trust, or </footer>
          var closeFooterDiv=html.indexOf('</footer>',searchFrom);
          var closeFooterDivAlt=html.indexOf('</div>',searchFrom+50); // skip the opening tag itself
          // Use whichever comes first and is valid
          if(closeFooterDiv>-1) footerClose=closeFooterDiv+'</footer>'.length;
          else if(closeFooterDivAlt>-1) footerClose=closeFooterDivAlt+'</div>'.length;
          else footerClose=footerIdx+200; // fallback: 200 chars past footer marker
          if(footerClose===-1||footerClose>=html.length) return {html:html,cleaned:false,count:0};
          var afterFooter=html.slice(footerClose);
          // Count orphaned block elements
          var orphanMatches=(afterFooter.match(/<(ol|ul|div|section|p)[\s>]/gi)||[]).length;
          if(orphanMatches===0) return {html:html,cleaned:false,count:0};
          // Strip everything after footer close, preserve only script tags needed for page function
          var cleaned=html.slice(0,footerClose);
          // Re-append any closing </body></html> if present
          var bodyClose=afterFooter.lastIndexOf('</body>');
          if(bodyClose>-1) cleaned+=afterFooter.slice(bodyClose);
          return {html:cleaned,cleaned:true,count:orphanMatches};
        }

        // ── resolvePageType: resolve [MEDICARE: X | ACA: Y] conditionals ──────────
        function resolvePageType(html, pageType) {
          if (!html) return html;
          // Pattern: [MEDICARE: content1 | ACA: content2]
          // Supports multi-line content and nested brackets in URLs
          var resolved = html;
          // Regex to match [MEDICARE: ... | ACA: ...]
          var pattern = /\[MEDICARE:\s*([^|]*?)\s*\|\s*ACA:\s*([^\]]*?)\]/gi;
          resolved = resolved.replace(pattern, function(match, medicareVal, acaVal) {
            return pageType === 'aca' ? acaVal.trim() : medicareVal.trim();
          });
          return resolved;
        }

        async function callAiAPI(prompt){
          var response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": aiApiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 4096,
              system: window.AI_SYSTEM_PROMPT,
              messages: [{ role: "user", content: prompt }]
            })
          });
          if (!response.ok) { var errData = await response.json(); throw new Error((errData.error && errData.error.message) || 'API failed'); }
          var txt = (await response.json()).content[0].text;
          // Strip markdown code blocks
          txt = txt.replace(/^```(?:html|json|javascript|js)?\n?/gm, '').replace(/\n?```$/gm, '').trim();
          // Wrap raw JSON-LD if needed
          if (txt.startsWith('{') && txt.includes('@context')) {
            var bc = 0, ei = 0;
            for (var i = 0; i < txt.length; i++) { if (txt[i] === '{') bc++; if (txt[i] === '}') bc--; if (bc === 0) { ei = i + 1; break; } }
            if (ei > 0) { txt = '<scr' + 'ipt type="application/ld+json">' + txt.substring(0, ei) + '</scr' + 'ipt>\n' + txt.substring(ei).trim(); }
          }
          return txt;
        }

        async function handleBuildFullPage(){
          if (!aiApiKey) { setShowAiKeyModal(true); return; }

          if (!pbPageType) { setAiError("Select a page type (Medicare/ACA/DUAL) first"); return; }

            var response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",

                "Content-Type": "application/json",
                "x-api-key": aiApiKey,

              },

              })
            });
            
            if (!response.ok) { 
              var errData = await response.json(); 
              throw new Error((errData.error && errData.error.message) || 'API failed'); 
            }
            
            var result = (await response.json()).content[0].text;
            
            // Strip markdown code blocks if present
            result = result.replace(/^```(?:html|json|javascript|js)?\n?/gm, '');
            result = result.replace(/\n?```$/gm, '');
            result = result.trim();
            
            // If output starts with raw JSON-LD (no script tag), wrap it
            if (result.startsWith('{') && result.includes('@context')) {
              var braceCount = 0;
              var jsonEndIndex = 0;
              for (var i = 0; i < result.length; i++) {
                if (result[i] === '{') braceCount++;
                if (result[i] === '}') braceCount--;
                if (braceCount === 0) { jsonEndIndex = i + 1; break; }
              }
              if (jsonEndIndex > 0) {
                var jsonPart = result.substring(0, jsonEndIndex);
                var restPart = result.substring(jsonEndIndex).trim();
                result = '<scr' + 'ipt type="application/ld+json">' + jsonPart + '</scr' + 'ipt>\n' + restPart;
              }
            }
            
            // Store as fullpage output
            setAiOutputs({ fullpage: result });
            setAiExpanded({ fullpage: true });
            
            // Also scan the generated content

            setPbScanResults(scanResult);
            
          } catch (err) {
            setAiError("Build failed: " + err.message);
            setAiOutputs({ fullpage: "ERROR: " + err.message });
          }

                          <><span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(0,0,0,0.2)",borderTopColor:"#1A2332",borderRadius:"50%",animation:"spin 1s linear infinite"}}></span>Building Page...</>
                        ):(
                          <>🚀 Build Full Page</>
                        )}
                      </button>
                      {!pbPageType&&pbPage&&<div style={{fontSize:10,color:"#F59E0B",marginBottom:8,textAlign:"center"}}>↑ Select page type first (Medicare/ACA/DUAL)</div>}
                      
                      {/* Generate Selected - Secondary action */}
                      <button onClick={handleAiGenerate} disabled={aiLoading||!pbPage}
                        style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(75,156,211,0.3)",
                          background:"transparent",
                          color:"#4B9CD3",fontSize:12,fontWeight:600,cursor:aiLoading||!pbPage?"not-allowed":"pointer",
                          display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {aiLoading?"...":"⚡ Generate Selected Components"}
                      </button>
                      
                      {!aiApiKey&&(
                        <button onClick={()=>setShowAiKeyModal(true)} style={{width:"100%",marginTop:8,padding:"8px",borderRadius:8,border:"1px solid rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.1)",color:"#F87171",fontSize:11,cursor:"pointer"}}>
                          ⚠️ Set API Key
                        </button>
                      )}
                    </div>
                    
                    {Object.keys(aiOutputs).length>0&&(
                      <div style={{borderTop:bdr,maxHeight:"40%",overflowY:"auto"}}>
                        <div style={{padding:"8px 12px",fontSize:11,fontWeight:700,color:tc,borderBottom:bdr,background:isDark?"rgba(0,0,0,0.2)":"rgba(0,0,0,0.03)"}}>
                          Generated Content {aiOutputs.fullpage&&<span style={{color:"#4ADE80",marginLeft:8}}>✓ Full Page</span>}
                        </div>
                        {Object.keys(aiOutputs).map(function(id){
                          var content=aiOutputs[id];
                          var feature=window.AI_FEATURES.find(function(f){return f.id===id;});
                          var label = id === "fullpage" ? "🚀 Complete Page HTML" : (feature ? feature.label : id);
                          return(
                            <div key={id} style={{borderBottom:bdr}}>
                              <div onClick={()=>setAiExpanded(function(prev){var n=Object.assign({},prev);n[id]=!n[id];return n;})}
                                style={{padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:isDark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)"}}>
                                <span style={{fontSize:12,fontWeight:600,color:id==="fullpage"?"#FFC72C":tc}}>{label}</span>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <button onClick={function(e){e.stopPropagation();navigator.clipboard.writeText(content);e.target.textContent="✓ Copied";setTimeout(function(){e.target.textContent="Copy";},1500);}}
                                    style={{fontSize:10,padding:"3px 10px",borderRadius:6,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(74,222,128,0.1)",color:"#4ADE80",cursor:"pointer"}}>
                                    Copy
                                  </button>
                                  <span style={{fontSize:14,color:mc}}>{aiExpanded[id]?"▼":"▶"}</span>
                                </div>
                              </div>
                              {aiExpanded[id]&&(
                                <div style={{padding:"0 12px 12px"}}>
                                  <pre style={{fontSize:11,lineHeight:1.5,color:mc,whiteSpace:"pre-wrap",wordBreak:"break-word",background:isDark?"rgba(0,0,0,0.2)":"rgba(0,0,0,0.05)",padding:12,borderRadius:8,maxHeight:id==="fullpage"?400:250,overflowY:"auto"}}>
                                    {content}
                                  </pre>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ) : (
                  /* ═══ ORIGINAL CONTENT PANEL ═══ */
                  <>
                <div style={{padding:"10px 12px",borderBottom:bdr,flexShrink:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:tc}}>Content Panel</div>
                  <div style={{fontSize:11,color:mc,marginTop:1}}>
                    {(()=>{const z=ZONES.find(x=>x.id===(pbActiveZone||"z1"));return z?z.label+" \u2014 "+z.desc+(pbActiveZone?" activated":" loading..."):"Loading zones...";})()} 
                  </div>
                </div>

                {(pbActiveZone||pageHtml)?(
                  <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                    <div style={{display:"flex",borderBottom:bdr,flexShrink:0}}>
                      {[{id:"medicare",label:"MEDICARE"},{id:"aca",label:"ACA"},{id:"nepq",label:"NEPQ"}].map(t=>(
                        <button key={t.id} onClick={()=>{setPbActiveTab(t.id);setPbSelectedCard(null);}}
                          style={{flex:1,padding:"8px 0",border:"none",background:"transparent",
                            color:pbActiveTab===t.id?(isDark?"#fff":"#1A2332"):mc,
                            fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:".06em",
                            borderBottom:pbActiveTab===t.id?"2px solid #4B9CD3":"2px solid transparent"}}>
                          {t.label}</button>
                      ))}
                    </div>
                    <div style={{flex:1,overflowY:"auto",padding:8}}>
                      {tabCards.map(card=>(
                        <div key={card.id} onClick={()=>setPbSelectedCard(card.id)}
                          style={{padding:"11px",borderRadius:10,marginBottom:6,cursor:"pointer",
                            background:pbSelectedCard===card.id?"rgba(75,156,211,0.14)":(isDark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.02)"),
                            border:`1.5px solid ${pbSelectedCard===card.id?"rgba(75,156,211,0.45)":"rgba(255,255,255,0.06)"}`,transition:"all .12s"}}>
                          <div style={{fontSize:10,fontWeight:800,letterSpacing:".1em",color:"#0D9488",marginBottom:2}}>{card.tag}</div>
                          <div style={{fontSize:11,color:mc,marginBottom:4,fontStyle:"italic"}}>{card.tagline}</div>
                          <div style={{fontSize:12,fontWeight:700,color:isDark?"#E8ECF0":"#1A2332",marginBottom:4,lineHeight:1.5}}>&ldquo;{card.q}&rdquo;</div>
                          <div style={{fontSize:11,lineHeight:1.6,color:mc}}>{card.a}</div>
                        </div>
                      ))}
                    </div>
                    {pbSelectedCard&&(
                      <div style={{padding:"8px 10px",borderTop:bdr,flexShrink:0}}>
                        <button onClick={applyCard}
                          style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#0D9488,#14B8A6)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                          ✓ Apply to {(ZONES.find(z=>z.id===pbActiveZone)||{}).label||pbActiveZone.toUpperCase()}</button>
                        {pbZoneApplied[pbActiveZone]&&<div style={{display:"flex",gap:8,marginTop:6,justifyContent:"center"}}>
                          <span style={{fontSize:11,color:"#FFC72C"}}>Replaces existing</span>
                          <button onClick={()=>{setPbZoneApplied(prev=>{var n=Object.assign({},prev);delete n[pbActiveZone];return n;});setTimeout(()=>{var ifrEl=document.querySelector('iframe[title="Page Preview"]');if(ifrEl&&ifrEl.contentWindow){ifrEl.contentWindow.postMessage({type:'gh-pb-zone-update',zoneId:pbActiveZone,applied:Object.assign({},pbZoneApplied,{[pbActiveZone]:undefined})},'*');}},50);}}
                            style={{fontSize:11,color:"#F87171",background:"none",border:"1px solid rgba(248,113,113,0.3)",borderRadius:6,padding:"2px 8px",cursor:"pointer"}}>✕ Clear zone</button>
                        </div>}
                      </div>
                    )}
                    {!pbSelectedCard&&pbActiveZone&&pbZoneApplied[pbActiveZone]&&(
                      <div style={{padding:"8px 10px",borderTop:bdr,flexShrink:0,textAlign:"center"}}>
                        <div style={{fontSize:11,color:"#4ADE80",marginBottom:6}}>✓ {pbZoneApplied[pbActiveZone].tag} applied</div>
                        <button onClick={()=>{setPbZoneApplied(prev=>{var n=Object.assign({},prev);delete n[pbActiveZone];return n;});setTimeout(()=>{var ifrEl=document.querySelector('iframe[title="Page Preview"]');if(ifrEl&&ifrEl.contentWindow){ifrEl.contentWindow.postMessage({type:'gh-pb-zone-update',zoneId:pbActiveZone,applied:Object.assign({},pbZoneApplied,{[pbActiveZone]:undefined})},'*');}},50);}}
                          style={{fontSize:11,color:"#F87171",background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:600}}>✕ Remove from {(ZONES.find(z=>z.id===pbActiveZone)||{}).label}</button>
                      </div>
                    )}
                  </div>
                ):(
                  <div style={{flex:1,overflowY:"auto",padding:"10px 10px"}}>
                    <div style={{fontSize:11,color:mc,textAlign:"center",marginBottom:10}}>
                      {pbPage&&pageHtml?"👆 Click any colored zone on the page":"Select a page and fetch HTML to begin"}
                    </div>
                    {ZONES.map(z=>(
                      <div key={z.id} onClick={()=>{setPbActiveZone(z.id);setPbSelectedCard(null);}}
                        style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",borderRadius:8,marginBottom:3,cursor:"pointer",
                          background:isDark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.02)",
                          border:bdr,transition:"all .12s"}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:z.color,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:11,fontWeight:700,color:tc}}>{z.label}</div>
                          <div style={{fontSize:10,color:mc}}>{z.desc}</div>
                        </div>
                        {pbZoneApplied[z.id]&&<div style={{fontSize:10,color:"#16A34A",fontWeight:800}}>✓</div>}
                      </div>
                    ))}
                    {/* Mark complete */}
                    {pbPage&&pageHtml&&(
                      <button onClick={()=>{setPbCompleted(prev=>prev.includes(pbPage.key)?prev:[...prev,pbPage.key]);setPbPage(null);setPbScanResults(null);setPbZoneApplied({});setPbApproved(false);setHasChanges(true);}}
                        style={{width:"100%",marginTop:8,padding:"9px",borderRadius:10,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(74,222,128,0.08)",color:"#4ADE80",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                        ✓ Mark Complete</button>
                    )}
                  </div>
                )}
                  </>
                )}
              </div>

            </div>
          </div>
        );
      })()}

      {/* Save HTML / Scan HTML modals */}
      {scanTarget && <ScanModal onScan={handleScan} onClose={()=>setScanTarget(null)} initialHTML={savedHTML[scanTarget.clusterId+"-"+scanTarget.postIdx]||""} />}
      {saveTarget && <ScanModal onScan={handleSaveOnly} onClose={()=>setSaveTarget(null)} initialHTML={savedHTML[saveTarget.clusterId+"-"+saveTarget.postIdx]||""} saveOnly={true} />}

      {/* AI API Key Modal */}
      {showAiKeyModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
          <div style={{background:isDark?"#1A2840":"#fff",borderRadius:16,padding:32,width:420,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <h3 style={{fontSize:18,fontWeight:700,color:isDark?"#E8ECF0":"#1A2332",marginBottom:8}}>🔑 Anthropic API Key</h3>
            <p style={{fontSize:13,color:"#6B7B8D",marginBottom:20,lineHeight:1.6}}>
              Your key is stored locally in your browser.<br/>
              Get yours at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{color:"#4B9CD3"}}>console.anthropic.com</a>
            </p>
            <input type="password" id="aiKeyInput" defaultValue={aiApiKey} placeholder="sk-ant-api..."
              style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid "+(isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)"),background:isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.03)",color:isDark?"#E8ECF0":"#1A2332",fontSize:14,marginBottom:20,outline:"none"}}/>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setShowAiKeyModal(false)}
                style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+(isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)"),background:"transparent",color:"#6B7B8D",fontSize:14,fontWeight:600,cursor:"pointer"}}>
                Cancel
              </button>
              <button onClick={()=>{var k=document.getElementById("aiKeyInput").value;if(k){localStorage.setItem("gh-cc-pb-apikey",k);setAiApiKey(k);}setShowAiKeyModal(false);}}
                style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#4B9CD3,#0D9488)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                Save Key
              </button>
            </div>
            {aiApiKey&&(
              <button onClick={()=>{localStorage.removeItem("gh-cc-pb-apikey");setAiApiKey("");}}
                style={{width:"100%",marginTop:12,padding:"10px",borderRadius:8,border:"1px solid rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.1)",color:"#F87171",fontSize:12,cursor:"pointer"}}>
                Remove Saved Key
              </button>
            )}
          </div>
        </div>
      )}

    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
<script async data-explicit-opt-in="true" data-deployment-id="dpl_6ZeVBHb3ZKE4Y7tf2mvBJi3Cqgca" src="https://vercel.live/_next-live/feedback/feedback.js"></script>
