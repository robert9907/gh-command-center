/* ═══ COMPREHENSIVE LIGHT MODE TEXT OVERRIDES ═══ */
/* Override dark-mode text colors via style attribute selectors + !important */
/* These catch ALL inline styles set by React, regardless of which tab/component */

/* Primary white text (#FFF) → dark */
body.light [style*="color: rgb(255, 255, 255)"] { color: #1A2332 !important; }

/* Body text (#E8ECF0 = rgb(232,236,240)) → dark gray */
body.light [style*="color: rgb(232, 236, 240)"] { color: #2D3748 !important; }

/* Soft text (#C4CDD5 = rgb(196,205,213)) → medium dark */
body.light [style*="color: rgb(196, 205, 213)"] { color: #4A5568 !important; }

/* Muted text (#6B7B8D = rgb(107,123,141)) → medium */
body.light [style*="color: rgb(107, 123, 141)"] { color: #718096 !important; }

/* Faint text (#4B5C6E = rgb(75,92,110)) → light gray */
body.light [style*="color: rgb(75, 92, 110)"] { color: #A0AEC0 !important; }

/* Gold muted (#A08C5A = rgb(160,140,90)) → darker gold */

/* Override dark-mode backgrounds for cards/panels */

body.light [style*="background: rgba(255, 255, 255, 0.1"] { background: rgba(0,0,0,0.04) !important; }

/* Override dark borders */
body.light [style*="border: 1px solid rgba(255, 255, 255"] { border-color: rgba(0,0,0,0.1) !important; }
body.light [style*="border-bottom: 1px solid rgba(255, 255, 255"] { border-bottom-color: rgba(0,0,0,0.1) !important; }
body.light [style*="border-top: 1px solid rgba(255, 255, 255"] { border-top-color: rgba(0,0,0,0.1) !important; }

/* Override dark solid backgrounds */
body.light [style*="background: rgb(26, 40, 64)"] { background: #FFFFFF !important; }
body.light [style*="background: rgb(30, 45, 68)"] { background: #FFFFFF !important; }

/* Override dark overlay backgrounds */
body.light [style*="background: rgba(0, 0, 0, 0.15)"] { background: rgba(0,0,0,0.03) !important; }
body.light [style*="background: rgba(0, 0, 0, 0.2)"] { background: rgba(0,0,0,0.04) !important; }
body.light [style*="background: rgba(0, 0, 0, 0.3)"] { background: rgba(0,0,0,0.05) !important; }

/* Override dark gold backgrounds to lighter version */
body.light [style*="background: rgba(255, 199, 44, 0.0"] { background: rgba(212,160,23,0.06) !important; }
body.light [style*="background: rgba(255, 199, 44, 0.1"] { background: rgba(212,160,23,0.08) !important; }

/* Override gold borders in light mode */
body.light [style*="border: 1px solid rgba(255, 199, 44"] { border-color: rgba(212,160,23,0.2) !important; }

/* Override blue backgrounds */
body.light [style*="background: rgba(75, 156, 211"] { background: rgba(75,156,211,0.08) !important; }

/* SVG strokes in light mode */
body.light svg [stroke="rgb(107, 123, 141)"], body.light svg [stroke="#6B7B8D"] { stroke: #718096; }

/* Override scrollbar for light mode */
body.light ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); }
body.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
body.light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

// ACA swap function - supports full template injection or surgical swap
// mode: "full" = generate complete ACA template (default for new pages)
//       "surgical" = swap hero/NEPQ/links only (legacy, for existing pages with good body content)
window.ghApplyACASwap = function(html, slug, mode) {
  mode = mode || "full"; // default to full template
  
  // FULL TEMPLATE MODE: Generate complete ACA page
  if (mode === "full" && window.ghBuildFullACATemplate) {
    // Extract original title if present
    var titleMatch = html ? html.match(/<title>([^<]+)<\/title>/i) : null;
    var originalTitle = titleMatch ? titleMatch[1].replace(/\s*\|\s*GenerationHealth.*$/i, '').trim() : null;
    return window.ghBuildFullACATemplate(slug, originalTitle);
  }
  
  // SURGICAL MODE: Swap only hero, NEPQ, and links (legacy fallback)
  if (!html) return html;
  var variant = window.ghGetACAVariant(slug);
  
  // 1. Replace hero section
  var heroRegex = /<section[^>]*class="[^"]*gh-hero[^"]*"[^>]*>[\s\S]*?<\/section>/i;
  if (heroRegex.test(html)) {
    html = html.replace(heroRegex, window.ghBuildACAHero(variant));
  }
  
  // 2. Replace Medicare NEPQ section with ACA NEPQ
  var nepqRegex = /<div[^>]*class="[^"]*gh-nepq[^"]*"[^>]*>[\s\S]*?<\/div>\s*<\/div>\s*<\/div>/i;
  if (nepqRegex.test(html)) {
    html = html.replace(nepqRegex, window.GH_ACA_NEPQ_HTML);
  }
  
  // 3. Replace SunFire Matrix links with HealthSherpa
  html = html.replace(/https:\/\/www\.sunfirematrix\.com\/app\/consumer\/medicareadvocates\/10447418\/#\//g, window.GH_HEALTHSHERPA_URL);
  html = html.replace(/https:\/\/www\.sunfirematrix\.com\/app\/consumer\/medicareadvocates\/10447418\//g, window.GH_HEALTHSHERPA_URL);
  
  // 4. Replace "Medicare" references in CTAs with "ACA" where appropriate
  html = html.replace(/Compare Medicare Plans/gi, "Check Your Subsidy");
  html = html.replace(/Get Your Free Medicare Assessment/gi, "Get Your Free ACA Assessment");
  html = html.replace(/Medicare Advantage, Medigap, Part D/gi, "ACA Marketplace plans");
  
  // 5. Update author card title
  html = html.replace(/Licensed Medicare Broker/gi, "Licensed Health Insurance Advisor");
  
  // 6. Update disclaimers
  html = html.replace(/Medicare\.gov/g, "Healthcare.gov");
  html = html.replace(/1-800-MEDICARE/g, "1-800-318-2596");
  
  return html;
};

          b.style.background = 'rgba(255,255,255,.06)'; 
          b.style.borderColor = 'rgba(255,255,255,.15)';

          this.style.background = 'rgba(13,148,136,.25)';

        } else {
          this.style.background = '#f0fdf4';
          this.style.borderColor = '#22c55e';

            var result = quiz.querySelector('.gh-quiz-result');

window.extractGHContent = function(html) {
  if (!html || html.length < 500) return html;
  // Find GH template boundaries
  var startMarker = html.indexOf('class="gh-header"');
  if (startMarker === -1) startMarker = html.indexOf("class='gh-header'");
  if (startMarker === -1) return html; // no GH template found, return as-is
  // Back up to the opening < of the header tag
  var startTag = html.lastIndexOf('<', startMarker);
  if (startTag === -1) return html;
  // Find end boundary: .gh-footer-trust closing tag
  var endMarker = html.indexOf('class="gh-footer-trust"');
  if (endMarker === -1) endMarker = html.indexOf("class='gh-footer-trust'");
  if (endMarker === -1) {
    // Fallback: find last </footer>
    endMarker = html.lastIndexOf('</footer>');
    if (endMarker === -1) return html;
    var endPos = endMarker + '</footer>'.length;
  } else {
    // Find the closing </footer> after the marker
    var afterMarker = html.indexOf('</footer>', endMarker);
    if (afterMarker > -1) {
      var endPos = afterMarker + '</footer>'.length;
    } else {
      // Fallback: find next major closing block after marker
      var endDiv = html.indexOf('</div>', endMarker + 200);
      var endPos = endDiv > -1 ? endDiv + '</div>'.length : html.length;
    }
  }
  // Extract the GH content
  var extracted = html.slice(startTag, endPos);
  // Preserve ALL <style> blocks from the page (theme CSS, inline styles, WPCode CSS)
  var styles = [];
  var styleRx = /<style[^>]*>[\s\S]*?<\/style>/gi;
  var styleMatch;
  while ((styleMatch = styleRx.exec(html)) !== null) {
    styles.push(styleMatch[0]);
  }
  var styleBlock = styles.length > 0 ? styles.join('\n') + '\n' : '';
  // Also preserve JSON-LD schema blocks from <head>
  var schemas = [];
  var schemaRx = /<script\s+type="application\/ld\+json"[^>]*>[\s\S]*?<\/script>/gi;
  var schemaMatch;
  while ((schemaMatch = schemaRx.exec(html)) !== null) {
    schemas.push(schemaMatch[0]);
  }
  var schemaBlock = schemas.length > 0 ? schemas.join('\n') + '\n' : '';
  // Preserve font links and preconnects
  var headLinks = '';
  var linkRx = /<link[^>]*(?:fonts\.googleapis\.com|fonts\.gstatic\.com|preconnect)[^>]*>/gi;
  var linkMatch;
  while ((linkMatch = linkRx.exec(html)) !== null) {
    headLinks += linkMatch[0] + '\n';
  }
  return headLinks + styleBlock + schemaBlock + extracted;

.gh-formula{background:linear-gradient(135deg,var(--teal-50),#dcfce7);border-left:4px solid var(--teal-500);border-radius:var(--r-lg);padding:26px 30px;margin:36px 0;max-width:var(--prose);}

.gh-formula-eq{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--midnight);line-height:1.5;margin-bottom:10px;}
.gh-formula p{font-size:14px;line-height:1.7;color:var(--teal-700);margin:0;max-width:none;}


/* ════════════════════════
   CTA MODAL
   NC blue gradient
   ════════════════════════ */
.gh-cta-modal{background:linear-gradient(135deg,var(--nc-blue) 0%,#003D73 60%,#002B54 100%);border-radius:var(--r-2xl);padding:52px 44px;margin:56px 0;position:relative;overflow:hidden;}
.gh-cta-modal::before{content:"";position:absolute;top:-20%;right:-10%;width:50%;height:80%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-cta-hd{text-align:center;margin-bottom:36px;position:relative;z-index:2;}
.gh-cta-hd h2{font-family:var(--font-display);font-size:clamp(22px,2.8vw,30px);font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-cta-hd p{color:rgba(255,255,255,.78) !important;font-size:15px;margin:0;max-width:none;}
.gh-cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;position:relative;z-index:2;}
/* Glassmorphism cards with shimmer sweep */
.gh-cta-card{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.04));backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--r-xl);padding:32px 28px;position:relative;overflow:hidden;transition:border-color 300ms var(--ease),box-shadow 300ms var(--ease);}
.gh-cta-card::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 5s ease-in-out infinite;}
.gh-cta-card:nth-child(2)::after{animation-delay:2.5s;}
.gh-cta-card:hover{border-color:rgba(255,255,255,.3);box-shadow:0 0 0 1px rgba(75,156,211,.25),0 8px 32px rgba(0,0,0,.2);}
.gh-cta-card h3{font-family:var(--font-display);font-size:20px;font-weight:600;color:#fff !important;margin:0 0 8px;}
.gh-cta-card>p{font-size:14px;color:rgba(255,255,255,.72) !important;line-height:1.6;margin-bottom:20px !important;max-width:none;}
/* Ghost buttons with shimmer sweep */
.gh-ghost{display:block;text-align:center;padding:14px 24px;border-radius:var(--r-full);font-family:var(--font-body);font-size:15px;text-decoration:none !important;margin-bottom:8px;border:1.5px solid rgba(255,255,255,.32);background:transparent;color:#fff !important;font-weight:600;transition:all 280ms var(--ease);position:relative;overflow:hidden;}
.gh-ghost::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-15deg);animation:ghSweep 3.5s ease-in-out infinite;}
.gh-ghost:last-child{margin-bottom:0;}
.gh-ghost--primary{background:rgba(255,255,255,.1) !important;font-weight:700;}
.gh-ghost--primary::before{animation-delay:.2s;}
.gh-ghost--call::before{animation-delay:.5s;}
.gh-ghost--text::before{animation-delay:1s;}
.gh-ghost--sched::before{animation-delay:1.5s;}
.gh-ghost--call:hover{background:rgba(22,163,74,.3) !important;border-color:rgba(22,163,74,.6) !important;}
.gh-ghost--text:hover{background:rgba(139,92,246,.3) !important;border-color:rgba(139,92,246,.6) !important;}
.gh-ghost--sched:hover{background:rgba(245,158,11,.3) !important;border-color:rgba(245,158,11,.6) !important;}
.gh-ghost--compare:hover{background:rgba(75,156,211,.3) !important;border-color:var(--carolina) !important;}
.gh-ghost-sub{display:block;font-size:11px;margin-top:2px;color:rgba(255,255,255,.55) !important;font-weight:400;}


/* ════════════════════════
   DECISION SCENARIO CARDS
   3-card color-coded
   ════════════════════════ */
.gh-scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:32px 0;}
.gh-scenario{border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--sh-md);transition:transform 250ms var(--ease);}
.gh-scenario:hover{transform:translateY(-3px);}
.gh-scenario-hd{padding:20px 22px 14px;position:relative;overflow:hidden;}
.gh-scenario-hd::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 7s ease-in-out infinite;}
.gh-scenario-hd--blue{background:linear-gradient(135deg,#00529B,#003D73);}
.gh-scenario-hd--green{background:linear-gradient(135deg,#065F46,#047857);}
.gh-scenario-hd--purple{background:linear-gradient(135deg,#4C1D95,#5B21B6);}
.gh-scenario-hd--teal{background:linear-gradient(135deg,#0F766E,#0D9488);}
.gh-scenario-hd--amber{background:linear-gradient(135deg,#92400E,#B45309);}
.gh-scenario-badge{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);margin-bottom:8px;}
.gh-scenario-hd h4{font-family:var(--font-display);font-size:17px;font-weight:700;color:#fff !important;margin:0;}
.gh-scenario-body{background:var(--white);border:1.5px solid rgba(0,0,0,.07);border-top:none;border-radius:0 0 var(--r-xl) var(--r-xl);padding:20px 22px;}
.gh-scenario-body p{font-size:13px;line-height:1.65;color:var(--charcoal);margin-bottom:12px;max-width:none;}
.gh-verdict{padding:10px 14px;border-radius:var(--r-md);font-size:12px;font-weight:700;color:var(--midnight);}
.gh-verdict--blue{background:var(--blue-50);}
.gh-verdict--green{background:#F0FDF4;}
.gh-verdict--purple{background:#F5F3FF;}
.gh-verdict--teal{background:var(--teal-50);}
.gh-verdict--amber{background:var(--amber-50);}


/* ════════════════════════
   HOW-TO STEPS
   Dark gradient, shimmer
   ════════════════════════ */
.gh-howto{background:linear-gradient(135deg,var(--blue-800),var(--blue-900));border-radius:var(--r-2xl);padding:48px;margin:44px 0;position:relative;overflow:hidden;}
.gh-howto::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-howto-hd{text-align:center;margin-bottom:36px;position:relative;z-index:2;}
.gh-howto-hd h3{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff !important;margin:0 0 6px;}
.gh-howto-hd p{color:rgba(255,255,255,.72) !important;font-size:15px;margin:0;max-width:none;}
/* Use 4 or 5 steps — adjust grid-template-columns accordingly */
.gh-steps-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;position:relative;z-index:2;}
.gh-steps-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;position:relative;z-index:2;}
.gh-step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:26px 20px;position:relative;overflow:hidden;}
.gh-step::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 4s ease-in-out infinite;}
.gh-step:nth-child(2)::before{animation-delay:.8s;}
.gh-step:nth-child(3)::before{animation-delay:1.6s;}
.gh-step:nth-child(4)::before{animation-delay:2.4s;}
.gh-step:nth-child(5)::before{animation-delay:3.2s;}
.gh-step-num{width:38px;height:38px;border-radius:50%;background:rgba(255,199,44,.2);border:1.5px solid rgba(255,199,44,.5);color:var(--nc-gold);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 0 14px;}
.gh-step h4{font-size:14px;font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-step p{font-size:12px;color:rgba(255,255,255,.68) !important;line-height:1.6;margin:0;max-width:none;}


/* ════════════════════════
   2-COL CARDS
   ════════════════════════ */
.gh-2col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:28px 0;}
.gh-col-card{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh-md);}
.gh-col-card h4{font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:14px;}
.gh-col-list{list-style:none;margin:0 !important;padding:0 !important;}
.gh-col-list li{padding:7px 0 7px 20px !important;position:relative;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px !important;line-height:1.6 !important;color:var(--charcoal) !important;}
.gh-col-list li:last-child{border-bottom:none;}
.gh-col-list li::before{content:"\\2192" !important;position:absolute;left:0;color:var(--carolina);font-size:12px;top:8px !important;width:auto !important;height:auto !important;background:none !important;border-radius:0 !important;}


/* ════════════════════════
   TIMING / ENROLLMENT GRID
   ════════════════════════ */
.gh-timing{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0;}
.gh-timing-card{background:var(--snow);border:1.5px solid rgba(0,0,0,.07);border-radius:var(--r-lg);padding:20px 18px;box-shadow:var(--sh-sm);}
.gh-timing-card.urgent{border-color:var(--error);background:linear-gradient(135deg,#FEF2F2,var(--white));}
.gh-timing-window{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--carolina);margin-bottom:5px;}
.gh-timing-card.urgent .gh-timing-window{color:var(--error);}
.gh-timing-dates{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:7px;}
.gh-timing-card p{font-size:12px;line-height:1.6;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   BAR CHART INFOGRAPHIC
   ════════════════════════ */
.gh-chart{background:linear-gradient(135deg,var(--snow),var(--white));border-radius:var(--r-2xl);padding:56px 48px;margin:64px 0;box-shadow:var(--sh-xl);border:1px solid rgba(0,0,0,.06);}
.gh-chart-header{text-align:center;margin-bottom:40px;}
.gh-chart-header h3{font-family:var(--font-display);font-size:26px;font-weight:600;margin:0 0 8px;color:var(--midnight);}
.gh-chart-header p{font-size:15px;color:var(--slate);margin:0;max-width:none;}
.gh-bar{margin-bottom:16px;padding:24px 28px;background:var(--white);border-radius:var(--r-xl);border:1px solid rgba(0,0,0,.05);box-shadow:var(--sh-xs);transition:transform var(--dur-normal) var(--ease),box-shadow var(--dur-normal);}
.gh-bar:hover{transform:translateY(-2px);box-shadow:var(--sh-sm);}
.gh-bar-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.gh-bar-title{font-size:16px;font-weight:600;color:var(--midnight);}
.gh-bar-pct{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--midnight);}
.gh-bar-desc{font-size:13px;color:var(--slate);margin-bottom:16px;}
.gh-bar-track{width:100%;height:8px;background:var(--cloud);border-radius:var(--r-full);overflow:hidden;}
.gh-bar-fill{height:100%;border-radius:var(--r-full);}
.gh-bar-fill--blue{background:linear-gradient(90deg,#3B82F6,#60A5FA,#93C5FD);}
.gh-bar-fill--green{background:linear-gradient(90deg,#0D9488,#2DD4BF,#5EEAD4);}
.gh-bar-fill--amber{background:linear-gradient(90deg,#D97706,#FBBF24,#FCD34D);}
.gh-bar-fill--purple{background:linear-gradient(90deg,#7C3AED,#A78BFA,#C4B5FD);}
.gh-chart-source{margin-top:28px;padding:16px 24px;background:var(--blue-50);border-radius:var(--r-md);border-left:4px solid var(--carolina);}
.gh-chart-source p{font-size:13px;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   COMPARISON TABLE
   ════════════════════════ */
.gh-comparison{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:48px 0;}
.gh-comparison-card{background:var(--snow);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:32px 28px;box-shadow:var(--sh-md);}
.gh-comparison-card h3{margin:0 0 20px;padding-bottom:16px;border-bottom:3px solid var(--carolina);font-family:var(--font-display);font-size:22px;}
.gh-comp-item{padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.gh-comp-item:last-child{border-bottom:none;}
.gh-comp-label{font-weight:600;font-size:12px;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.gh-comp-value{font-size:15px;line-height:1.5;color:var(--charcoal);}


/* ════════════════════════
   TESTIMONIAL
   ════════════════════════ */
.gh-testimonial{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:36px;margin:48px 0;max-width:var(--prose);box-shadow:var(--sh-md);position:relative;}
.gh-testimonial::before{content:'\\201C';position:absolute;top:-8px;left:24px;font-size:72px;color:var(--carolina);opacity:.2;font-family:Georgia,serif;line-height:1;}
.gh-testimonial blockquote{font-style:italic;font-size:16px;line-height:1.75;color:var(--charcoal);margin-bottom:16px;}
.gh-testimonial-author{font-size:14px;font-weight:600;color:var(--slate);}
.gh-testimonial-link{margin-top:12px;font-size:14px;}


/* ════════════════════════
   TRUST LADDER
   4 steps, dark gradient
   ════════════════════════ */
.gh-ladder{background:linear-gradient(135deg,var(--blue-800),var(--blue-900));border-radius:var(--r-2xl);padding:48px;margin:56px 0;position:relative;overflow:hidden;}
.gh-ladder::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-ladder-hd{text-align:center;margin-bottom:40px;position:relative;z-index:2;}
.gh-ladder-hd h3{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-ladder-hd p{color:rgba(255,255,255,.72) !important;font-size:15px;margin:0;max-width:520px;margin-left:auto;margin-right:auto;}
.gh-ladder-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;position:relative;z-index:2;}
.gh-ladder-step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:26px 20px;text-align:center;}
.gh-ladder-step:first-child{border-radius:var(--r-xl) 0 0 var(--r-xl);}
.gh-ladder-step:last-child{border-radius:0 var(--r-xl) var(--r-xl) 0;}
.gh-ladder-num{width:38px;height:38px;border-radius:50%;background:rgba(75,156,211,.25);border:1.5px solid rgba(75,156,211,.5);color:var(--carolina);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.gh-ladder-title{font-weight:700;font-size:14px;color:#fff;margin-bottom:7px;}
.gh-ladder-desc{font-size:12px;color:rgba(255,255,255,.62);line-height:1.6;}


/* ════════════════════════
   TRUST STRIP — 3 badges
   ════════════════════════ */
.gh-trust-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:56px 0;}
.gh-trust-badge{background:var(--snow);border:1px solid rgba(0,0,0,.08);border-radius:var(--r-lg);padding:28px 20px;text-align:center;box-shadow:var(--sh-sm);transition:transform var(--dur-normal) var(--ease);}
.gh-trust-badge:hover{transform:translateY(-2px);}
.gh-trust-badge-icon{font-size:28px;margin-bottom:10px;}
.gh-trust-badge h4{font-family:var(--font-body);font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:4px;}
.gh-trust-badge p{font-size:13px;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   SAVINGS PROGRAMS GRID
   ════════════════════════ */
.gh-programs{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:28px 0;}
.gh-program-card{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh-md);position:relative;overflow:hidden;transition:transform 200ms var(--ease),box-shadow 200ms;}
.gh-program-card::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(75,156,211,.06),transparent);transform:skewX(-15deg);transition:left 500ms var(--ease);}
.gh-program-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.gh-program-card:hover::before{left:150%;}
.gh-program-icon{font-size:28px;margin-bottom:10px;}
.gh-program-card h4{font-size:16px;font-weight:700;color:var(--midnight);margin:0 0 8px;}
.gh-program-card p{font-size:13px;line-height:1.65;color:var(--charcoal);margin:0 0 12px;max-width:none;}
.gh-program-limit{display:inline-block;padding:4px 12px;border-radius:var(--r-full);font-size:11px;font-weight:700;background:var(--blue-50);color:var(--carolina);}


/* ════════════════════════
   RELATED LINKS
   ════════════════════════ */
.gh-related{background:var(--snow);border:1px solid rgba(0,0,0,.07);border-radius:var(--r-2xl);padding:40px;margin:56px 0;}
.gh-related>h3{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--midnight);margin:0 0 24px;}
.gh-related-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.gh-rlink{display:flex;align-items:center;gap:7px;padding:10px 14px;background:var(--white);border:1px solid rgba(0,0,0,.06);border-radius:var(--r-md);font-size:14px;font-weight:500;color:var(--charcoal);text-decoration:none;transition:all 180ms var(--ease);}
.gh-rlink::before{content:"\\2192";color:var(--carolina);font-size:12px;flex-shrink:0;}
.gh-rlink:hover{color:var(--carolina);border-color:var(--carolina);}
.gh-county-hd{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--carolina);margin:24px 0 12px;padding-top:24px;border-top:1px solid var(--mist);}
.gh-county-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.gh-clink{display:flex;align-items:center;gap:5px;padding:9px 12px;background:var(--white);border:1px solid rgba(0,0,0,.06);border-radius:var(--r-md);font-size:13px;font-weight:600;color:var(--carolina);text-decoration:none;transition:all 180ms var(--ease);}
.gh-clink:hover{background:var(--blue-50);border-color:var(--carolina);}
.gh-clink::before{content:"\\1F4CD";font-size:10px;}


/* ════════════════════════
   AUTHOR CARD
   ════════════════════════ */
.gh-author{max-width:920px;margin:64px auto 32px;border:1px solid rgba(0,0,0,.08);border-radius:var(--r-xl);background:var(--white);box-shadow:var(--sh-lg);overflow:hidden;}
.gh-author-header{background:linear-gradient(135deg,var(--blue-600),var(--blue-700));color:#fff;padding:40px 36px;text-align:center;}
.gh-author-header h2{font-family:var(--font-display);font-size:26px;font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-author-header p{font-size:15px;color:rgba(255,255,255,.9) !important;margin:0 0 6px;max-width:none;}
.gh-author-stars{display:inline-block;margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.18);border-radius:var(--r-sm);font-size:14px;color:#fff;}
.gh-author-contact-row{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:14px;font-size:14px;}
.gh-author-contact-row a{color:#fff !important;}
.gh-author-body{padding:40px 36px;}
.gh-author-body h3{font-family:var(--font-body);font-size:20px;font-weight:700;color:var(--blue-600);padding-bottom:10px;border-bottom:3px solid var(--blue-600);margin:0 0 16px;}
.gh-author-body p{font-size:15px;line-height:1.65;color:var(--charcoal);margin-bottom:14px;max-width:none;}
.gh-contact-box{background:var(--snow);padding:24px;border-radius:var(--r-md);margin:24px 0;}
.gh-contact-box h3{font-size:17px;margin-bottom:12px;border-bottom:none !important;padding-bottom:0 !important;}
.gh-contact-box p{font-size:14px;margin:0 0 8px;}
.gh-contact-box a{color:var(--carolina);font-weight:600;}
.gh-hours-box{background:var(--blue-50);padding:20px 24px;border-radius:var(--r-md);border-left:4px solid var(--blue-600);margin:24px 0;}
.gh-hours-box h3{font-size:17px;margin-bottom:12px;border-bottom:none !important;padding-bottom:0 !important;}
.gh-hours-box p{font-size:14px;margin:0 0 8px;}
.gh-license-box{background:#FEF3C7;padding:18px 22px;border-radius:var(--r-md);border-left:4px solid var(--amber-500);margin:24px 0;}
.gh-license-box p{font-size:14px;margin:0;}

/* ════════════════════════

   ════════════════════════ */
.gh-faq{margin:72px 0;max-width:var(--prose);}
.gh-faq-title{font-family:var(--font-display);font-size:clamp(26px,3vw,34px);font-weight:600;color:var(--midnight);margin-bottom:8px;}

/* ════════════════════════

.gh-float-call{display:none;position:fixed;bottom:24px;right:24px;z-index:999;width:60px;height:60px;border-radius:50%;background:var(--success);color:#fff;border:none;box-shadow:0 6px 24px rgba(22,163,74,.4);cursor:pointer;align-items:center;justify-content:center;transition:transform var(--dur-normal) var(--ease),box-shadow var(--dur-normal);text-decoration:none;}

.gh-float-call svg{width:26px;height:26px;}

.gh-nepq{margin:64px 0;}

.gh-nepq-total-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:600;}

.gh-nepq-total-val--mg{color:#8b5cf6;}
.gh-nepq-total-val--opt{color:#d97706;}
.gh-nepq-note{font-size:10px;color:#94a3b8;margin:16px 0 0;text-align:center;line-height:1.5;}

.gh-nepq-pivot p{font-size:17px;color:#64748b;margin:0 0 8px;}

/* ════════════════════════════════════════════════════════════
   ACA NEPQ SECTION STYLES
   Use on ACA pages only (PAGE-TYPE: ACA)
   Matches Medicare NEPQ visual language with ACA-specific content
   ════════════════════════════════════════════════════════════ */

.gh-aca-nepq{margin:64px 0;}

.gh-aca-nepq-intro{text-align:center;padding:48px 24px 32px;background:#fff;}
.gh-aca-nepq-intro h2{font-family:var(--font-display);font-size:clamp(28px,4vw,36px);font-weight:700;color:#0f172a;margin:0 0 12px;line-height:1.2;}
.gh-aca-nepq-intro p{font-size:18px;color:#64748b;margin:0 0 32px;max-width:680px;margin-left:auto;margin-right:auto;}

/* Part 1: Subsidy Reality Check */
.gh-aca-subsidy{background:#fff;border-radius:24px;padding:40px 36px;box-shadow:0 1px 2px rgba(0,0,0,0.03),0 4px 12px rgba(0,0,0,0.04),0 16px 40px rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);margin:0 0 32px;}
.gh-aca-subsidy-hd{text-align:center;margin-bottom:32px;}
.gh-aca-subsidy-hd h3{font-size:22px;font-weight:700;color:#0f172a;margin:0 0 8px;}
.gh-aca-subsidy-hd p{font-size:14px;color:#64748b;margin:0;}

.gh-aca-subsidy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px;}
.gh-aca-subsidy-card{border-radius:16px;padding:24px;text-align:center;position:relative;overflow:hidden;transition:transform 200ms var(--ease);}
.gh-aca-subsidy-card:hover{transform:translateY(-2px);}
.gh-aca-subsidy-card::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.12),transparent);transform:skewX(-15deg);animation:ghSweep 6s ease-in-out infinite;}
.gh-aca-subsidy-card:nth-child(2)::after{animation-delay:2s;}
.gh-aca-subsidy-card:nth-child(3)::after{animation-delay:4s;}

.gh-aca-subsidy-card--eligible{background:linear-gradient(135deg,#059669,#10b981);border:2px solid rgba(16,185,129,0.3);}
.gh-aca-subsidy-card--partial{background:linear-gradient(135deg,#d97706,#f59e0b);border:2px solid rgba(245,158,11,0.3);}
.gh-aca-subsidy-card--cliff{background:linear-gradient(135deg,#dc2626,#ef4444);border:2px solid rgba(239,68,68,0.3);}

.gh-aca-subsidy-income{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:8px;}
.gh-aca-subsidy-amount{font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff;margin-bottom:4px;}
.gh-aca-subsidy-label{font-size:13px;color:rgba(255,255,255,.85);font-weight:500;}
.gh-aca-subsidy-note{font-size:11px;color:rgba(255,255,255,.6);margin-top:8px;line-height:1.4;}

.gh-aca-subsidy-fpl{display:flex;justify-content:center;gap:24px;padding:16px 0;border-top:1px solid #f4f4f5;flex-wrap:wrap;}
.gh-aca-subsidy-fpl span{font-size:12px;color:#64748b;}
.gh-aca-subsidy-fpl strong{color:#0f172a;}

/* Part 2: Total Cost Trap */
.gh-aca-trap{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-radius:24px;padding:48px 36px;margin:0 0 32px;position:relative;overflow:hidden;}
.gh-aca-trap::before{content:"";position:absolute;top:-20%;right:-10%;width:50%;height:80%;background:radial-gradient(ellipse,rgba(245,158,11,.08) 0%,transparent 70%);pointer-events:none;}

.gh-aca-trap-hd{text-align:center;margin-bottom:36px;position:relative;z-index:2;}
.gh-aca-trap-hd h3{font-family:var(--font-display);font-size:clamp(22px,2.8vw,28px);font-weight:700;color:#fff;margin:0 0 8px;}
.gh-aca-trap-hd p{font-size:15px;color:rgba(255,255,255,.65);margin:0;}

.gh-aca-trap-scenario{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;position:relative;z-index:2;}
.gh-aca-trap-card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 24px;position:relative;overflow:hidden;transition:border-color 300ms var(--ease),box-shadow 300ms var(--ease);}
.gh-aca-trap-card::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);transform:skewX(-15deg);animation:ghSweep 7s ease-in-out infinite;}
.gh-aca-trap-card:nth-child(2)::after{animation-delay:2.3s;}
.gh-aca-trap-card:nth-child(3)::after{animation-delay:4.6s;}
.gh-aca-trap-card:hover{border-color:rgba(255,255,255,.25);box-shadow:0 8px 32px rgba(0,0,0,.3);}

.gh-aca-trap-card--bronze{border-color:rgba(180,83,9,.4);}
.gh-aca-trap-card--silver{border-color:rgba(100,116,139,.4);}
.gh-aca-trap-card--csr{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.08);}

.gh-aca-trap-badge{display:inline-block;padding:4px 12px;border-radius:var(--r-full);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.gh-aca-trap-badge--bronze{background:rgba(180,83,9,.2);color:#fbbf24;}
.gh-aca-trap-badge--silver{background:rgba(100,116,139,.2);color:#cbd5e1;}
.gh-aca-trap-badge--csr{background:rgba(16,185,129,.2);color:#34d399;}

.gh-aca-trap-card h4{font-family:var(--font-display);font-size:17px;font-weight:700;color:#fff;margin:0 0 16px;}

.gh-aca-trap-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.gh-aca-trap-row:last-of-type{border-bottom:none;padding-top:12px;margin-top:4px;border-top:2px solid rgba(255,255,255,.15);}
.gh-aca-trap-label{font-size:13px;color:rgba(255,255,255,.6);}
.gh-aca-trap-val{font-size:14px;font-weight:600;color:#fff;}
.gh-aca-trap-val--total{font-size:20px;font-weight:800;}
.gh-aca-trap-val--bronze{color:#fbbf24;}
.gh-aca-trap-val--silver{color:#cbd5e1;}
.gh-aca-trap-val--csr{color:#34d399;}

.gh-aca-trap-verdict{margin-top:16px;padding:12px 16px;border-radius:var(--r-md);font-size:12px;font-weight:600;text-align:center;}
.gh-aca-trap-verdict--bad{background:rgba(239,68,68,.15);color:#fca5a5;}
.gh-aca-trap-verdict--ok{background:rgba(100,116,139,.15);color:#94a3b8;}
.gh-aca-trap-verdict--best{background:rgba(16,185,129,.2);color:#34d399;}

.gh-aca-trap-note{text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,.45);line-height:1.5;}

/* ACA Warning Box */
.gh-aca-warning{margin-top:32px;background:linear-gradient(135deg,#fef3c7,#fef9c3);border:2px solid #f59e0b;border-radius:16px;padding:24px;display:flex;align-items:flex-start;gap:16px;}

    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSaveHTML(key, html) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(html, key);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB save failed:", key, e); return false; }
}

async function idbLoadHTML(key) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => { db.close(); resolve(req.result || null); };
      req.onerror = () => { db.close(); reject(req.error); };
    });
  } catch(e) { console.error("IDB load failed:", key, e); return null; }
}

async function idbLoadAllHTML() {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const store = tx.objectStore(IDB_STORE);
      const allKeys = store.getAllKeys();
      const allVals = store.getAll();
      tx.oncomplete = () => {
        db.close();
        const map = {};
        for (let i = 0; i < allKeys.result.length; i++) {
          map[allKeys.result[i]] = allVals.result[i];
        }
        resolve(map);
      };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB loadAll failed:", e); return {}; }
}

async function idbClearAllHTML() {

// Migrate old savedHTML from v1 localStorage blob into IndexedDB (one-time)
async function migrateHTMLtoIDB() {
  try {
    const old = localStorage.getItem(SKEY);
    if (!old) return 0;
    const d = JSON.parse(old);
    if (!d.savedHTML || Object.keys(d.savedHTML).length === 0) return 0;
    let count = 0;
    for (const [k,v] of Object.entries(d.savedHTML)) {
      if (v && v.length > 100) { await idbSaveHTML(k, v); count++; }
    }
    // Remove savedHTML from the old blob to free localStorage space
    delete d.savedHTML;
    try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch(e) {}
    console.log("Migrated " + count + " HTML pages from localStorage to IndexedDB");
    return count;
  } catch(e) { console.error("HTML→IDB migration failed:", e); return 0; }
}

const PRIORITY_ORDER = ["Very High","High","Medium-High","Medium"];
function getPriorityScore(cluster) {
  const seo = PRIORITY_ORDER.indexOf(cluster.seoValue);
  const aeo = PRIORITY_ORDER.indexOf(cluster.aeoValue);

}

// Uses CORS proxies since CC runs from local file / different origin
const GH_BASE = "https://generationhealth.me/";

async function fetchWithTimeout(url, ms=20000) {
  // Use a race between fetch and a timeout promise
  // (Avoids AbortSignal issues in sandboxed iframe environments)
  return Promise.race([
    fetch(url, { headers: { "Accept": "text/html,*/*" } }),
    new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout after " + ms + "ms")), ms))
  ]);
}

async function fetchPageHTML(slug) {
  if (!slug) return null;
  const fullURL = slug.startsWith("http") ? slug : `${GH_BASE}${slug}/`;
  console.log("[GH Fetch] Starting fetch for:", fullURL);

  // Detect if running inside a sandboxed iframe (e.g. Claude.ai artifact preview)
  const inSandbox = window.self !== window.top;
  if (inSandbox) {
    console.warn("[GH Fetch] Running in sandboxed iframe  -  network requests may be blocked. Download the file and open in a regular browser tab for full fetch functionality.");
  }

  // Strategy 0: WordPress REST API  -  often has CORS headers enabled
  // Fetches rendered content via WP's built-in API
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/pages?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const pages = await resp.json();
      if (pages.length > 0 && pages[0].content && pages[0].content.rendered) {
        const rendered = pages[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST pages:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST pages failed:", e.message); }

  // Also try posts endpoint (in case page is a post type)
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/posts?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const posts = await resp.json();
      if (posts.length > 0 && posts[0].content && posts[0].content.rendered) {
        const rendered = posts[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST posts:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST posts failed:", e.message); }

  // Strategy 1: Direct fetch (works if CC is hosted on same domain or CORS enabled)
  try {
    const resp = await fetchWithTimeout(fullURL, 10000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ Direct fetch:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] Direct failed:", e.message); }

  // Strategy 2: allorigins (most reliable free CORS proxy)
  try {
    const resp = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) {
      const data = await resp.json();
      if (data.contents && data.contents.length > 500) { console.log("[GH Fetch] ✓ allorigins:", slug, Math.round(data.contents.length/1024)+"KB"); return data.contents; }
    }
  } catch(e) { console.log("allorigins failed:", e.message); }

  // Strategy 3: corsproxy.io
  try {
    const resp = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ corsproxy.io:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] corsproxy.io failed:", e.message); }

  // Strategy 4: cors-anywhere (Heroku demo)
  try {
    const resp = await fetchWithTimeout(`https://cors-anywhere.herokuapp.com/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ cors-anywhere:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] cors-anywhere failed:", e.message); }

  // Strategy 5: thingproxy
  try {
    const resp = await fetchWithTimeout(`https://thingproxy.freeboard.io/fetch/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ thingproxy:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] thingproxy failed:", e.message); }

  console.error("[GH Fetch] ✗ ALL strategies failed for:", slug);
  return null;
}

// Fetch + scan + store a single page
async function fetchAndScanPage(slug, clusterId, postIdx, setSavedHTML, setDone, setNotes, setLastScanResults, setHasChanges) {
  const html = await fetchPageHTML(slug);
  if (!html) return { success: false, error: "Could not fetch page" };
  const scanKey = `${clusterId}-${postIdx}`;
  const prefix = `op-${clusterId}-${postIdx}`;
  const results = scanHTML(html);

  // Store HTML
  setSavedHTML(prev => ({ ...prev, [scanKey]: html }));

  // Auto-check/uncheck based on scan
  const scannable = ["opt-instant","opt-faq","opt-citations","opt-author","opt-charts","opt-graphics","opt-tables","opt-fresh","opt-junk","opt-functional","elem-preflight"];
  setDone(prev => {
    const next = { ...prev };
    scannable.forEach(k => {
      const key = `${prefix}-${k}`;
      if (results[k]) next[key] = Date.now();
      else delete next[key];
    });
    return next;
  });

  // Store scan results & notes
  setLastScanResults(prev => ({ ...prev, [scanKey]: results }));
  setNotes(prev => {
    const next = { ...prev };
    if (results["opt-citations-detail"]) next[`${prefix}-opt-citations`] = "Scan: " + results["opt-citations-detail"];
    if (results["opt-fresh-detail"]) next[`${prefix}-opt-fresh`] = "Scan: " + results["opt-fresh-detail"];
    if (results["opt-tables-detail"]) next[`${prefix}-opt-tables`] = "Scan: " + results["opt-tables-detail"];
    if (results["opt-junk-detail"]) next[`${prefix}-opt-junk`] = "Scan: " + results["opt-junk-detail"];
    if (results["opt-functional-detail"]) next[`${prefix}-opt-functional`] = "Scan: " + results["opt-functional-detail"];
    if (results["elem-preflight-detail"]) next[`${prefix}-elem-preflight`] = results["elem-preflight-detail"];
    if (results["opt-graphics-detail"]) next[`${prefix}-opt-graphics`] = "Scan: " + results["opt-graphics-detail"];
    if (results["opt-charts-detail"]) next[`${prefix}-opt-charts`] = "Scan: " + results["opt-charts-detail"];
    if (results["opt-instant-detail"]) next[`${prefix}-opt-instant`] = "Scan: " + results["opt-instant-detail"];
    return next;
  });
  setHasChanges(true);
  return { success: true, size: html.length, results };
}

function scanHTML(html) {
  const results = {};
  const lower = html.toLowerCase();
  const doc = new DOMParser().parseFromString(html, "text/html");

  // Detect partial WP REST content (no full HTML doc  -  just body content)
  const isPartial = !lower.includes("<!doctype") && !lower.includes("<html");

  // ── 1. FAQ SCHEMA ─────────────────────────────────────────────────────────
  // v5.1: FAQPage lives in @graph in <head>. WP REST strips <head>.
  // Fallback: detect .gh-faq-item accordion (always in rendered body).
  let hasFAQ = false, hasArticle = false;
  if (!isPartial) {
    const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
    scripts.forEach(s => {
      try {
        const j = JSON.parse(s.textContent);
        const check = (obj) => {
          if (!obj) return;
          if (obj["@type"] === "FAQPage") hasFAQ = true;
          if (["Article","NewsArticle","BlogPosting","WebPage","MedicalWebPage"].includes(obj["@type"])) hasArticle = true;
          if (Array.isArray(obj["@graph"])) obj["@graph"].forEach(check);
        };
        check(j);
      } catch(e) {}
    });
  }
  // v5.1 FAQ accordion  -  present in WP REST rendered content
  const faqItems = doc.querySelectorAll(".gh-faq-item, .gh-faq-list, .gh-faq");
  if (faqItems.length >= 1) hasFAQ = true;
  if (lower.includes("faqpage") || lower.includes('"faq"')) hasFAQ = true;
  if (!isPartial && (lower.includes("medicalwebpage") || lower.includes('"article"'))) hasArticle = true;
  if (isPartial && faqItems.length >= 1) hasArticle = true;
  results["opt-faq"] = hasFAQ;
  results["opt-article-schema"] = hasArticle;

  // ── 2. .GOV CITATIONS ─────────────────────────────────────────────────────
  // v5.1 footer always has medicare.gov + ncdoi.gov. WP REST strips footer.
  // Count both link hrefs AND text mentions for partial content.
  const links = doc.querySelectorAll("a[href]");
  let govLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("medicare.gov") || h.includes("cms.gov") || h.includes("ncdoi.gov") || h.includes("ssa.gov") || h.includes("shiip") || h.includes("healthcare.gov")) govLinks++;
  });
  const govTextMentions = (lower.match(/medicare\.gov|cms\.gov|ncdoi\.gov|ssa\.gov|healthcare\.gov/g) || []).length;
  const totalGovSignals = govLinks + govTextMentions;
  // Full page needs 2+ (footer has them); partial REST content needs 1+
  results["opt-citations"] = isPartial ? totalGovSignals >= 1 : totalGovSignals >= 2;
  results["opt-citations-detail"] = govLinks + " .gov links + " + govTextMentions + " text mentions";

  // ── 3. AUTHOR / E-EAT ────────────────────────────────────────────────────
  // v5.1: .gh-author block is always rendered in page body.
  const authorBlock = doc.querySelectorAll(".gh-author, .gh-author-header, .gh-author-body");
  const hasAuthorBlock = authorBlock.length > 0;
  const hasAuthorText = lower.includes("robert simm") || lower.includes("ahip certified") || lower.includes("#10447418") || lower.includes("10447418");
  const hasPersonSchema = lower.includes("generationhealth.me/#author") || lower.includes('"person"');
  results["opt-author"] = hasAuthorBlock || hasAuthorText || hasPersonSchema;
  results["opt-author-detail"] = hasAuthorBlock ? ".gh-author block ✓" : hasAuthorText ? "Author text found ✓" : "No author signal";

  // ── 4. FRESHNESS / DATEMODIFIED ──────────────────────────────────────────
  // v5.1 schema: dateModified in Article + MedicalWebPage nodes (in <head>).
  // Partial content: look for 2026 references + any date signal.
  const has2026 = lower.includes("2026");
  const hasDateModified = lower.includes("datemodified") || lower.includes("date_modified");
  const hasUpdatedText = lower.includes("last updated") || lower.includes("reviewed by") || lower.includes("updated:") || lower.includes("as of 2026");
  // v5.1 pages always have dateModified in schema  -  partial pages pass on 2026 alone
  results["opt-fresh"] = has2026 && (hasDateModified || hasUpdatedText || isPartial);
  results["opt-fresh-detail"] = (has2026 ? "2026 ✓" : "No 2026 ref") + " | " + (hasDateModified ? "dateModified ✓" : hasUpdatedText ? "Updated text ✓" : "Partial content  -  2026 sufficient");

  // ── 5. INSTANT ANSWER BLOCK ──────────────────────────────────────────────
  // v5.1: .gh-answer is THE instant answer block (blue gradient box near top).
  // This is the most reliable signal  -  always present in v5.1 pages.
  const answerBlock = doc.querySelectorAll(".gh-answer, .gh-answer-label");
  const hasAnswerBlock = answerBlock.length > 0;
  const hasQuickText = lower.includes("quick answer") || lower.includes("short answer") || lower.includes("the answer is");
  results["opt-instant"] = hasAnswerBlock || hasQuickText;
  results["opt-instant-detail"] = hasAnswerBlock ? ".gh-answer block ✓" : hasQuickText ? "Answer text pattern ✓" : "No .gh-answer block found";

  // ── 6. COMPARISON TABLES ─────────────────────────────────────────────────
  // v5.1: .gh-comparison + .gh-comparison-card grid. Also standard <table>.
  const htmlTables = doc.querySelectorAll("table");
  const compCards = doc.querySelectorAll(".gh-comparison, .gh-comparison-card, .gh-comp-item");
  const compClasses = doc.querySelectorAll("[class*='gh-comp'],[class*='comparison']");
  // Pass only if proper gh-comparison card layout exists  -  native <table> without gh-comparison classes needs replacing.
  results["opt-tables"] = compCards.length > 0;
  results["opt-tables-detail"] = htmlTables.length + " <table> + " + compCards.length + " .gh-comparison elements" + (htmlTables.length>0&&compCards.length===0?" ⚠ native table needs replacement":"");

  // ── 7. IMAGES / GRAPHICS ─────────────────────────────────────────────────
  // v5.1: .gh-trust-strip + .gh-trust-badge always present in every page.
  const trustBadges = doc.querySelectorAll(".gh-trust-strip, .gh-trust-badge");
  const imgs = doc.querySelectorAll("img");
  let realImgs = 0;
  imgs.forEach(img => {
    const src = (img.getAttribute("src") || "").toLowerCase();
    if (src && !src.includes("data:") && !src.includes("pixel") && !src.includes("1x1") && src.length > 10) realImgs++;
  });
  results["opt-graphics"] = realImgs >= 1 || trustBadges.length > 0;
  results["opt-graphics-detail"] = realImgs + " images + " + trustBadges.length + " trust badges";

  // ── 8. CHARTS / VISUAL DATA ──────────────────────────────────────────────
  // v5.1: .gh-chart + .gh-bar bar chart components. Also SVG, canvas.
  const chartEls = doc.querySelectorAll(".gh-chart, .gh-chart-header");
  const barEls = doc.querySelectorAll(".gh-bar, .gh-bar-fill");
  const svgEls = doc.querySelectorAll("svg:not([width='16']):not([width='14']):not([width='18']):not([width='12']):not([width='20']):not([width='24'])");
  const canvasEls = doc.querySelectorAll("canvas");
  results["opt-charts"] = chartEls.length > 0 || barEls.length > 0 || svgEls.length > 0 || canvasEls.length > 0;
  results["opt-charts-detail"] = chartEls.length + " .gh-chart + " + barEls.length + " .gh-bar + " + svgEls.length + " SVG";

  // ── 9. INTERNAL LINKS ────────────────────────────────────────────────────
  let internalLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("generationhealth.me") && !h.includes("#")) internalLinks++;
  });
  results["opt-internal"] = internalLinks >= 3;
  results["opt-internal-detail"] = internalLinks + " internal links";

  // ── 10. OUTBOUND .GOV ────────────────────────────────────────────────────
  results["opt-outbound"] = totalGovSignals >= 1;
  results["opt-outbound-detail"] = totalGovSignals + " .gov signals total";

  // ── 11. V5.1 TEMPLATE DETECTION ──────────────────────────────────────────
  const hasV51 = lower.includes("gh-answer") || lower.includes("gh-faq") || lower.includes("gh-chart") || lower.includes("gh-author") || lower.includes("gh-trust-strip") || lower.includes("gh-comparison");
  results["opt-v51"] = hasV51;
  results["opt-v51-detail"] = hasV51 ? "v5.1 template ✓" : "Pre-v5.1  -  needs rebuild";

  // ── 18. ORPHANED CONTENT AFTER FOOTER ───────────────────────────────────
  // Detects injected junk (ol, div snippets) appended after the footer by old Fix All.
  // Checks for block-level elements appearing after .gh-footer-trust or </footer>.
  var footerIdx = lower.lastIndexOf('class="gh-footer-trust"');
  if(footerIdx === -1) footerIdx = lower.lastIndexOf('</footer>');
  var hasOrphanedContent = false;
  var orphanDetail = "No footer found to check";
  if(footerIdx > -1){
    var afterFooter = lower.slice(footerIdx);
    // Look for any block-level injected content  -  ol, ul, div.gh-, p with .gov links
    var orphanPatterns = [/<ol[\s>]/,/<ul[\s>]/,/<div class="gh-/,/<p[^>]*>.*?medicare\.gov/,/<section[\s>]/];
    for(var op=0; op<orphanPatterns.length; op++){
      if(orphanPatterns[op].test(afterFooter)){
        hasOrphanedContent = true;
        break;
      }
    }
    orphanDetail = hasOrphanedContent ? "⚠ Orphaned content found after footer  -  needs cleanup" : "Clean ✓";
  }
  results["opt-junk"] = !hasOrphanedContent;
  results["opt-junk-detail"] = orphanDetail;

  // FB & GMB cannot be detected from HTML
  results["opt-fb"] = false;
  results["opt-gmb"] = false;

  // ── 19. FUNCTIONAL CSS CHECK ─────────────────────────────────────────────
  // Detects CSS anti-patterns that block clicks on interactive elements:
  // - ::before/::after pseudo-elements on positioned parents without pointer-events:none
  // - Shimmer/sweep animations covering links and buttons
  var cssIssues = [];
  var styleBlocks = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
  var allCSS = styleBlocks.map(function(s){ return s.replace(/<\/?style[^>]*>/gi,""); }).join("\n");
  // Known click-blocking patterns: positioned pseudo-elements with animation but no pointer-events:none
  var pseudoRules = allCSS.match(/[^{}]+::(before|after)\s*\{[^}]+\}/gi) || [];
  pseudoRules.forEach(function(rule){
    var rLower = rule.toLowerCase();
    // Only flag if it has position:absolute AND (animation or transform) but NOT pointer-events:none
    if(rLower.includes("position") && rLower.includes("absolute") &&
       (rLower.includes("animation") || rLower.includes("transform")) &&
       !rLower.includes("pointer-events")){
      // Extract the selector name
      var sel = rule.split("::")[0].trim().split(/\s+/).pop();
      cssIssues.push(sel + "::" + (rule.match(/::(before|after)/i)||["","after"])[1]);
    }
  });
  results["opt-functional"] = cssIssues.length === 0;
  results["opt-functional-detail"] = cssIssues.length === 0
    ? "No click-blocking pseudo-elements found ✓"
    : cssIssues.length + " pseudo-element(s) missing pointer-events:none  -  " + cssIssues.slice(0,3).join(", ") + (cssIssues.length > 3 ? " +" + (cssIssues.length-3) + " more" : "");

  return results;
}

    setGscLoading(true);

    try {
      const site = gscSiteUrl.replace(/[/]$/,"");
      const endDate = new Date().toISOString().split("T")[0];
      const startDate = new Date(Date.now()-parseInt(gscDateRange)*86400000).toISOString().split("T")[0];
      const headers = {"Authorization":`Bearer ${ga4Token}`,"Content-Type":"application/json"};
      const baseUrl = `https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site)}/searchAnalytics/query`;

      // 0. TRUE TOTALS  -  no dimensions, gives accurate site-wide aggregate
      const tResp = await fetch(baseUrl,{method:"POST",headers,body:JSON.stringify({startDate,endDate,dataState:"all"})});
      const tData = tResp.ok ? await tResp.json() : {};
      const totals = tData.rows && tData.rows[0] ? {
        clicks: tData.rows[0].clicks||0,
        impressions: tData.rows[0].impressions||0,
        ctr: tData.rows[0].ctr||0,
        position: tData.rows[0].position||0
      } : null;

      // 1. Top queries  -  rowLimit 1000 to capture full query set
      const qResp = await fetch(baseUrl,{method:"POST",headers,body:JSON.stringify({startDate,endDate,dimensions:["query"],rowLimit:1000,dataState:"all"})});
      if(!qResp.ok) throw new Error(`GSC API error: ${qResp.status}  -  ${(await qResp.text()).slice(0,200)}`);

      // 2. Top pages
      const pResp = await fetch(baseUrl,{method:"POST",headers,body:JSON.stringify({startDate,endDate,dimensions:["page"],rowLimit:100,dataState:"all"})});
      const pData = pResp.ok ? await pResp.json() : {};

      // 3. Daily totals
      const dResp = await fetch(baseUrl,{method:"POST",headers,body:JSON.stringify({startDate,endDate,dimensions:["date"],dataState:"all"})});
      const dData = dResp.ok ? await dResp.json() : {};

          try{
            // Fetch v5.7 template
            var templateResp = await fetch("/api/fetch-page?url="+encodeURIComponent("https://raw.githubusercontent.com/robert9907/gh-command-center/main/GH-MASTER-TEMPLATE-v5_7_1_.html")+"&key=ghcc_template");
            var templateJson = templateResp.ok ? await templateResp.json() : null;
            var template = templateJson && templateJson.html ? templateJson.html : "";
            
            // If fetch fails, use embedded minimal template structure
            if(!template || template.length < 1000){
              template = await fetchTemplateFromProject();
            }

            var bp = aiBlueprint;
            var pageType = bp.pageType || aiSelectedPrompt.ageGroup || "medicare";
            var today = new Date().toISOString().split("T")[0];
            var monthYear = new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});

            // Build quiz HTML
            var quizOptionsQ1 = (bp.quiz && bp.quiz.q1 && bp.quiz.q1.options || ["Option 1","Option 2","Option 3","Option 4"]).map(function(o){
              return '<button class="gh-qopt" data-v="'+o.toLowerCase().replace(/[^a-z0-9]/g,"-").slice(0,20)+'">'+o+'</button>';
            }).join("\n");
            var quizOptionsQ2 = (bp.quiz && bp.quiz.q2 && bp.quiz.q2.options || ["Option 1","Option 2","Option 3","Option 4"]).map(function(o){
              return '<button class="gh-qopt" data-v="'+o.toLowerCase().replace(/[^a-z0-9]/g,"-").slice(0,20)+'">'+o+'</button>';
            }).join("\n");
            var quizOptionsQ3 = (bp.quiz && bp.quiz.q3 && bp.quiz.q3.options || ["Option 1","Option 2","Option 3","Option 4"]).map(function(o){
              return '<button class="gh-qopt" data-v="'+o.toLowerCase().replace(/[^a-z0-9]/g,"-").slice(0,20)+'">'+o+'</button>';
            }).join("\n");

            // Build scenarios HTML
            var scenariosHtml = "";
            if(bp.scenarios && bp.scenarios.length > 0){
              scenariosHtml = bp.scenarios.map(function(sc){
                var c = sc.color || "blue";
                return '<div class="gh-scenario" role="listitem"><div class="gh-scenario-hd gh-scenario-hd--'+c+'"><div class="gh-scenario-badge">'+sc.badge+'</div><h4>'+sc.title+'</h4></div><div class="gh-scenario-body"><p>'+sc.setup+'</p><p>'+sc.resolution+'</p><div class="gh-verdict gh-verdict--'+c+'">💡 '+sc.verdict+'</div></div></div>';
              }).join("\n");
            }

            // Replacements
            var html = template;
            
            // Page meta
            html = html.replace(/\[PAGE TITLE\]/g, bp.metaTitle || bp.h1Line1 + " | GenerationHealth");
            html = html.replace(/\[PAGE META DESCRIPTION[^\]]*\]/g, bp.metaDesc || "");
            html = html.replace(/\[PAGE-SLUG\]/g, bp.suggestedSlug || "new-page");
            html = html.replace(/\[YYYY-MM-DD\]/g, today);
            html = html.replace(/\[MONTH DD, YYYY\]/g, monthYear);
            html = html.replace(/\[ARTICLE HEADLINE[^\]]*\]/g, bp.h1Line1 + " " + bp.h1Line2);
            
            // Hero content
            html = html.replace(/\[H1 LINE 1[^\]]*\]/g, bp.h1Line1 || "");
            html = html.replace(/\[H1 LINE 2[^\]]*\]/g, bp.h1Line2 || "");
            html = html.replace(/\[HERO SUBTITLE[^\]]*\]/g, bp.subtitle || "");
            
            // Instant answer
            html = html.replace(/\[INSTANT ANSWER[^\]]*\]/g, bp.instantAnswer || bp.p1Opener || "");
            
            // Intro paragraphs
            html = html.replace(/\[INTRO P1[^\]]*\]/g, bp.p1Opener || "");
            html = html.replace(/\[INTRO P2[^\]]*\]/g, "Call <a href='tel:828-761-3326' class='gh-inline'>828-761-3326</a> for a free " + (pageType === "aca" ? "15" : "20") + "-minute review.");
            
            // Quiz
            html = html.replace(/\[QUIZ Q1[^\]]*\]/g, bp.quiz && bp.quiz.q1 ? bp.quiz.q1.question : "What's your current situation?");
            html = html.replace(/\[QUIZ Q2[^\]]*\]/g, bp.quiz && bp.quiz.q2 ? bp.quiz.q2.question : "What's your biggest concern?");
            html = html.replace(/\[QUIZ Q3[^\]]*\]/g, bp.quiz && bp.quiz.q3 ? bp.quiz.q3.question : "What happens if nothing changes?");
            
            // FAQs
            if(bp.faqs && bp.faqs.length >= 6){
              for(var fi = 0; fi < 6; fi++){
                html = html.replace("[FAQ QUESTION "+(fi+1)+"]", bp.faqs[fi].q);
                html = html.replace("[FAQ ANSWER "+(fi+1)+"]", bp.faqs[fi].a);
              }
            }

            // Service schema
            html = html.replace(/\[SERVICE NAME[^\]]*\]/g, pageType === "aca" ? "ACA Plan Comparison in North Carolina" : "Medicare Plan Comparison in North Carolina");
            html = html.replace(/\[SERVICE DESCRIPTION[^\]]*\]/g, "Free " + (pageType === "aca" ? "ACA Marketplace" : "Medicare") + " plan comparison and enrollment assistance for North Carolina residents.");

            // Resolve MEDICARE/ACA conditionals
            var pattern = /\[MEDICARE:\s*([^|]*?)\s*\|\s*ACA:\s*([^\]]*?)\]/gi;
            html = html.replace(pattern, function(match, medicareVal, acaVal){
              return pageType === "aca" ? acaVal.trim() : medicareVal.trim();
            });

            // Clean up any remaining placeholders
            html = html.replace(/\[[A-Z][A-Z0-9 _\-:|\u2014]*\]/g, "");

            // Add build metadata comment
            var buildComment = "<!-- AI Prompt Builder · "+bp.suggestedSlug+" · "+today+" · Source: "+aiSelectedPrompt.prompt.slice(0,50)+"... -->\n";
            html = buildComment + html;

            setAiPageHtml(html);
            
            // Update prompt status - check if already in builder
            var currentStatus = aiSelectedPrompt.status;
            var newStatus = currentStatus === "in-builder" || currentStatus === "published" ? currentStatus : "built";
            
            // If already in builder, update the saved HTML
            if(aiSelectedPrompt.pbKey){
              setSavedHTML(function(prev){
                var n = Object.assign({}, prev);
                n[aiSelectedPrompt.pbKey] = html;
                return n;
              });
            }
            
            setAiPrompts(function(prev){
              return prev.map(function(p){
                if(p.id === aiSelectedPrompt.id){
                  return Object.assign({}, p, {status: newStatus, pageSlug: bp.suggestedSlug, blueprint: bp});
                }
                return p;
              });
            });
            setAiSelectedPrompt(function(prev){
              return prev ? Object.assign({}, prev, {status: newStatus, blueprint: bp}) : prev;
            });
            setHasChanges(true);
          }catch(e){
            alert("Build error: "+e.message);
            console.error(e);
          }
          setAiPageBuilding(false);
        }

        // Helper to fetch template from project files
        async function fetchTemplateFromProject(){
          // Fallback: return a minimal template structure
          return `<!DOCTYPE html>
<html lang="en">
<head>

</main>
<footer class="gh-footer-trust">
