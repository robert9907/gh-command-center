              {useBackend && <span style={{marginLeft:8,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:backendStatus==="connected"||backendStatus==="migrated"?T.greenBg:backendStatus==="connecting"?"rgba(251,146,60,0.15)":"rgba(255,255,255,0.03)",color:backendStatus==="connected"||backendStatus==="migrated"?"#4ADE80":backendStatus==="connecting"?"#FB923C":"#6B7B8D"}}>{backendStatus==="connected"?"● Server Synced":backendStatus==="migrated"?"● Server Migrated":backendStatus==="connecting"?"○ Connecting...":"○ Local Only"}</span>}
              {!useBackend && <span style={{marginLeft:8,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:"rgba(255,255,255,0.03)",color:"#6B7B8D"}}>○ Local Storage</span>}
            </p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:4,background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",borderRadius:12,padding:4,flexWrap:"wrap"}}>
              {[{id:"tree",label:"Architecture"},{id:"optimize",label:"Optimize"},{id:"pageBuilder",label:"📄 Page Builder"},{id:"studio",label:"📣 Content Studio"},{id:"keywords",label:"Keyword War Room"},{id:"performance",label:"Performance"}].map(t=>
                <button key={t.id} onClick={()=>{setView(t.id);setBellOpen(false);}} style={{padding:"8px 16px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===t.id?(isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.1)"):"transparent",color:view===t.id?"#FFF":"#6B7B8D",transition:"all 0.2s"}}>{t.label}</button>
              )}
            </div>

            {/* Theme toggle */}
            <button onClick={function(){setTheme(function(p){return p==="dark"?"light":"dark"})}} title={isDark?"Switch to Light Mode":"Switch to Dark Mode"} style={{width:40,height:40,borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,transition:"all 0.3s"}}>{isDark?"☀️":"🌙"}</button>
            {/* Save/Backup button */}
            {hasChanges&&<button onClick={doBackup} style={{height:40,padding:"0 16px",borderRadius:12,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(22,163,74,0.15)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,animation:"savePulse 2s ease-in-out infinite"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              <span style={{fontSize:12,fontWeight:700,color:"#4ADE80"}}>Backup</span>
            </button>}
            {!hasChanges&&lastSaveTime&&<span style={{fontSize:10,color:"#4B5C6E",padding:"0 8px"}}>Backed up {lastSaveTime.toLocaleTimeString()}</span>}
            {/* Restore button */}
            <button onClick={doRestore} title="Restore from backup" style={{width:40,height:40,borderRadius:12,border:"none",background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={"#6B7B8D"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </button>
            {/* Bell icon */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setView("performance")} title="Performance" style={{width:40,height:40,borderRadius:12,border:"none",background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7B8D" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 24px 80px"}}>

      {focusClusterId&&(()=>{
        var fc=clusters.find(function(c){return c.id===focusClusterId;});
        if(!fc) return null;
        var built=pbCompleted.filter(function(k){return k.startsWith(fc.id+"-");}).length;
        var pending=pbPendingPublish.filter(function(k){return k.startsWith(fc.id+"-");}).length;
        var nextPost=fc.posts.find(function(p,i){return !pbCompleted.includes(fc.id+"-"+i);});
        return <div style={{background:"linear-gradient(135deg,rgba(255,199,44,0.12),rgba(255,199,44,0.06))",border:"2px solid rgba(255,199,44,0.35)",borderRadius:14,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
            <span style={{fontSize:20}}>🎯</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:"#FFC72C"}}>Focus Mode: {fc.name}</div>
              <div style={{fontSize:11,color:"#A08C5A",marginTop:2}}>{built}/{fc.posts.length} built · {pending} pending publish{nextPost?" · Next: "+nextPost.name:""}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {nextPost&&<button onClick={function(){setView("pageBuilder");}} style={{padding:"7px 16px",borderRadius:9,border:"none",background:"#FFC72C",color:"#1A2332",fontSize:12,fontWeight:800,cursor:"pointer"}}>▶ Resume</button>}
            <button onClick={function(){setFocusClusterId(null);}} style={{padding:"7px 14px",borderRadius:9,border:"1px solid rgba(255,199,44,0.3)",background:"transparent",color:"#FFC72C",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Exit Focus</button>
          </div>
        </div>;
      })()}

      {/* ARCHITECTURE */}
      {view==="tree" && <>
        <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
          <button onClick={()=>setPhaseFilter(0)} style={{padding:"8px 18px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:phaseFilter===0?(isDark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.1)"):(isDark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)"),color:phaseFilter===0?"#FFF":"#6B7B8D"}}>All</button>
          {PHASES.map(p=><button key={p.id} onClick={()=>setPhaseFilter(p.id)} style={{padding:"8px 18px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:phaseFilter===p.id?`${p.color}30`:(isDark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)"),color:phaseFilter===p.id?p.color:"#6B7B8D"}}>{p.active?"● ":""}{p.label}</button>)}
        </div>
        <div style={{display:"grid",gap:14}}>
          {filtered.map(cluster=>{
            const ph=PHASES.find(p=>p.id===cluster.phase); const isExp=expandedCluster===cluster.id;
            return <div key={cluster.id} style={{background:"#FFF",border:isExp?`2px solid ${ph.color}`:"1px solid rgba(0,0,0,0.08)",borderRadius:16,overflow:"hidden",boxShadow:isExp?`0 8px 32px ${ph.color}18`:"0 2px 8px rgba(0,0,0,0.04)"}}>
              <div onClick={()=>setExpandedCluster(isExp?null:cluster.id)} style={{padding:"20px 24px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,background:isExp?`${ph.color}08`:"transparent"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",color:ph.color,textTransform:"uppercase"}}>{cluster.type==="county-system"?"County System":"Pillar Cluster"}</span>
                    <StatusDot status={cluster.status}/>
                    {cluster.gameplanPriority&&<span style={{fontSize:10,fontWeight:800,background:"#FEF3C7",color:"#92400E",padding:"2px 8px",borderRadius:6}}>#{cluster.gameplanPriority}</span>}
                  </div>
                  <h3 style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:"#1A2332",margin:0}}>{cluster.name}</h3>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}><ValueBadge label="SEO" value={cluster.seoValue}/><ValueBadge label="AEO" value={cluster.aeoValue}/><ValueBadge label="GEO" value={cluster.geoValue}/></div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:24,fontWeight:800,color:"#1A2332"}}>{cluster.posts.filter(p=>p.status==="done").length}/{cluster.posts.length}</div>
                  <div style={{fontSize:11,color:"#6B7B8D"}}>pages</div>
                </div>
              </div>
              {isExp&&<div style={{padding:"0 24px 24px",borderTop:"1px solid rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",gap:8,margin:"16px 0 8px"}}>
                  <button onClick={function(){setFocusClusterId(focusClusterId===cluster.id?null:cluster.id);}} style={{padding:"6px 16px",borderRadius:8,border:"1.5px solid rgba(255,199,44,0.5)",background:focusClusterId===cluster.id?"rgba(255,199,44,0.15)":"transparent",color:"#FFC72C",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {focusClusterId===cluster.id?"🎯 In Focus":"🎯 Set as Focus Cluster"}
                  </button>
                </div>
                {cluster.gameplanNote&&<div style={{margin:"16px 0",padding:"12px 16px",background:"#FFFBEB",borderLeft:"3px solid #D97706",borderRadius:"0 8px 8px 0",fontSize:13,color:"#92400E"}}><strong>Note:</strong> {cluster.gameplanNote}</div>}
                {cluster.templateUsed&&<div style={{margin:"16px 0",padding:"12px 16px",background:"#EFF6FF",borderLeft:"3px solid #2563EB",borderRadius:"0 8px 8px 0",fontSize:13,color:"#1E40AF"}}><strong>Master Template v3.0</strong></div>}

                {/* ── Posts with Created / Indexed tracking ── */}
                <div style={{marginTop:16}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:ph.color,textTransform:"uppercase"}}>Pages ({cluster.posts.filter(p=>p.status==="done").length}/{cluster.posts.length})</span>
                    <div style={{display:"flex",gap:16,fontSize:10,fontWeight:700,color:"#6B7B8D",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                      <span>Created</span><span>Indexed</span>
                    </div>
                  </div>
                  {cluster.posts.map((post,i)=>{
                    const createdId=`cr-${cluster.id}-${i}`;
                    const indexedId=`ix-${cluster.id}-${i}`;
                    const isCreated = post.status==="done" || isDone(createdId);
                    const isIndexed = isDone(indexedId);
                    const isPillar = i===0;
                    return <div key={i} style={{
                      display:"flex",alignItems:"center",gap:10,
                      padding:"10px 14px",margin:"4px 0",
                      background:isIndexed?"#F0FDF4":isCreated?"#FEFCE8":"#F9FAFB",
                      borderRadius:10,fontSize:13,
                      borderLeft:`3px solid ${isIndexed?"#16A34A":isCreated?"#D97706":"#C4CDD5"}`,
                    }}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          {isPillar&&<span style={{fontSize:9,fontWeight:800,background:`${ph.color}20`,color:ph.color,padding:"1px 6px",borderRadius:4,textTransform:"uppercase"}}>Pillar</span>}
                          <span style={{color:"#3A4553",fontWeight:isPillar?700:400}}>{post.name}</span>
                          {post.hospital&&<span style={{color:"#6B7B8D"}}> — {post.hospital}</span>}
                        </div>
                        {post.slug&&<div style={{fontSize:11,color:"#6B7B8D",marginTop:2}}>/{post.slug}</div>}
                        {post.publishDate&&<div style={{fontSize:10,fontWeight:700,color:"#2563EB",marginTop:3}}>Publish: {post.publishDate}</div>}
                        {post.status==="planned"&&post.slug&&<button onClick={function(e){e.stopPropagation();setPbMode("new");setPbNewKeyword((post.slug||"").replace(/-/g," "));setPbNewSlug(post.slug||"");setView("pageBuilder");}} style={{marginTop:6,padding:"4px 12px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#0D9488,#14B8A6)",color:"#FFF",fontSize:11,fontWeight:700,cursor:"pointer"}}>📄 Build Page</button>}
                      </div>
                      <div style={{display:"flex",gap:16,alignItems:"center",flexShrink:0}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          {post.status==="done"?
                            <div style={{width:18,height:18,borderRadius:6,background:"#16A34A",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width={12} height={12} viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
                            :<AnimCheck checked={isDone(createdId)} onToggle={()=>toggle(createdId)} dark={false} sz={18}/>
                          }
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          <AnimCheck checked={isIndexed} onToggle={()=>toggle(indexedId)} dark={false} sz={18}/>
                        </div>
                      </div>
                    </div>;
                  })}
                </div>

                {/* ── Standard Phase 1 Optimization Tasks ── */}
                <div style={{marginTop:24}}>
                  <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:"#0D9488",textTransform:"uppercase",marginBottom:10}}>
                    Optimization Checklist ({STD_TASKS.filter(t=>isDone(`std-${cluster.id}-${t.id}`)).length}/{STD_TASKS.length})
                  </div>
                  <div style={{background:"#F9FAFB",borderRadius:12,padding:"12px 16px",border:"1px solid rgba(0,0,0,0.04)"}}>
                    {STD_TASKS.map((task,i)=>{
                      const tid=`std-${cluster.id}-${task.id}`;
                      const d=isDone(tid);
                      return <div key={task.id} style={{
                        display:"flex",alignItems:"flex-start",gap:8,
                        padding:"7px 0",fontSize:13,
                        borderBottom:i<STD_TASKS.length-1?"1px solid rgba(0,0,0,0.04)":"none",
                        animation:recentId===tid?"donePulse 1s ease":"none",
                      }}>
                        <AnimCheck checked={d} onToggle={()=>toggle(tid)} dark={false} sz={18}/>
                        <div style={{flex:1}}>
                          <span style={{color:d?"#16A34A":"#3A4553",textDecoration:d?"line-through":"none",transition:"all 0.3s"}}>{task.label}</span>
                          {d&&<NoteField value={getNote(tid)} onChange={v=>setNote(tid,v)} dark={isDark}/>}
                        </div>
                        {d&&done[tid]&&<span style={{fontSize:10,color:"#C4CDD5",flexShrink:0}}>{new Date(done[tid]).toLocaleDateString()}</span>}
                      </div>;
                    })}
                  </div>
                </div>

                {/* ── Custom cluster-specific tasks (if any) ── */}
                {cluster.phase1Tasks.length>0&&<div style={{marginTop:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#D97706",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>
                    Cluster-Specific Tasks ({cluster.phase1Tasks.filter((_,i)=>isDone(`cl-${cluster.id}-${i}`)).length}/{cluster.phase1Tasks.length})
                  </div>
                  {cluster.phase1Tasks.map((task,i)=>{const tid=`cl-${cluster.id}-${i}`;const d=isDone(tid);return<div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 0",fontSize:13,borderBottom:i<cluster.phase1Tasks.length-1?"1px solid rgba(0,0,0,0.04)":"none",animation:recentId===tid?"donePulse 1s ease":"none"}}>
                    <AnimCheck checked={d} onToggle={()=>toggle(tid)} dark={false} sz={18}/>
                    <div style={{flex:1}}><span style={{color:d?"#16A34A":"#3A4553",textDecoration:d?"line-through":"none"}}>{task}</span>{d&&<NoteField value={getNote(tid)} onChange={v=>setNote(tid,v)} dark={isDark}/>}</div>
                  </div>;})}
                </div>}
              </div>}
            </div>;
          })}
        </div>
      </>}

      {/* OPTIMIZE */}
      {view==="optimize"&&(()=>{
        // Build flat list of all live pages for priority queue
        const liveClust = clusters.filter(c=>c.posts.some(p=>p.status==="done"));
        const sortedClust = [...liveClust].sort((a,b)=>getPriorityScore(a)-getPriorityScore(b));

        // Calculate totals
        const allLivePages = sortedClust.reduce((a,c)=>a+c.posts.filter(p=>p.status==="done").length,0);
        const allOptDone = sortedClust.reduce((acc,c)=>{
          c.posts.filter(p=>p.status==="done").forEach((_,i)=>{
            OPT_ITEMS.forEach(oi=>{ if(isDone(`op-${c.id}-${i}-${oi.id}`)) acc++; });
          });
          return acc;
        },0);
        const allOptTotal = allLivePages * OPT_ITEMS.length;
        const pct = allOptTotal>0?Math.round(allOptDone/allOptTotal*100):0;

        return <div>
          {/* Overall progress */}
          <div style={{background:"linear-gradient(135deg, rgba(13,148,136,0.08), rgba(37,99,235,0.08))",border:"1px solid rgba(13,148,136,0.2)",borderRadius:16,padding:28,marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,color:"#FFF",margin:0,fontFamily:"Georgia,serif"}}>Optimize Existing Pages</h2>
                <p style={{fontSize:13,color:"#6B7B8D",margin:"4px 0 0"}}>Harden what's live before building new content. {allLivePages} pages \u00d7 {OPT_ITEMS.length} items each.</p>
                <button onClick={async()=>{
                  // Gather ALL live pages across all clusters
                  const allPages=[];
                  sortedClust.forEach(c=>{
                    const ps=c.posts.map((p,i)=>({...p,idx:i,clusterId:c.id}));
                    ps.forEach(p=>{if(p.status==="done"&&p.slug)allPages.push(p);});
                  });
                  if(allPages.length===0){alert("No live pages to fetch.");return;}
                  if(!confirm(`Fetch & scan ALL ${allPages.length} live pages from generationhealth.me?\n\nThis will take about ${Math.round(allPages.length*1.5/60)} minutes. You can watch progress in real-time.`))return;
                  setFetchAllProgress({total:allPages.length,done:0,current:"Starting...",errors:[]});
                  let errList=[];
                  for(let i=0;i<allPages.length;i++){
                    const p=allPages[i];
                    setFetchAllProgress({total:allPages.length,done:i,current:`${p.name} (${i+1}/${allPages.length})`,errors:errList});
                    const res=await fetchAndScanPage(p.slug,p.clusterId,p.idx,setSavedHTML,setDone,setNotes,setLastScanResults,setHasChanges);
                    if(!res.success)errList.push(p.slug);
                    await new Promise(r=>setTimeout(r,800));
                  }
                  setFetchAllProgress({total:allPages.length,done:allPages.length,current:`Done! ${allPages.length-errList.length} fetched, ${errList.length} errors`,errors:errList});
                  setTimeout(()=>setFetchAllProgress(null),15000);
                }} style={{marginTop:10,padding:"8px 20px",borderRadius:10,border:"1.5px solid rgba(255,199,44,0.5)",background:"rgba(255,199,44,0.08)",color:"#FFC72C",fontSize:13,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>⚡ Fetch & Scan All {allLivePages} Pages</button>
                {fetchAllProgress && <div style={{marginTop:8,fontSize:12,color:"#6B7B8D"}}>
                  <div style={{width:"100%",maxWidth:400,height:6,background:"rgba(255,255,255,0.06)",borderRadius:100,overflow:"hidden",marginBottom:4}}>
                    <div style={{width:`${fetchAllProgress.total>0?Math.round(fetchAllProgress.done/fetchAllProgress.total*100):0}%`,height:"100%",background:"linear-gradient(90deg,#FFC72C,#FFD54F)",borderRadius:100,transition:"width 0.3s"}}/>
                  </div>
                  {fetchAllProgress.current}
                </div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:28,fontWeight:800,color:pct===100?"#4ADE80":"#FFF"}}>{pct}%</div>
                <div style={{fontSize:12,color:"#6B7B8D"}}>{allOptDone}/{allOptTotal} items</div>
              </div>
            </div>
            <div style={{width:"100%",height:10,background:"rgba(255,255,255,0.06)",borderRadius:100,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#0D9488,#2DD4BF)",borderRadius:100,transition:"width 0.5s"}}/>
            </div>
          </div>

          {/* URL Search Tool */}
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,199,44,0.2)",borderRadius:14,padding:"16px 20px",marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:"#FFC72C",textTransform:"uppercase",marginBottom:10}}>🔍 Find a Page by URL</div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <input type="text" value={optSearch} onChange={e=>{setOptSearch(e.target.value);setOptSearchResult(null);setOptSearchHighlight(null);}} onKeyDown={e=>{if(e.key==="Enter"){const raw=optSearch.trim();const slug=raw.replace(/^https?:[/][/][^/]+[/]/,"").replace(/[/]$/,"").trim();let found=null;for(const c of sortedClust){for(const p of c.posts){if(p.slug&&(p.slug===slug||p.slug.toLowerCase()===slug.toLowerCase())){found={clusterId:c.id,clusterName:c.name,pageName:p.name,slug:p.slug};break;}}if(found)break;}if(found){setOptSearchResult({found:true,...found});setExpandedOptCluster(found.clusterId);setOptSearchHighlight(found.slug);setTimeout(()=>{const el=document.getElementById("opt-page-"+found.slug);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},150);}else{setOptSearchResult({found:false,slug});setOptSearchHighlight(null);}}}} placeholder="Paste full URL or slug, then press Enter" style={{flex:1,minWidth:280,padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.05)",color:"#FFF",fontSize:13,outline:"none"}}/>

        function computeDropZones(html){
          if(!html) return [];
          var bodyStart=html.indexOf("<body"); var bodyOffset=bodyStart>-1?bodyStart:0;
          var bodyEnd=html.lastIndexOf("</body>"); var total=bodyEnd>bodyOffset?bodyEnd-bodyOffset:html.length-bodyOffset;
          if(total<100){total=html.length;bodyOffset=0;}
          var result=[];
          var ctaCount=0;
          ZONE_DEFS.forEach(function(def){
            var pos=-1;
            for(var fi=0;fi<def.find.length;fi++){
              var searchFrom = 0;
              if(def.skip) { // skip N occurrences
                for(var si=0;si<def.skip;si++){
                  var t=html.indexOf(def.find[fi],searchFrom);
                  if(t>-1) searchFrom=t+1; else {searchFrom=-1;break;}
                }
                if(searchFrom<0) continue;
              }
              var idx=html.indexOf(def.find[fi],searchFrom);
              if(idx>-1){
                if(def.after){var se=html.indexOf("</section>",idx);pos=se>-1?se+10:idx;}
                else{var ss=html.lastIndexOf("<section",idx);pos=ss>-1?ss:idx;}
                break;
              }
            }
            if(pos===-1&&def.id==="z8"){var bi=html.lastIndexOf("</body>");pos=bi>-1?bi:html.length-50;}
            if(pos>-1){
              result.push({id:def.id,label:def.label,color:def.color,n:def.n,
                pct:Math.min(0.93,Math.max(0.03,Math.round(((pos-bodyOffset)/total)*100)/100)),
                htmlPos:pos});
            }
          });
          // Remove duplicates within 4% of each other
          var seen={};
          result = result.filter(function(z){var b=Math.round(z.pct*25);if(seen[b])return false;seen[b]=true;return true;});
          // Fallback: if page structure not detected, spread 8 zones evenly through body
          if(result.length < 3){
            var bStart=html.indexOf("<body");
            var bEnd=html.lastIndexOf("</body>");
            if(bStart===-1){bStart=0;}
            if(bEnd===-1){bEnd=html.length;}
            var bLen=bEnd-bStart;
            var fallbackDefs=[
              {id:"z1",label:"After Hero",         color:"#2DD4BF",pct:0.08},
              {id:"z2",label:"After Answer Block", color:"#4B9CD3",pct:0.20},
              {id:"z3",label:"Before CTA 1",       color:"#FFC72C",pct:0.32},
              {id:"z4",label:"After Comparison",   color:"#A78BFA",pct:0.44},
              {id:"z5",label:"Before CTA 2",       color:"#F59E0B",pct:0.56},
              {id:"z6",label:"Before FAQ",         color:"#FB923C",pct:0.68},
              {id:"z7",label:"After FAQ",          color:"#4ADE80",pct:0.80},
              {id:"z8",label:"End of Page",        color:"#F472B6",pct:0.92}
            ];
            result = fallbackDefs.map(function(f){
              // Find nearest </p> or </div> or </section> to that pct position
              var targetPos = bStart + Math.round(f.pct * bLen);
              // Snap to nearest block close tag
              var tags=["</section>","</div>","</p>","</h2>","</h3>"];
              var best=targetPos;
              for(var ti=0;ti<tags.length;ti++){
                var tp=html.indexOf(tags[ti],Math.max(0,targetPos-500));
                if(tp>-1&&tp<=targetPos+1000){best=tp+tags[ti].length;break;}
              }
              return {id:f.id,label:f.label,color:f.color,pct:f.pct,htmlPos:best};
            });
          }
          return result;
        }
