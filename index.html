// Uses CORS proxies since CC runs from local file / different origin
const GH_BASE = "https://generationhealth.me/";

async function fetchWithTimeout(url, ms=20000) {
  // Use a race between fetch and a timeout promise
  // (Avoids AbortSignal issues in sandboxed iframe environments)
  return Promise.race([
    fetch(url, { headers: { "Accept": "text/html,*/*" } }),
    new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout after " + ms + "ms")), ms))
  ]);
}

async function fetchPageHTML(slug) {
  if (!slug) return null;
  const fullURL = slug.startsWith("http") ? slug : `${GH_BASE}${slug}/`;
  console.log("[GH Fetch] Starting fetch for:", fullURL);

  // Detect if running inside a sandboxed iframe (e.g. Claude.ai artifact preview)
  const inSandbox = window.self !== window.top;
  if (inSandbox) {
    console.warn("[GH Fetch] Running in sandboxed iframe — network requests may be blocked. Download the file and open in a regular browser tab for full fetch functionality.");
  }

  // Strategy 0: GH PHP Fetch Proxy — server-side, no CORS, returns FULL page HTML
  try {
    const slugOnly = fullURL.replace("https://generationhealth.me/","").replace(/\/$/,"");
    const proxyURL = `https://generationhealth.me/fetch-proxy.php?slug=${encodeURIComponent(slugOnly)}&token=gh-proxy-2026`;
    const resp = await fetchWithTimeout(proxyURL, 25000);
    if (resp.ok) {
      const html = await resp.text();
      if (html && html.length > 500 && html.includes("<")) {
        console.log("[GH Fetch] \u2713 PHP proxy:", slug, Math.round(html.length/1024)+"KB");
        return html;
      }
    }
  } catch(e) { console.log("[GH Fetch] PHP proxy failed:", e.message); }

  // Strategy 1: WordPress REST API — often has CORS headers enabled
  // Fetches rendered content via WP's built-in API
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/pages?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const pages = await resp.json();
      if (pages.length > 0 && pages[0].content && pages[0].content.rendered) {
        const rendered = pages[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST pages:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST pages failed:", e.message); }

  // Also try posts endpoint (in case page is a post type)
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/posts?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const posts = await resp.json();
      if (posts.length > 0 && posts[0].content && posts[0].content.rendered) {
        const rendered = posts[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST posts:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST posts failed:", e.message); }

  // Strategy 1: Direct fetch (works if CC is hosted on same domain or CORS enabled)
  try {
    const resp = await fetchWithTimeout(fullURL, 10000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ Direct fetch:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] Direct failed:", e.message); }

  // Strategy 2: allorigins (most reliable free CORS proxy)
  try {
    const resp = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) {
      const data = await resp.json();
      if (data.contents && data.contents.length > 500) { console.log("[GH Fetch] ✓ allorigins:", slug, Math.round(data.contents.length/1024)+"KB"); return data.contents; }
    }
  } catch(e) { console.log("allorigins failed:", e.message); }

  // Strategy 3: corsproxy.io
  try {
    const resp = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ corsproxy.io:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] corsproxy.io failed:", e.message); }

  // Strategy 4: cors-anywhere (Heroku demo)
  try {
    const resp = await fetchWithTimeout(`https://cors-anywhere.herokuapp.com/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ cors-anywhere:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] cors-anywhere failed:", e.message); }

  // Strategy 5: thingproxy
  try {
    const resp = await fetchWithTimeout(`https://thingproxy.freeboard.io/fetch/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ thingproxy:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] thingproxy failed:", e.message); }

  console.error("[GH Fetch] ✗ ALL strategies failed for:", slug);
  return null;
}

// Fetch + scan + store a single page
async function fetchAndScanPage(slug, clusterId, postIdx, setSavedHTML, setDone, setNotes, setLastScanResults, setHasChanges) {
  const html = await fetchPageHTML(slug);
  if (!html) return { success: false, error: "Could not fetch page" };
  const scanKey = `${clusterId}-${postIdx}`;
  const prefix = `op-${clusterId}-${postIdx}`;
  const results = scanHTML(html);

  // Store HTML
  setSavedHTML(prev => ({ ...prev, [scanKey]: html }));

  // Auto-check/uncheck based on scan
  const scannable = ["opt-instant","opt-faq","opt-citations","opt-author","opt-charts","opt-graphics","opt-tables","opt-fresh"];
  setDone(prev => {
    const next = { ...prev };
    scannable.forEach(k => {
      const key = `${prefix}-${k}`;
      if (results[k]) next[key] = Date.now();
      else delete next[key];
    });
    return next;
  });

  // Store scan results & notes
  setLastScanResults(prev => ({ ...prev, [scanKey]: results }));
  setNotes(prev => {
    const next = { ...prev };
    if (results["opt-citations-detail"]) next[`${prefix}-opt-citations`] = "Scan: " + results["opt-citations-detail"];
    if (results["opt-fresh-detail"]) next[`${prefix}-opt-fresh`] = "Scan: " + results["opt-fresh-detail"];
    if (results["opt-tables-detail"]) next[`${prefix}-opt-tables`] = "Scan: " + results["opt-tables-detail"];
    if (results["opt-graphics-detail"]) next[`${prefix}-opt-graphics`] = "Scan: " + results["opt-graphics-detail"];
    if (results["opt-charts-detail"]) next[`${prefix}-opt-charts`] = "Scan: " + results["opt-charts-detail"];
    if (results["opt-instant-detail"]) next[`${prefix}-opt-instant`] = "Scan: " + results["opt-instant-detail"];
    return next;
  });
  setHasChanges(true);
  return { success: true, size: html.length, results };
}

function scanHTML(html) {
  const results = {};
  const lower = html.toLowerCase();
  const doc = new DOMParser().parseFromString(html, "text/html");

  // Detect partial WP REST content (no full HTML doc — just body content)
  const isPartial = !lower.includes("<!doctype") && !lower.includes("<html");

  // ── 1. FAQ SCHEMA ─────────────────────────────────────────────────────────
  // v5.1: FAQPage lives in @graph in <head>. WP REST strips <head>.
  // Fallback: detect .gh-faq-item accordion (always in rendered body).
  let hasFAQ = false, hasArticle = false;
  if (!isPartial) {
    const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
    scripts.forEach(s => {
      try {
        const j = JSON.parse(s.textContent);
        const check = (obj) => {
          if (!obj) return;
          if (obj["@type"] === "FAQPage") hasFAQ = true;
          if (["Article","NewsArticle","BlogPosting","WebPage","MedicalWebPage"].includes(obj["@type"])) hasArticle = true;
          if (Array.isArray(obj["@graph"])) obj["@graph"].forEach(check);
        };
        check(j);
      } catch(e) {}
    });
  }
  // v5.1 FAQ accordion — present in WP REST rendered content
  const faqItems = doc.querySelectorAll(".gh-faq-item, .gh-faq-list, .gh-faq");
  if (faqItems.length >= 1) hasFAQ = true;
  if (lower.includes("faqpage") || lower.includes('"faq"')) hasFAQ = true;
  if (!isPartial && (lower.includes("medicalwebpage") || lower.includes('"article"'))) hasArticle = true;
  if (isPartial && faqItems.length >= 1) hasArticle = true;
  results["opt-faq"] = hasFAQ;
  results["opt-article-schema"] = hasArticle;

  // ── 2. .GOV CITATIONS ─────────────────────────────────────────────────────
  // v5.1 footer always has medicare.gov + ncdoi.gov. WP REST strips footer.
  // Count both link hrefs AND text mentions for partial content.
  const links = doc.querySelectorAll("a[href]");
  let govLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("medicare.gov") || h.includes("cms.gov") || h.includes("ncdoi.gov") || h.includes("ssa.gov") || h.includes("shiip") || h.includes("healthcare.gov")) govLinks++;
  });
  const govTextMentions = (lower.match(/medicare\.gov|cms\.gov|ncdoi\.gov|ssa\.gov|healthcare\.gov/g) || []).length;
  const totalGovSignals = govLinks + govTextMentions;
  // Full page needs 2+ (footer has them); partial REST content needs 1+
  results["opt-citations"] = isPartial ? totalGovSignals >= 1 : totalGovSignals >= 2;
  results["opt-citations-detail"] = govLinks + " .gov links + " + govTextMentions + " text mentions";

  // ── 3. AUTHOR / E-EAT ────────────────────────────────────────────────────
  // v5.1: .gh-author block is always rendered in page body.
  const authorBlock = doc.querySelectorAll(".gh-author, .gh-author-header, .gh-author-body");
  const hasAuthorBlock = authorBlock.length > 0;
  const hasAuthorText = lower.includes("robert simm") || lower.includes("ahip certified") || lower.includes("#10447418") || lower.includes("10447418");
  const hasPersonSchema = lower.includes("generationhealth.me/#author") || lower.includes('"person"');
  results["opt-author"] = hasAuthorBlock || hasAuthorText || hasPersonSchema;
  results["opt-author-detail"] = hasAuthorBlock ? ".gh-author block ✓" : hasAuthorText ? "Author text found ✓" : "No author signal";

  // ── 4. FRESHNESS / DATEMODIFIED ──────────────────────────────────────────
  // v5.1 schema: dateModified in Article + MedicalWebPage nodes (in <head>).
  // Partial content: look for 2026 references + any date signal.
  const has2026 = lower.includes("2026");
  const hasDateModified = lower.includes("datemodified") || lower.includes("date_modified");
  const hasUpdatedText = lower.includes("last updated") || lower.includes("reviewed by") || lower.includes("updated:") || lower.includes("as of 2026");
  // v5.1 pages always have dateModified in schema — partial pages pass on 2026 alone
  results["opt-fresh"] = has2026 && (hasDateModified || hasUpdatedText || isPartial);
  results["opt-fresh-detail"] = (has2026 ? "2026 ✓" : "No 2026 ref") + " | " + (hasDateModified ? "dateModified ✓" : hasUpdatedText ? "Updated text ✓" : "Partial content — 2026 sufficient");

  // ── 5. INSTANT ANSWER BLOCK ──────────────────────────────────────────────
  // v5.1: .gh-answer is THE instant answer block (blue gradient box near top).
  // This is the most reliable signal — always present in v5.1 pages.
  const answerBlock = doc.querySelectorAll(".gh-answer, .gh-answer-label");
  const hasAnswerBlock = answerBlock.length > 0;
  const hasQuickText = lower.includes("quick answer") || lower.includes("short answer") || lower.includes("the answer is");
  results["opt-instant"] = hasAnswerBlock || hasQuickText;
  results["opt-instant-detail"] = hasAnswerBlock ? ".gh-answer block ✓" : hasQuickText ? "Answer text pattern ✓" : "No .gh-answer block found";

  // ── 6. COMPARISON TABLES ─────────────────────────────────────────────────
  // v5.1: .gh-comparison + .gh-comparison-card grid. Also standard <table>.
  const htmlTables = doc.querySelectorAll("table");
  const compCards = doc.querySelectorAll(".gh-comparison, .gh-comparison-card, .gh-comp-item");
  const compClasses = doc.querySelectorAll("[class*='gh-comp'],[class*='comparison']");
  results["opt-tables"] = htmlTables.length > 0 || compCards.length > 0 || compClasses.length > 0;
  results["opt-tables-detail"] = htmlTables.length + " <table> + " + compCards.length + " .gh-comparison elements";

  // ── 7. IMAGES / GRAPHICS ─────────────────────────────────────────────────
  // v5.1: .gh-trust-strip + .gh-trust-badge always present in every page.
  const trustBadges = doc.querySelectorAll(".gh-trust-strip, .gh-trust-badge");
  const imgs = doc.querySelectorAll("img");
  let realImgs = 0;
  imgs.forEach(img => {
    const src = (img.getAttribute("src") || "").toLowerCase();
    if (src && !src.includes("data:") && !src.includes("pixel") && !src.includes("1x1") && src.length > 10) realImgs++;
  });
  results["opt-graphics"] = realImgs >= 1 || trustBadges.length > 0;
  results["opt-graphics-detail"] = realImgs + " images + " + trustBadges.length + " trust badges";

  // ── 8. CHARTS / VISUAL DATA ──────────────────────────────────────────────
  // v5.1: .gh-chart + .gh-bar bar chart components. Also SVG, canvas.
  const chartEls = doc.querySelectorAll(".gh-chart, .gh-chart-header");
  const barEls = doc.querySelectorAll(".gh-bar, .gh-bar-fill");
  const svgEls = doc.querySelectorAll("svg:not([width='16']):not([width='14']):not([width='18']):not([width='12']):not([width='20']):not([width='24'])");
  const canvasEls = doc.querySelectorAll("canvas");
  results["opt-charts"] = chartEls.length > 0 || barEls.length > 0 || svgEls.length > 0 || canvasEls.length > 0;
  results["opt-charts-detail"] = chartEls.length + " .gh-chart + " + barEls.length + " .gh-bar + " + svgEls.length + " SVG";

  // ── 9. INTERNAL LINKS ────────────────────────────────────────────────────
  let internalLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("generationhealth.me") && !h.includes("#")) internalLinks++;
  });
  results["opt-internal"] = internalLinks >= 3;
  results["opt-internal-detail"] = internalLinks + " internal links";

  // ── 10. OUTBOUND .GOV ────────────────────────────────────────────────────
  results["opt-outbound"] = totalGovSignals >= 1;
  results["opt-outbound-detail"] = totalGovSignals + " .gov signals total";

  // ── 11. V5.1 TEMPLATE DETECTION ──────────────────────────────────────────
  const hasV51 = lower.includes("gh-answer") || lower.includes("gh-faq") || lower.includes("gh-chart") || lower.includes("gh-author") || lower.includes("gh-trust-strip") || lower.includes("gh-comparison");
  results["opt-v51"] = hasV51;
  results["opt-v51-detail"] = hasV51 ? "v5.1 template ✓" : "Pre-v5.1 — needs rebuild";

  // FB & GMB cannot be detected from HTML
  results["opt-fb"] = false;
  results["opt-gmb"] = false;

  return results;
}

          </button>
        </div>
      </div>
    </div>
  </div>;
};

const NoteField = ({value, onChange, dark=true}) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value||"");
  const ref = useRef(null);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const save=()=>{onChange(draft);setEditing(false);};
  if(!editing&&!value) return <button onClick={()=>{setDraft("");setEditing(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:dark?"rgba(255,255,255,0.3)":"#C4CDD5",padding:"2px 0",fontFamily:"inherit"}}>+ note</button>;
  if(!editing) return <div onClick={()=>{setDraft(value);setEditing(true);}} style={{fontSize:12,color:dark?"rgba(255,255,255,0.5)":"#6B7B8D",fontStyle:"italic",cursor:"pointer",padding:"2px 0"}}>{value}</div>;
  return <div style={{display:"flex",gap:5,alignItems:"center",marginTop:4}}>
    <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} style={{flex:1,background:dark?"rgba(255,255,255,0.06)":"#F3F5F7",border:`1px solid ${dark?"rgba(255,255,255,0.12)":"#E8ECF0"}`,borderRadius:6,padding:"5px 10px",fontSize:12,color:dark?"#E8ECF0":"#1A2332",fontFamily:"inherit",outline:"none"}} />

const PerformanceView = ({perfData,setPerfData,perfEntry,setPerfEntry,perfEditing,setPerfEditing,perfShowForm,setPerfShowForm,blankPerfEntry,PERF_KEYWORDS,T,isDark}) => {
  const weeks = (perfData||[]).slice().sort((a,b)=>a.weekOf.localeCompare(b.weekOf));
  const latest = weeks.length>0?weeks[weeks.length-1]:null;
  const prev = weeks.length>1?weeks[weeks.length-2]:null;
  const delta = (cur,prv) => {
    if(!prv||prv===0) return null;
    return ((cur-prv)/prv*100);
  };
  const arrow = (d) => {
    if(d===null) return {sym:"\u2014",color:"#6B7B8D"};
    if(d>0) return {sym:"\u2191 "+Math.abs(d).toFixed(0)+"%",color:"#16A34A"};
    if(d<0) return {sym:"\u2193 "+Math.abs(d).toFixed(0)+"%",color:"#EF4444"};
    return {sym:"\u2192 0%",color:"#D97706"};
  };

  const Spark = ({data,color,h=32,w=120}) => {
    if(!data||data.length<2) return React.createElement("div",{style:{width:w,height:h,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#4B5C6E"}},"Need 2+ weeks");
    const max=Math.max(...data); const min=Math.min(...data); const range=max-min||1;
    const pts = data.map((v,i)=>(i/(data.length-1))*w+","+(h-((v-min)/range)*h)).join(" ");
    return React.createElement("svg",{width:w,height:h,style:{overflow:"visible"}},
      React.createElement("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"}),
      React.createElement("circle",{cx:w,cy:h-((data[data.length-1]-min)/range)*h,r:"3",fill:color})
    );
  };

  const saveEntry = () => {
    setPerfData(prev=>{
      const existing = prev.findIndex(e=>e.weekOf===perfEntry.weekOf);
      if(existing>=0){const n=[...prev];n[existing]=perfEntry;return n;}
      return [...prev,perfEntry];
    });
    setPerfEntry({...blankPerfEntry});
    setPerfShowForm(false);
    setPerfEditing(null);

  };

      <button onClick={()=>{setPerfEditing(null);setPerfEntry({...blankPerfEntry});setPerfShowForm(!perfShowForm);}} style={{padding:"10px 20px",borderRadius:10,border:"none",background:perfShowForm?"rgba(239,68,68,0.15)":"#0D9488",color:perfShowForm?"#F87171":"#FFF",fontSize:13,fontWeight:700,cursor:"pointer"}}>{perfShowForm?"\u2715 Cancel":"+ Log This Week"}</button>
    </div>

    {perfShowForm&&<div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:24,marginBottom:24,boxShadow:"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>

        <input type="date" value={perfEntry.weekOf} onChange={e=>setPerfEntry(p=>({...p,weekOf:e.target.value}))} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"6px 12px",color:"#FFF",fontSize:13,outline:"none"}} />
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))",gap:10,marginBottom:20}}>
        {[{k:"users",l:"Total Users"},{k:"organic",l:"Organic"},{k:"chatgpt",l:"ChatGPT"},{k:"direct",l:"Direct"},{k:"social",l:"Social"}].map(f=>
          <div key={f.k}><div style={{fontSize:11,color:"#6B7B8D",marginBottom:4}}>{f.l}</div>
          <input type="number" value={perfEntry[f.k]||""} onChange={e=>setPerfEntry(p=>({...p,[f.k]:parseInt(e.target.value)||0}))} placeholder="0" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 12px",color:"#FFF",fontSize:15,fontWeight:700,outline:"none"}} /></div>

    </div>}

    {weeks.length>0 ? <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))",gap:12,marginBottom:24}}>
        {[
          {l:"Users",v:latest.users,pv:prev?prev.users:null,data:weeks.map(w=>w.users),c:"#60A5FA"},

      const overviewResp = await fetch(baseUrl, {

    // Build live pages directly from window.GH_CLUSTERS — don't depend on savedHTML being loaded
    const livePages = [];
    window.GH_CLUSTERS.forEach(c => {
      c.posts.forEach((p, i) => {
        if (p.status === "done" || p.status === "live") {
          livePages.push({ name: p.name, slug: p.slug, cluster: c.name, key: `${c.id}-${i}` });
        }
      });
    });
    if (!livePages.length) { alert("No live pages found to scan."); return; }
    setFullScanActive(true);
    setFullScanResults(null);
    const progress = { total: livePages.length, done: 0, current: "", errors: 0, results: [] };
    setFullScanProgress({ ...progress });

    const BENCHMARKS = ["opt-faq","opt-citations","opt-author","opt-fresh","opt-instant","opt-tables","opt-graphics","opt-charts"];
    const LABELS = { "opt-faq":"FAQ Schema","opt-citations":".gov Citations","opt-author":"Author Byline","opt-fresh":"Freshness Date","opt-instant":"Instant Answer","opt-tables":"Comparison Table","opt-graphics":"Images/Graphics","opt-charts":"Charts/Visuals" };
    const CONCURRENCY = 3;

    const processPage = async (page) => {
      try {
        const html = await fetchPageHTML(page.slug);
        if (!html) {
          return { name: page.name, slug: page.slug, cluster: page.cluster, failed: true, missing: BENCHMARKS, score: 0 };
        }
        const scan = scanHTML(html);
        const missing = BENCHMARKS.filter(b => !scan[b]);
        const score = Math.round(((BENCHMARKS.length - missing.length) / BENCHMARKS.length) * 100);
        return { name: page.name, slug: page.slug, cluster: page.cluster, failed: false, missing, score, details: scan };
      } catch(e) {
        return { name: page.name, slug: page.slug, cluster: page.cluster, failed: true, missing: BENCHMARKS, score: 0 };
      }
    };

    // Process in batches of CONCURRENCY
    const results = [];
    for (let i = 0; i < livePages.length; i += CONCURRENCY) {
      const batch = livePages.slice(i, i + CONCURRENCY);
      // Update current page display
      progress.current = batch.map(p => p.name).join(", ");
      setFullScanProgress({ ...progress });
      const batchResults = await Promise.all(batch.map(processPage));
      batchResults.forEach(r => {
        results.push(r);
        progress.done++;
        if (r.failed) progress.errors++;
        progress.results = [...results];
      });
      setFullScanProgress({ ...progress });
      // Small delay to avoid hammering proxies
      if (i + CONCURRENCY < livePages.length) await new Promise(r => setTimeout(r, 400));
    }

    setFullScanResults(results);
    setFullScanActive(false);
    setFullScanProgress(null);

    // Build summary report for AI
    const perfect = results.filter(r => r.score === 100);
    const critical = results.filter(r => r.score < 50).sort((a,b) => a.score - b.score);
    const moderate = results.filter(r => r.score >= 50 && r.score < 88).sort((a,b) => a.score - b.score);
    const avgScore = Math.round(results.reduce((s,r) => s + r.score, 0) / results.length);

    // Count missing by benchmark type
    const missingCounts = {};
    BENCHMARKS.forEach(b => { missingCounts[b] = results.filter(r => r.missing.includes(b)).length; });
    const topMissing = Object.entries(missingCounts).sort((a,b) => b[1]-a[1]);

    const reportLines = [
      `FULL SITE SCAN COMPLETE — ${results.length} pages scanned`,
      `Average benchmark score: ${avgScore}% | Perfect pages: ${perfect.length} | Pages needing work: ${results.length - perfect.length} | Fetch errors: ${progress.errors}`,
      ``,
      `MOST COMMON MISSING BENCHMARKS:`,
      ...topMissing.map(([b,n]) => `  • ${LABELS[b]}: missing on ${n}/${results.length} pages`),
      ``,
      `CRITICAL PAGES (score < 50%) — fix these first:`,
      ...(critical.length ? critical.slice(0,15).map(r => `  • ${r.name} (/${r.slug}) — ${r.score}% — missing: ${r.missing.map(m=>LABELS[m]).join(", ")}`) : ["  None — great work!"]),
      ``,
      `MODERATE GAPS (50–87%):`,
      ...(moderate.length ? moderate.slice(0,20).map(r => `  • ${r.name} (/${r.slug}) — ${r.score}% — missing: ${r.missing.map(m=>LABELS[m]).join(", ")}`) : ["  None!"]),
      ``,
      `PERFECT PAGES (100%): ${perfect.length > 0 ? perfect.map(r=>r.name).join(", ") : "None yet"}`,
    ];

    const reportText = reportLines.join("\n");
    sendAiMessage(`Here are the full site scan results for all ${results.length} live GenerationHealth.me pages. Analyze this data, identify the highest-impact opportunities, and give me a prioritized action plan — which pages and benchmarks to fix first for the biggest SEO and conversion gains:\n\n${reportText}`);
  }, [aiApiKey, window.GH_CLUSTERS, sendAiMessage]);

  // Auto-scroll chat to bottom
  useEffect(() => {
    if (aiChatRef.current) aiChatRef.current.scrollTop = aiChatRef.current.scrollHeight;
  }, [aiMessages, aiLoading]);

  // Save API key when it changes
  useEffect(() => {
    if (aiApiKey) try { localStorage.setItem("gh-cc-ai-key", aiApiKey); } catch(e) {}
  }, [aiApiKey]);

  return <div style={{minHeight:"100vh"}}>
    
    <div style={{background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"20px 24px",boxShadow:"none"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.15em",color:"#FFC72C",textTransform:"uppercase",marginBottom:4}}>GenerationHealth.me</div>

              {useBackend && <span style={{marginLeft:8,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:backendStatus==="connected"||backendStatus==="migrated"?T.greenBg:backendStatus==="connecting"?"rgba(251,146,60,0.15)":"rgba(255,255,255,0.03)",color:backendStatus==="connected"||backendStatus==="migrated"?"#4ADE80":backendStatus==="connecting"?"#FB923C":"#6B7B8D"}}>{backendStatus==="connected"?"● Server Synced":backendStatus==="migrated"?"● Server Migrated":backendStatus==="connecting"?"○ Connecting...":"○ Local Only"}</span>}
              {!useBackend && <span style={{marginLeft:8,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:"rgba(255,255,255,0.03)",color:"#6B7B8D"}}>○ Local Storage</span>}
            </p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:4,background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",borderRadius:12,padding:4,flexWrap:"wrap"}}>
              {[{id:"tree",label:"Architecture"},{id:"optimize",label:"Optimize"},{id:"operations",label:"⚡ Operations"},{id:"pageBuilder",label:"🏗️ Page Builder"},{id:"growth",label:"Growth Channels"},{id:"social",label:"Content Studio"},{id:"keywords",label:"Keyword War Room"},{id:"performance",label:"Performance"},{id:"analytics",label:"Analytics"},{id:"projections",label:"Projections"},{id:"calendar",label:"Calendar"},{id:"reminders",label:"Reminders"}].map(t=>
                <button key={t.id} onClick={()=>{setView(t.id);setBellOpen(false);}} style={{padding:"8px 16px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===t.id?(isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.1)"):"transparent",color:view===t.id?"#FFF":"#6B7B8D",transition:"all 0.2s"}}>{t.label}</button>
              )}
            </div>
            <div style={{display:"flex",gap:4,background:"rgba(255,199,44,0.08)",borderRadius:12,padding:4,border:"1px solid rgba(255,199,44,0.2)"}}>

            <button onClick={function(){setTheme(function(p){return p==="dark"?"light":"dark"})}} title={isDark?"Switch to Light Mode":"Switch to Dark Mode"} style={{width:40,height:40,borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,transition:"all 0.3s"}}>{isDark?"☀️":"🌙"}</button>
            
            {hasChanges&&<button onClick={doBackup} style={{height:40,padding:"0 16px",borderRadius:12,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(22,163,74,0.15)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,animation:"savePulse 2s ease-in-out infinite"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>

                    <div style={{fontSize:13,fontWeight:600,color:"#FFF"}}>{r.title}</div>

                })}
                {activeReminders.length>0&&<button onClick={()=>{setView("reminders");setBellOpen(false);}} style={{width:"100%",marginTop:10,padding:"10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#4B9CD3",fontSize:12,fontWeight:700,cursor:"pointer"}}>View All Reminders</button>}
              </div>}
            </div>
          </div>
        </div>
      </div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 24px 80px"}}>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))",gap:12,marginBottom:28}}>
        {[{label:"Tasks Done",value:calDone+opsDone,sub:`of ${totalCalTasks+opsTotalTasks}`},{label:"Live Pages",value:livePages,sub:`of ${totalPages}`},{label:"Clusters Built",value:window.GH_CLUSTERS.length-plannedClusters,sub:`of ${window.GH_CLUSTERS.length}`},{label:"County Hubs",value:"7 Live",sub:"all complete"},{label:"Top Source",value:"ChatGPT",sub:"460 users"}].map((s,i)=>
          <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"18px 20px",boxShadow:"none"}}>

      {view==="tree" && <>
        <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
          <button onClick={()=>setPhaseFilter(0)} style={{padding:"8px 18px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:phaseFilter===0?(isDark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.1)"):(isDark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)"),color:phaseFilter===0?"#FFF":"#6B7B8D"}}>All</button>
          {PHASES.map(p=><button key={p.id} onClick={()=>setPhaseFilter(p.id)} style={{padding:"8px 18px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:phaseFilter===p.id?`${p.color}30`:(isDark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)"),color:phaseFilter===p.id?p.color:"#6B7B8D"}}>{p.active?"● ":""}{p.label}</button>)}

                    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:"rgba(255,255,255,0.06)",borderBottom:"1px solid rgba(255,255,255,0.08)"}},
                      React.createElement("span",{style:{fontSize:10,fontWeight:600,color:"#6B7B8D",textTransform:"uppercase"}},lang||"code"),
                      React.createElement("div",{style:{display:"flex",gap:6}},
                        React.createElement("button",{onClick:function(){navigator.clipboard.writeText(code)},style:{padding:"2px 10px",borderRadius:4,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#6B7B8D",fontSize:10,cursor:"pointer"}},"Copy"),
                        isHTML?React.createElement("button",{onClick:function(){
                          var blob=new Blob([code],{type:"text/html"});
                          var url=URL.createObjectURL(blob);
                          var a=document.createElement("a");
                          a.href=url;a.download="gh-section-"+Date.now()+".html";
                          document.body.appendChild(a);a.click();document.body.removeChild(a);
                          URL.revokeObjectURL(url);
                        },style:{padding:"2px 10px",borderRadius:4,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(22,163,74,0.15)",color:"#4ADE80",fontSize:10,fontWeight:700,cursor:"pointer"}},"Download HTML"):null
                      )
                    ),
                    React.createElement("pre",{style:{padding:"10px 12px",margin:0,fontSize:11,lineHeight:1.5,color:"#C4CDD5",overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:400}},code)
                  );
                }
                return React.createElement("div",{key:pi,style:{whiteSpace:"pre-wrap"}},part);
              });
              return React.createElement("div",{key:i,style:{display:"flex",flexDirection:"column",alignItems:"flex-start",maxWidth:"85%",alignSelf:"flex-start"}},
                React.createElement("div",{style:{padding:"12px 18px",borderRadius:"16px 16px 16px 4px",background:"rgba(255,199,44,0.05)",border:"1px solid rgba(255,199,44,0.2)",color:"#E8ECF0",fontSize:13,lineHeight:1.7,wordBreak:"break-word",overflow:"hidden"}},elements),
                React.createElement("div",{style:{fontSize:9,color:"#4B5C6E",marginTop:3,padding:"0 4px"}},"AI Agent")
              );
            })}
            {aiLoading&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 18px",background:"rgba(255,199,44,0.05)",borderRadius:14,alignSelf:"flex-start",border:"1px solid rgba(255,199,44,0.2)"}}>
              <div style={{display:"flex",gap:4}}>{[0,1,2].map(function(j){return React.createElement("div",{key:j,style:{width:7,height:7,borderRadius:4,background:"#FFC72C",animation:"dotPulse 1.2s ease-in-out "+j*0.2+"s infinite"}})})}</div>
              <span style={{fontSize:12,color:"#A08C5A"}}>AI Agent thinking...</span>
            </div>}
          </div>

          
          <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)",background:"rgba(0,0,0,0.15)",borderRadius:"0 0 16px 16px"}}>
            {aiAttachedPage&&(function(){var pg=allPagesFlat.find(function(p){return p.key===aiAttachedPage});var label=pg?pg.name:aiAttachedPage.indexOf("ai-fetch")===0?"Fetched page":"Attached";var size=pg?Math.round(pg.htmlSize/1024):savedHTML[aiAttachedPage]?Math.round(savedHTML[aiAttachedPage].length/1024):0;return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",marginBottom:8,background:"rgba(255,199,44,0.08)",border:"1px solid rgba(255,199,44,0.2)",borderRadius:8}},
              React.createElement("span",{style:{fontSize:11,color:"#FFC72C"}},"Attached: "+label),
              size>0?React.createElement("span",{style:{fontSize:10,color:"#6B7B8D"}},"("+size+"KB)"):null,
              React.createElement("button",{onClick:function(){setAiAttachedPage("")},style:{marginLeft:"auto",background:"none",border:"none",color:"#6B7B8D",cursor:"pointer",fontSize:14,padding:"0 4px"}},"x")
            )})()}
            {aiAttachOpen&&<div style={{maxHeight:250,overflowY:"auto",marginBottom:8,background:"#1A2840",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6B7B8D",textTransform:"uppercase",letterSpacing:"0.1em",padding:"4px 8px",marginBottom:4}}>Attach cached page HTML</div>
              {allPagesFlat.filter(function(p){return p.hasHTML}).map(function(pg){return React.createElement("button",{key:pg.key,onClick:function(){setAiAttachedPage(pg.key);setAiAttachOpen(false)},style:{display:"block",width:"100%",textAlign:"left",padding:"6px 8px",borderRadius:6,border:"none",background:aiAttachedPage===pg.key?"rgba(255,199,44,0.08)":"transparent",color:"#C4CDD5",fontSize:11,cursor:"pointer",marginBottom:2}},pg.name+" /"+pg.slug)})}
            </div>}
            
            {aiFile&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",marginBottom:8,background:"rgba(75,156,211,0.08)",border:"1px solid rgba(75,156,211,0.25)",borderRadius:10}}>
              <span style={{fontSize:16}}>{aiFile.type?.includes("pdf")?"📄":"🖼️"}</span>
              {aiFile.type?.includes("image")&&<img src={aiFile.data} style={{height:40,borderRadius:6,border:"1px solid rgba(255,255,255,0.1)"}} alt="preview"/>}
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:"#E8ECF0"}}>{aiFile.name}</div>
                <div style={{fontSize:10,color:"#6B7B8D"}}>{aiFile.type?.includes("pdf")?"PDF document":"Image"} · {Math.round((aiFile.data?.length||0)*0.75/1024)}KB</div>
              </div>
              <button onClick={function(){setAiFile(null)}} style={{background:"none",border:"none",color:"#6B7B8D",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
            </div>}
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <button onClick={function(){setAiAttachOpen(!aiAttachOpen)}} style={{width:40,height:40,borderRadius:12,border:aiAttachedPage?"1.5px solid rgba(255,199,44,0.4)":"1px solid rgba(255,255,255,0.1)",background:aiAttachedPage?"rgba(255,199,44,0.1)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} title="Attach cached page">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={aiAttachedPage?"#FFC72C":"#6B7B8D"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button onClick={function(){if(aiFileInputRef.current)aiFileInputRef.current.click()}} style={{width:40,height:40,borderRadius:12,border:aiFile?"1.5px solid rgba(75,156,211,0.4)":"1px solid rgba(255,255,255,0.1)",background:aiFile?"rgba(75,156,211,0.1)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} title="Upload image or PDF">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={aiFile?"#4B9CD3":"#6B7B8D"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </button>
              <input ref={aiFileInputRef} type="file" accept="image/*,.pdf,.png,.jpg,.jpeg,.gif,.webp" style={{display:"none"}} onChange={function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){setAiFile({data:ev.target.result,type:file.type,name:file.name})};reader.readAsDataURL(file);e.target.value=""}}/>
              <textarea ref={aiInputRef} value={aiInput} onChange={function(e){setAiInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(aiInput.trim()||aiFile)sendAiMessage(aiInput)}}} placeholder="Ask the AI Agent about your site, traffic, rankings, ads..." rows={2} style={{flex:1,padding:"12px 16px",borderRadius:14,border:"1px solid rgba(255,199,44,0.2)",background:"rgba(255,255,255,0.04)",color:"#FFF",fontSize:13,outline:"none",resize:"none",maxHeight:140,lineHeight:1.5,fontFamily:"inherit"}} />
              <button onClick={function(){sendAiMessage(aiInput)}} disabled={aiLoading||(!aiInput.trim()&&!aiFile)} style={{width:40,height:40,borderRadius:12,border:"none",background:(aiInput.trim()||aiFile)&&!aiLoading?"linear-gradient(135deg,#FFC72C,#FFD54F)":"#333",cursor:(aiInput.trim()||aiFile)&&!aiLoading?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={(aiInput.trim()||aiFile)&&!aiLoading?"#1A2332":"#666"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <div style={{fontSize:10,color:"#4B5C6E",marginTop:6}}>Shift+Enter for new line &middot; Enter to send &middot; 📎 Attach page &middot; ⬆ Upload screenshot/PDF</div>
          </div>
        </div>
      </div>}

    </div>
    {scanTarget && <ScanModal onScan={handleScan} onClose={()=>setScanTarget(null)} initialHTML={savedHTML[`${scanTarget.clusterId}-${scanTarget.postIdx}`]||""} T={T} />}
    {saveTarget && <ScanModal onScan={handleSaveOnly} onClose={()=>setSaveTarget(null)} initialHTML={savedHTML[`${saveTarget.clusterId}-${saveTarget.postIdx}`]||""} saveOnly={true} T={T} />}

    
    {previewFile&&<div style={{position:"fixed",inset:0,zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={()=>setPreviewFile(null)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)"}}></div>
      <div style={{position:"relative",zIndex:2,maxWidth:"90vw",maxHeight:"90vh",background:"#1A2840",borderRadius:16,border:"1px solid rgba(255,255,255,0.12)",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#FFF"}}>{previewFile.name}</div>
            <div style={{fontSize:10,color:"#6B7B8D"}}>{previewFile.date} · {previewFile.section?.toUpperCase()} · {(previewFile.size/1024).toFixed(0)}KB</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={async()=>{
              const data = previewFile.data || await loadFileData(previewFile.id);
              if(!data)return;
              setView("aiAgent");
              const imgMsg = previewFile.type?.includes("image")
                ? `Please analyze this ${previewFile.section?.toUpperCase()} screenshot from ${previewFile.date} (${previewFile.name}). What key metrics do you see? What should I optimize?`
                : `I've uploaded a ${previewFile.section?.toUpperCase()} PDF from ${previewFile.date} (${previewFile.name}). What insights can you extract? What should I focus on?`;
              setAiMessages(prev=>[...prev,{role:"user",content:imgMsg,fileData:data,fileType:previewFile.type,fileName:previewFile.name}]);
              setPreviewFile(null);
            }} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(255,199,44,0.2)",background:"rgba(255,199,44,0.08)",color:"#FFC72C",fontSize:11,fontWeight:700,cursor:"pointer"}}>🤖 Analyze</button>
            <button onClick={async()=>{
              const data = previewFile.data || await loadFileData(previewFile.id);
              if(!data)return;
              setView("aiAgent");
              setAiMessages(prev=>[...prev,{role:"user",content:`Extract all metrics from this screenshot (${previewFile.name}) from ${previewFile.date} and add them to my charts. Read every number visible and output them in the extraction format so they auto-populate my bar charts.`,fileData:data,fileType:previewFile.type,fileName:previewFile.name}]);
              setPreviewFile(null);
            }} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(74,222,128,0.08)",color:"#4ADE80",fontSize:11,fontWeight:700,cursor:"pointer"}}>📊 Extract to Charts</button>
            <button onClick={()=>setPreviewFile(null)} style={{width:28,height:28,borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"none",color:"#6B7B8D",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>
        <div style={{overflow:"auto",maxHeight:"80vh",padding:16}}>
          {previewFile.type?.includes("image")
            ? <img src={previewFile.data} style={{maxWidth:"100%",borderRadius:8}} alt={previewFile.name} />
            : previewFile.type?.includes("pdf")
              ? <iframe src={previewFile.data} style={{width:"100%",minHeight:"70vh",border:"none",borderRadius:8}} title={previewFile.name}></iframe>
              : <p style={{color:"#6B7B8D"}}>Preview not available for this file type.</p>
          }
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
