  var h1m = html.match(/<span class="gh-h1-line1[^"]*">([\s\S]*?)<\/span>/i);

  check("nepq-consequence","Consequence language",lower.includes("cost you")||lower.includes("penalty")||lower.includes("locked")||lower.includes("surprise bill")||lower.includes("could cost"),null,2);

const STORAGE_VERSION = 2;

function migrateFromV1() {
  try {
    const old = localStorage.getItem(SKEY);
    if (!old) return null;
    const d = JSON.parse(old);
    // Save to split keys
    if (d.done) safeLSSet(SKEY_DONE, d.done);
    if (d.notes) safeLSSet(SKEY_NOTES, d.notes);
    if (d.reminders) safeLSSet(SKEY_REMINDERS, d.reminders);
    if (d.perfData) safeLSSet(SKEY_PERF, d.perfData);
    safeLSSet(SKEY_META, { version: STORAGE_VERSION });
    // Remove old key to free space (savedHTML was biggest offender)
    localStorage.removeItem(SKEY);
    console.log("Migrated from v1 → v2 split storage. Freed ~" + Math.round(old.length/1024) + "KB");
    return d;
  } catch(e) { console.error("Migration failed:", e); return null; }
}

let _storageWarningShown = false;
function safeLSSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch(e) {
    if (e.name === "QuotaExceededError" || e.code === 22) {
      console.warn("Storage quota exceeded for key:", key);
      // Try to free space: purge notes (scan details) first, they're regenerable
      if (key !== SKEY_NOTES) {
        try { localStorage.removeItem(SKEY_NOTES); console.log("Purged notes to free space"); localStorage.setItem(key, JSON.stringify(val)); return true; } catch(e2) {}
      }
      if (!_storageWarningShown) {
        _storageWarningShown = true;
        setTimeout(() => {
          if (typeof document !== 'undefined') {
            const w = document.createElement('div');
            w.innerHTML = '<div style="position:fixed;top:12px;right:12px;z-index:9999;background:#FEF2F2;border:2px solid #DC2626;border-radius:12px;padding:16px 20px;max-width:400px;font-family:sans-serif;font-size:13px;color:#991B1B;box-shadow:0 8px 32px rgba(0,0,0,0.2)"><b>⚠ Storage Full</b><br>Browser storage limit reached. Your progress is safe in memory but may not persist after refresh.<br><button onclick="this.parentElement.remove()" style="margin-top:8px;padding:4px 12px;border-radius:6px;border:1px solid #DC2626;background:white;color:#DC2626;cursor:pointer;font-size:12px">Dismiss</button></div>';
            document.body.appendChild(w);
          }
        }, 500);
      }
    }
    console.error("localStorage write failed:", key, e);
    return false;
  }
}
function safeLSGet(key) { try { const v = localStorage.getItem(key); if(v===null||v===undefined||v==="undefined"||v==="") return null; return JSON.parse(v); } catch { console.warn("safeLSGet parse error:",key); return null; } }

function loadLocal() {
  try {
    // Check if already migrated to v2
    const meta = safeLSGet(SKEY_META);
    if (!meta || meta.version !== STORAGE_VERSION) {
      // Try migrating from v1
      const migrated = migrateFromV1();
      if (migrated) {
        // Don't include savedHTML — it stays in memory only
        return { done: migrated.done||{}, notes: migrated.notes||{}, reminders: migrated.reminders||[], perfData: migrated.perfData||[], learnings: migrated.learnings||[], savedHTML: migrated.savedHTML||{} };

      // No v1 data either — use baked data
      saveLocal(BAKED_DATA);
      return BAKED_DATA;
    }
    // Load from split keys
    return {
      done: safeLSGet(SKEY_DONE) || BAKED_DATA.done || {},
      notes: safeLSGet(SKEY_NOTES) || BAKED_DATA.notes || {},
      reminders: safeLSGet(SKEY_REMINDERS) || BAKED_DATA.reminders || [],

      learnings: safeLSGet(SKEY_LEARNINGS) || [],
      savedHTML: {} // Never load savedHTML from localStorage — memory/backend only
    };
  } catch(e) { console.error("loadLocal error:", e); return BAKED_DATA; }
}

function saveLocal(d) {
  safeLSSet(SKEY_DONE, d.done || {});
  safeLSSet(SKEY_NOTES, d.notes || {});
  safeLSSet(SKEY_REMINDERS, d.reminders || []);
  safeLSSet(SKEY_PERF, d.perfData || []);

// ── IndexedDB for HTML Storage ──
// localStorage can't handle 80+ full HTML pages (5MB limit).
// IndexedDB provides 100MB+ storage — perfect for full-site HTML cache.
const IDB_VERSION = 1;

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSaveHTML(key, html) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(html, key);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB save failed:", key, e); return false; }
}

async function idbLoadHTML(key) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => { db.close(); resolve(req.result || null); };
      req.onerror = () => { db.close(); reject(req.error); };
    });
  } catch(e) { console.error("IDB load failed:", key, e); return null; }
}

async function idbLoadAllHTML() {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const store = tx.objectStore(IDB_STORE);
      const allKeys = store.getAllKeys();
      const allVals = store.getAll();
      tx.oncomplete = () => {
        db.close();
        const map = {};
        for (let i = 0; i < allKeys.result.length; i++) {
          map[allKeys.result[i]] = allVals.result[i];
        }
        resolve(map);
      };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB loadAll failed:", e); return {}; }
}

async function idbDeleteHTML(key) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB delete failed:", key, e); return false; }
}

async function idbClearAllHTML() {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch(e) { console.error("IDB clear failed:", e); return false; }
}

// Migrate old savedHTML from v1 localStorage blob into IndexedDB (one-time)
async function migrateHTMLtoIDB() {
  try {
    const old = localStorage.getItem(SKEY);
    if (!old) return 0;
    const d = JSON.parse(old);
    if (!d.savedHTML || Object.keys(d.savedHTML).length === 0) return 0;
    let count = 0;
    for (const [k,v] of Object.entries(d.savedHTML)) {
      if (v && v.length > 100) { await idbSaveHTML(k, v); count++; }

    // Remove savedHTML from the old blob to free localStorage space
    delete d.savedHTML;
    try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch(e) {}
    console.log("Migrated " + count + " HTML pages from localStorage to IndexedDB");
    return count;
  } catch(e) { console.error("HTML→IDB migration failed:", e); return 0; }
}

const GH_BASE = "https://generationhealth.me/";

async function fetchWithTimeout(url, ms=20000) {
  // Use a race between fetch and a timeout promise
  // (Avoids AbortSignal issues in sandboxed iframe environments)
  return Promise.race([
    fetch(url, { headers: { "Accept": "text/html,*/*" } }),
    new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout after " + ms + "ms")), ms))
  ]);
}

async function fetchPageHTML(slug) {
  if (!slug) return null;
  const fullURL = slug.startsWith("http") ? slug : `${GH_BASE}${slug}/`;
  console.log("[GH Fetch] Starting fetch for:", fullURL);

  // Detect if running inside a sandboxed iframe (e.g. Claude.ai artifact preview)
  const inSandbox = window.self !== window.top;
  if (inSandbox) {
    console.warn("[GH Fetch] Running in sandboxed iframe — network requests may be blocked. Download the file and open in a regular browser tab for full fetch functionality.");
  }

  // Strategy 0: WordPress REST API — often has CORS headers enabled
  // Fetches rendered content via WP's built-in API
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/pages?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const pages = await resp.json();
      if (pages.length > 0 && pages[0].content && pages[0].content.rendered) {
        const rendered = pages[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST pages:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST pages failed:", e.message); }

  // Also try posts endpoint (in case page is a post type)
  try {
    const apiURL = `${GH_BASE}wp-json/wp/v2/posts?slug=${slug.split('/').filter(Boolean).pop()}&_fields=content,link`;
    const resp = await fetchWithTimeout(apiURL, 12000);
    if (resp.ok) {
      const posts = await resp.json();
      if (posts.length > 0 && posts[0].content && posts[0].content.rendered) {
        const rendered = posts[0].content.rendered;
        if (rendered.length > 200) { console.log("[GH Fetch] ✓ WP REST posts:", slug, Math.round(rendered.length/1024)+"KB"); return rendered; }
      }
    }
  } catch(e) { console.log("[GH Fetch] WP REST posts failed:", e.message); }

  // Strategy 1: Direct fetch (works if CC is hosted on same domain or CORS enabled)
  try {
    const resp = await fetchWithTimeout(fullURL, 10000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ Direct fetch:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] Direct failed:", e.message); }

  // Strategy 2: allorigins (most reliable free CORS proxy)
  try {
    const resp = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) {
      const data = await resp.json();
      if (data.contents && data.contents.length > 500) { console.log("[GH Fetch] ✓ allorigins:", slug, Math.round(data.contents.length/1024)+"KB"); return data.contents; }
    }
  } catch(e) { console.log("allorigins failed:", e.message); }

  // Strategy 3: corsproxy.io
  try {
    const resp = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(fullURL)}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ corsproxy.io:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] corsproxy.io failed:", e.message); }

  // Strategy 4: cors-anywhere (Heroku demo)
  try {
    const resp = await fetchWithTimeout(`https://cors-anywhere.herokuapp.com/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ cors-anywhere:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] cors-anywhere failed:", e.message); }

  // Strategy 5: thingproxy
  try {
    const resp = await fetchWithTimeout(`https://thingproxy.freeboard.io/fetch/${fullURL}`, 20000);
    if (resp.ok) { const html = await resp.text(); if (html.length > 500 && html.includes("<")) { console.log("[GH Fetch] ✓ thingproxy:", slug, Math.round(html.length/1024)+"KB"); return html; } }
  } catch(e) { console.log("[GH Fetch] thingproxy failed:", e.message); }

  console.error("[GH Fetch] ✗ ALL strategies failed for:", slug);
  return null;
}

// Fetch + scan + store a single page
async function fetchAndScanPage(slug, clusterId, postIdx, setSavedHTML, setDone, setNotes, setLastScanResults, setHasChanges) {
  const html = await fetchPageHTML(slug);
  if (!html) return { success: false, error: "Could not fetch page" };
  const scanKey = `${clusterId}-${postIdx}`;
  const prefix = `op-${clusterId}-${postIdx}`;
  const results = scanHTML(html);

  // Store HTML
  setSavedHTML(prev => ({ ...prev, [scanKey]: html }));

  // Auto-check/uncheck based on scan
  const scannable = ["opt-instant","opt-faq","opt-citations","opt-author","opt-charts","opt-graphics","opt-tables","opt-fresh"];
  setDone(prev => {
    const next = { ...prev };
    scannable.forEach(k => {
      const key = `${prefix}-${k}`;
      if (results[k]) next[key] = Date.now();
      else delete next[key];
    });
    return next;
  });

  // Store scan results & notes
  setLastScanResults(prev => ({ ...prev, [scanKey]: results }));
  setNotes(prev => {
    const next = { ...prev };
    if (results["opt-citations-detail"]) next[`${prefix}-opt-citations`] = "Scan: " + results["opt-citations-detail"];
    if (results["opt-fresh-detail"]) next[`${prefix}-opt-fresh`] = "Scan: " + results["opt-fresh-detail"];
    if (results["opt-tables-detail"]) next[`${prefix}-opt-tables`] = "Scan: " + results["opt-tables-detail"];
    if (results["opt-graphics-detail"]) next[`${prefix}-opt-graphics`] = "Scan: " + results["opt-graphics-detail"];
    if (results["opt-charts-detail"]) next[`${prefix}-opt-charts`] = "Scan: " + results["opt-charts-detail"];
    if (results["opt-instant-detail"]) next[`${prefix}-opt-instant`] = "Scan: " + results["opt-instant-detail"];
    return next;
  });
  setHasChanges(true);
  return { success: true, size: html.length, results };
}

function scanHTML(html) {
  const results = {};
  const lower = html.toLowerCase();
  const doc = new DOMParser().parseFromString(html, "text/html");

  // Detect partial WP REST content (no full HTML doc — just body content)
  const isPartial = !lower.includes("<!doctype") && !lower.includes("<html");

  // ── 1. FAQ SCHEMA ─────────────────────────────────────────────────────────
  // v5.1: FAQPage lives in @graph in <head>. WP REST strips <head>.
  // Fallback: detect .gh-faq-item accordion (always in rendered body).
  let hasFAQ = false, hasArticle = false;
  if (!isPartial) {
    const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
    scripts.forEach(s => {
      try {
        const j = JSON.parse(s.textContent);
        const check = (obj) => {
          if (!obj) return;
          if (obj["@type"] === "FAQPage") hasFAQ = true;
          if (["Article","NewsArticle","BlogPosting","WebPage","MedicalWebPage"].includes(obj["@type"])) hasArticle = true;
          if (Array.isArray(obj["@graph"])) obj["@graph"].forEach(check);
        };
        check(j);
      } catch(e) {}
    });
  }
  // v5.1 FAQ accordion — present in WP REST rendered content
  const faqItems = doc.querySelectorAll(".gh-faq-item, .gh-faq-list, .gh-faq");
  if (faqItems.length >= 1) hasFAQ = true;
  if (lower.includes("faqpage") || lower.includes('"faq"')) hasFAQ = true;
  if (!isPartial && (lower.includes("medicalwebpage") || lower.includes('"article"'))) hasArticle = true;
  if (isPartial && faqItems.length >= 1) hasArticle = true;
  results["opt-faq"] = hasFAQ;
  results["opt-article-schema"] = hasArticle;

  // ── 2. .GOV CITATIONS ─────────────────────────────────────────────────────
  // v5.1 footer always has medicare.gov + ncdoi.gov. WP REST strips footer.
  // Count both link hrefs AND text mentions for partial content.
  const links = doc.querySelectorAll("a[href]");
  let govLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("medicare.gov") || h.includes("cms.gov") || h.includes("ncdoi.gov") || h.includes("ssa.gov") || h.includes("shiip") || h.includes("healthcare.gov")) govLinks++;
  });
  const govTextMentions = (lower.match(/medicare\.gov|cms\.gov|ncdoi\.gov|ssa\.gov|healthcare\.gov/g) || []).length;
  const totalGovSignals = govLinks + govTextMentions;
  // Full page needs 2+ (footer has them); partial REST content needs 1+
  results["opt-citations"] = isPartial ? totalGovSignals >= 1 : totalGovSignals >= 2;
  results["opt-citations-detail"] = govLinks + " .gov links + " + govTextMentions + " text mentions";

  // ── 3. AUTHOR / E-EAT ────────────────────────────────────────────────────
  // v5.1: .gh-author block is always rendered in page body.
  const authorBlock = doc.querySelectorAll(".gh-author, .gh-author-header, .gh-author-body");
  const hasAuthorBlock = authorBlock.length > 0;
  const hasAuthorText = lower.includes("robert simm") || lower.includes("ahip certified") || lower.includes("#10447418") || lower.includes("10447418");
  const hasPersonSchema = lower.includes("generationhealth.me/#author") || lower.includes('"person"');
  results["opt-author"] = hasAuthorBlock || hasAuthorText || hasPersonSchema;
  results["opt-author-detail"] = hasAuthorBlock ? ".gh-author block ✓" : hasAuthorText ? "Author text found ✓" : "No author signal";

  // ── 4. FRESHNESS / DATEMODIFIED ──────────────────────────────────────────
  // v5.1 schema: dateModified in Article + MedicalWebPage nodes (in <head>).
  // Partial content: look for 2026 references + any date signal.
  const has2026 = lower.includes("2026");
  const hasDateModified = lower.includes("datemodified") || lower.includes("date_modified");
  const hasUpdatedText = lower.includes("last updated") || lower.includes("reviewed by") || lower.includes("updated:") || lower.includes("as of 2026");
  // v5.1 pages always have dateModified in schema — partial pages pass on 2026 alone
  results["opt-fresh"] = has2026 && (hasDateModified || hasUpdatedText || isPartial);
  results["opt-fresh-detail"] = (has2026 ? "2026 ✓" : "No 2026 ref") + " | " + (hasDateModified ? "dateModified ✓" : hasUpdatedText ? "Updated text ✓" : "Partial content — 2026 sufficient");

  // ── 5. INSTANT ANSWER BLOCK ──────────────────────────────────────────────
  // v5.1: .gh-answer is THE instant answer block (blue gradient box near top).
  // This is the most reliable signal — always present in v5.1 pages.
  const answerBlock = doc.querySelectorAll(".gh-answer, .gh-answer-label");
  const hasAnswerBlock = answerBlock.length > 0;
  const hasQuickText = lower.includes("quick answer") || lower.includes("short answer") || lower.includes("the answer is");
  results["opt-instant"] = hasAnswerBlock || hasQuickText;
  results["opt-instant-detail"] = hasAnswerBlock ? ".gh-answer block ✓" : hasQuickText ? "Answer text pattern ✓" : "No .gh-answer block found";

  // ── 6. COMPARISON TABLES ─────────────────────────────────────────────────
  // v5.1: .gh-comparison + .gh-comparison-card grid. Also standard <table>.
  const htmlTables = doc.querySelectorAll("table");
  const compCards = doc.querySelectorAll(".gh-comparison, .gh-comparison-card, .gh-comp-item");
  const compClasses = doc.querySelectorAll("[class*='gh-comp'],[class*='comparison']");
  results["opt-tables"] = htmlTables.length > 0 || compCards.length > 0 || compClasses.length > 0;
  results["opt-tables-detail"] = htmlTables.length + " <table> + " + compCards.length + " .gh-comparison elements";

  // ── 7. IMAGES / GRAPHICS ─────────────────────────────────────────────────
  // v5.1: .gh-trust-strip + .gh-trust-badge always present in every page.
  const trustBadges = doc.querySelectorAll(".gh-trust-strip, .gh-trust-badge");
  const imgs = doc.querySelectorAll("img");
  let realImgs = 0;
  imgs.forEach(img => {
    const src = (img.getAttribute("src") || "").toLowerCase();
    if (src && !src.includes("data:") && !src.includes("pixel") && !src.includes("1x1") && src.length > 10) realImgs++;
  });
  results["opt-graphics"] = realImgs >= 1 || trustBadges.length > 0;
  results["opt-graphics-detail"] = realImgs + " images + " + trustBadges.length + " trust badges";

  // ── 8. CHARTS / VISUAL DATA ──────────────────────────────────────────────
  // v5.1: .gh-chart + .gh-bar bar chart components. Also SVG, canvas.
  const chartEls = doc.querySelectorAll(".gh-chart, .gh-chart-header");
  const barEls = doc.querySelectorAll(".gh-bar, .gh-bar-fill");
  const svgEls = doc.querySelectorAll("svg:not([width='16']):not([width='14']):not([width='18']):not([width='12']):not([width='20']):not([width='24'])");
  const canvasEls = doc.querySelectorAll("canvas");
  results["opt-charts"] = chartEls.length > 0 || barEls.length > 0 || svgEls.length > 0 || canvasEls.length > 0;
  results["opt-charts-detail"] = chartEls.length + " .gh-chart + " + barEls.length + " .gh-bar + " + svgEls.length + " SVG";

  // ── 9. INTERNAL LINKS ────────────────────────────────────────────────────
  let internalLinks = 0;
  links.forEach(a => {
    const h = (a.getAttribute("href") || "").toLowerCase();
    if (h.includes("generationhealth.me") && !h.includes("#")) internalLinks++;
  });
  results["opt-internal"] = internalLinks >= 3;
  results["opt-internal-detail"] = internalLinks + " internal links";

  // ── 10. OUTBOUND .GOV ────────────────────────────────────────────────────
  results["opt-outbound"] = totalGovSignals >= 1;
  results["opt-outbound-detail"] = totalGovSignals + " .gov signals total";

  // ── 11. V5.1 TEMPLATE DETECTION ──────────────────────────────────────────
  const hasV51 = lower.includes("gh-answer") || lower.includes("gh-faq") || lower.includes("gh-chart") || lower.includes("gh-author") || lower.includes("gh-trust-strip") || lower.includes("gh-comparison");
  results["opt-v51"] = hasV51;
  results["opt-v51-detail"] = hasV51 ? "v5.1 template ✓" : "Pre-v5.1 — needs rebuild";

  // FB & GMB cannot be detected from HTML
  results["opt-fb"] = false;
  results["opt-gmb"] = false;

  return results;
}

const PRIORITY_ORDER = ["Very High","High","Medium-High","Medium"];
function getPriorityScore(cluster) {
  const seo = PRIORITY_ORDER.indexOf(cluster.seoValue);
  const aeo = PRIORITY_ORDER.indexOf(cluster.aeoValue);
  const geo = PRIORITY_ORDER.indexOf(cluster.geoValue);
  return (seo===-1?4:seo)+(aeo===-1?4:aeo)+(geo===-1?4:geo);
}

const ScanModal = ({ onScan, onClose, initialHTML="", saveOnly=false, T }) => {
  const [html, setHtml] = useState(initialHTML);
  const taRef = useRef(null);
  useEffect(() => { if (taRef.current) taRef.current.focus(); }, []);
  const hasSaved = initialHTML.length > 100;
  function handleConnect(){
    setWpConnecting(true);setWpConnectMsg("");
    try{localStorage.setItem("gh-wp-url",wpUrl);localStorage.setItem("gh-wp-user",wpUser);localStorage.setItem("gh-wp-pass",wpPass);}catch(e){}
    var creds=btoa(wpUser+":"+wpPass);
    fetch(wpUrl.replace(/\/$/,"")+"/wp-json/wp/v2/users/me",{headers:{Authorization:"Basic "+creds}})
      .then(function(r){return r.ok?r.json().then(function(d){return{ok:true,d}}):r.json().then(function(d){return{ok:false,s:r.status,d}})})
      .then(function(r){
        if(r.ok){setWpConnected(true);setWpConnectMsg("Connected as "+(r.d.name||r.d.slug)+" ✅");}
        else{setWpConnected(false);setWpConnectMsg("Auth failed ("+r.s+"). Check username and Application Password.");}
        setWpConnecting(false);
      }).catch(function(e){setWpConnected(false);setWpConnectMsg("Error: "+e.message);setWpConnecting(false);});
  }
  function handleFindPage(){
    if(!wpFindSlug.trim()||!wpConnected)return;
    setWpFinding(true);
    var creds=btoa(wpUser+":"+wpPass);
    fetch(wpUrl.replace(/\/$/,"")+"/wp-json/wp/v2/pages?slug="+encodeURIComponent(wpFindSlug.trim()),{headers:{Authorization:"Basic "+creds}})
      .then(function(r){return r.json()})
      .then(function(data){
        if(data&&data.length>0){setWpPageId(String(data[0].id));setWpPageTitle(data[0].title&&data[0].title.rendered?data[0].title.rendered:"");setWpPageSlug(data[0].slug||wpFindSlug.trim());setWpPushMsg("Found page ID "+data[0].id);}
        else{setWpPageId("");setWpPushMsg("No existing page — will create new.");}
        setWpFinding(false);
      }).catch(function(e){setWpPushMsg("Error: "+e.message);setWpFinding(false);});
  }
  function handleWpPush(){
    if(!wpConnected){setWpPushMsg("Connect first.");return;}
    if(!wpHtml.trim()){setWpPushMsg("Paste HTML first.");return;}
    if(!wpPageTitle.trim()){setWpPushMsg("Enter a title.");return;}
    setWpPushing(true);setWpPushMsg("");setWpPushLog([]);
    var logW=function(m){setWpPushLog(function(p){return p.concat([m])});};
    var creds=btoa(wpUser+":"+wpPass);
    var base=wpUrl.replace(/\/$/,"");
    var body={title:wpPageTitle,content:wpHtml,status:wpStatus};
    if(wpPageSlug.trim())body.slug=wpPageSlug.trim();
    var url=wpPageId?base+"/wp-json/wp/v2/pages/"+wpPageId:base+"/wp-json/wp/v2/pages";
    logW(wpPageId?"Updating page ID "+wpPageId:"Creating new page...");
    fetch(url,{method:"POST",headers:{Authorization:"Basic "+creds,"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,s:r.status,d}})})
      .then(function(r){
        if(r.ok){logW("✅ "+(wpPageId?"Updated":"Created")+" page ID "+r.d.id);logW("🔗 "+(r.d.link||""));setWpPushMsg("Done → "+(r.d.link||""));if(!wpPageId)setWpPageId(String(r.d.id));}
        else{logW("Error "+r.s+": "+(r.d.message||JSON.stringify(r.d)));setWpPushMsg("Failed: "+(r.d.message||r.s));}
        setWpPushing(false);
      }).catch(function(e){setWpPushMsg(e.message);setWpPushing(false);});
  }
  function runWPChecklist(txt){ return window.runWPChecklist?window.runWPChecklist(txt):[]; }


  return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#1A2840",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:32,maxWidth:640,width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
      <h3 style={{fontSize:18,fontWeight:700,color:"#FFF",margin:"0 0 4px",fontFamily:"Georgia,serif"}}>{saveOnly?"Save Page Source":"Scan Page Source"}</h3>
      <p style={{fontSize:13,color:"#6B7B8D",margin:"0 0 16px"}}>{hasSaved?"Saved HTML loaded — paste new source to update.":(saveOnly?"Right-click your page \u2192 View Page Source \u2192 Select All \u2192 Copy \u2192 Paste below":"Right-click your page \u2192 View Page Source \u2192 Select All \u2192 Copy \u2192 Paste below")}</p>
      <textarea ref={taRef} value={html} onChange={e=>setHtml(e.target.value)} placeholder="Paste HTML source here..." style={{flex:1,minHeight:200,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:16,fontSize:13,color:"#E8ECF0",fontFamily:"monospace",resize:"vertical",outline:"none"}} />
      <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"space-between",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {hasSaved&&<span style={{fontSize:11,color:"#2DD4BF"}}>✓ {Math.round(initialHTML.length/1024)}KB saved</span>}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{padding:"10px 20px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#6B7B8D",fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(html.trim().length>100)onScan(html);}} style={{padding:"10px 24px",borderRadius:10,border:"none",background:html.trim().length>100?(saveOnly?"#3B82F6":"#0D9488"):"#333",color:"#FFF",fontSize:13,fontWeight:700,cursor:html.trim().length>100?"pointer":"not-allowed",transition:"all 0.2s"}}>
            {saveOnly?`Save (${Math.round(html.length/1024)}KB)`:`Scan (${Math.round(html.length/1024)}KB)`}
          </button>
        </div>
      </div>
    </div>
  </div>
};

const NoteField = ({value, onChange, dark=true}) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value||"");
  const ref = useRef(null);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const save=()=>{onChange(draft);setEditing(false);};
  if(!editing&&!value) return <button onClick={()=>{setDraft("");setEditing(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:dark?"rgba(255,255,255,0.3)":"#C4CDD5",padding:"2px 0",fontFamily:"inherit"}}>+ note</button>;

const PerformanceView = ({perfData,setPerfData,perfEntry,setPerfEntry,perfEditing,setPerfEditing,perfShowForm,setPerfShowForm,blankPerfEntry,PERF_KEYWORDS,T,isDark}) => {
  const weeks = (perfData||[]).slice().sort((a,b)=>a.weekOf.localeCompare(b.weekOf));
  const latest = weeks.length>0?weeks[weeks.length-1]:null;
  const prev = weeks.length>1?weeks[weeks.length-2]:null;
  const delta = (cur,prv) => {
    if(!prv||prv===0) return null;
    return ((cur-prv)/prv*100);
  };
  const arrow = (d) => {
    if(d===null) return {sym:"\u2014",color:"#6B7B8D"};
    if(d>0) return {sym:"\u2191 "+Math.abs(d).toFixed(0)+"%",color:"#16A34A"};
    if(d<0) return {sym:"\u2193 "+Math.abs(d).toFixed(0)+"%",color:"#EF4444"};
    return {sym:"\u2192 0%",color:"#D97706"};
  };

  const Spark = ({data,color,h=32,w=120}) => {
    if(!data||data.length<2) return React.createElement("div",{style:{width:w,height:h,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#4B5C6E"}},"Need 2+ weeks");

    const pts = data.map((v,i)=>(i/(data.length-1))*w+","+(h-((v-min)/range)*h)).join(" ");
    return React.createElement("svg",{width:w,height:h,style:{overflow:"visible"}},
      React.createElement("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"}),

    try{const v=localStorage.getItem(SKEY);if(v)data[SKEY]=JSON.parse(v);}catch(e){};
    // Pull all HTML from IndexedDB
    const idbHTML = await idbLoadAllHTML();
    if(Object.keys(idbHTML).length > 0) data["gh-cc-savedHTML"] = idbHTML;
    // Fallback: include in-memory savedHTML if IDB was empty
    else if(savedHTML && Object.keys(savedHTML).length>0) data["gh-cc-savedHTML"]=savedHTML;
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href = url;
    a.download = "GH_CommandCenter_Backup_"+d.toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
    setHasChanges(false);
    setLastSaveTime(d);
  };

  // Restore from backup JSON (restores HTML to IndexedDB)
  const doRestore = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          // Restore HTML to IndexedDB
          if (data["gh-cc-savedHTML"]) {
            const htmlMap = data["gh-cc-savedHTML"];
            for (const [k,v] of Object.entries(htmlMap)) {
              await idbSaveHTML(k, v);
            }
            console.log("Restored " + Object.keys(htmlMap).length + " HTML pages to IndexedDB");
          }
          // Handle both v1 (single key) and v2 (split keys) formats
          if (data[SKEY_DONE] || data[SKEY_NOTES]) {
            // v2 format - restore split keys
            Object.entries(data).forEach(([k,v])=>{
              if(k==="gh-cc-savedHTML") return; // already handled via IndexedDB
              localStorage.setItem(k,typeof v==="string"?v:JSON.stringify(v));
            });
          } else if (data[SKEY]) {
            // v1 format — migrate on restore
            const old = data[SKEY];
            safeLSSet(SKEY_DONE, old.done||{});
            safeLSSet(SKEY_NOTES, old.notes||{});
            safeLSSet(SKEY_REMINDERS, old.reminders||[]);
            safeLSSet(SKEY_PERF, old.perfData||[]);
            safeLSSet(SKEY_META, {version:STORAGE_VERSION});
            localStorage.removeItem(SKEY);
            // Migrate HTML from v1 blob to IndexedDB
            if (old.savedHTML) {
              for (const [k,v] of Object.entries(old.savedHTML)) {
                if (v && v.length > 100) await idbSaveHTML(k, v);
              }
            }
          }
          window.location.reload();
        } catch(err) { alert("Invalid backup file: " + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

        const missing = BENCHMARKS.filter(b => !scan[b]);
        const score = Math.round(((BENCHMARKS.length - missing.length) / BENCHMARKS.length) * 100);
        return { name: page.name, slug: page.slug, cluster: page.cluster, failed: false, missing, score, details: scan };

            {aiAttachedPage&&(function(){var pg=allPagesFlat.find(function(p){return p.key===aiAttachedPage});var label=pg?pg.name:aiAttachedPage.indexOf("ai-fetch")===0?"Fetched page":"Attached";var size=pg?Math.round(pg.htmlSize/1024):savedHTML[aiAttachedPage]?Math.round(savedHTML[aiAttachedPage].length/1024):0;return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",marginBottom:8,background:"rgba(255,199,44,0.08)",border:"1px solid rgba(255,199,44,0.2)",borderRadius:8}},
              React.createElement("span",{style:{fontSize:11,color:"#FFC72C"}},"Attached: "+label),

              React.createElement("button",{onClick:function(){setAiAttachedPage("")},style:{marginLeft:"auto",background:"none",border:"none",color:"#6B7B8D",cursor:"pointer",fontSize:14,padding:"0 4px"}},"x")
            )})()}

            </div>}
            {aiFile&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",marginBottom:8,background:"rgba(75,156,211,0.08)",border:"1px solid rgba(75,156,211,0.25)",borderRadius:10}}>

/* ── TOKENS ── */
:root {

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── LAYOUT ── */
.gh-container{max-width:var(--content);margin:0 auto;padding:0 24px;}

   STICKY HEADER
   ════════════════════════ */
.gh-header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);transition:box-shadow var(--dur-normal) var(--ease);}

.gh-logo{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--midnight);text-decoration:none;letter-spacing:-.02em;}
.gh-logo span{color:var(--teal-600);}
.gh-logo .dot{color:var(--slate);font-weight:500;}
.gh-header-actions{display:flex;align-items:center;gap:12px;}
.gh-header-phone{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r-full);border:1.5px solid rgba(0,0,0,.10);font-size:15px;font-weight:600;color:var(--midnight);text-decoration:none;transition:all var(--dur-normal) var(--ease);}
.gh-header-phone:hover{background:#ECFDF5;border-color:#16A34A;color:#059669;transform:translateY(-1px);box-shadow:0 4px 16px rgba(16,185,129,.25);}
.gh-header-phone svg{width:16px;height:16px;color:var(--success);}
.gh-header-cta{display:inline-flex;align-items:center;padding:10px 24px;border-radius:var(--r-full);background:var(--carolina);color:#fff !important;font-size:15px;font-weight:600;text-decoration:none;position:relative;overflow:hidden;transition:all var(--dur-normal) var(--ease);}
.gh-header-cta::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.2),transparent);transform:skewX(-15deg);animation:ghSweep 4s ease-in-out infinite;}
.gh-header-cta:hover{background:var(--carolina-d);transform:translateY(-1px);box-shadow:0 6px 24px rgba(26,95,160,.4);}


/* ════════════════════════
   HERO
   ════════════════════════ */
.gh-hero{position:relative;width:100%;min-height:520px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;background:linear-gradient(165deg,var(--blue-900) 0%,var(--blue-800) 40%,var(--midnight) 100%);}
.gh-hero::before{content:"";position:absolute;top:-15%;right:-8%;width:55%;height:85%;background:radial-gradient(ellipse at 60% 40%,rgba(75,156,211,.18) 0%,rgba(59,130,246,.08) 50%,transparent 75%);pointer-events:none;}
.gh-hero::after{content:"";position:absolute;bottom:-10%;left:-5%;width:40%;height:50%;background:radial-gradient(ellipse,rgba(20,184,166,.06) 0%,transparent 70%);pointer-events:none;}
.gh-hero-inner{position:relative;z-index:2;max-width:var(--wide);margin:0 auto;padding:72px 80px 48px;width:100%;}
.gh-eyebrow{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.gh-eyebrow-text{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--nc-gold);}
.gh-eyebrow-rule{flex:0 0 80px;height:1px;background:rgba(255,255,255,.25);}
.gh-h1{font-family:var(--font-display);font-size:clamp(38px,5.5vw,68px);font-weight:800;line-height:1.08;letter-spacing:-.025em;margin-bottom:20px;}
.gh-h1-line1{display:block;color:#fff;}
.gh-h1-line2{display:block;color:var(--carolina);}
.gh-hero-sub{font-size:clamp(16px,1.8vw,21px);font-weight:600;color:#fff !important;text-shadow:0 1px 3px rgba(0,0,0,.2);margin-bottom:36px;max-width:560px;}
.gh-hero-actions{display:flex;gap:14px;flex-wrap:wrap;}
/* Shimmer hero buttons */
.gh-hero-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 36px;border-radius:var(--r-full);font-family:var(--font-body);font-size:16px;font-weight:700;text-decoration:none;border:none;cursor:pointer;transition:all var(--dur-normal) var(--ease);}
.gh-hero-btn--call{background:linear-gradient(120deg,#fff 0%,#fff 35%,#e0f2fe 50%,#fff 65%,#fff 100%);background-size:200% auto;color:var(--carolina) !important;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:ghShimmer 3s linear infinite;}
.gh-hero-btn--call:hover{background:#ECFDF5;color:#059669 !important;transform:translateY(-3px);box-shadow:0 8px 32px rgba(16,185,129,.35);}
.gh-hero-btn--compare{background:linear-gradient(120deg,var(--carolina) 0%,var(--carolina) 35%,#6cb8e6 50%,var(--carolina) 65%,var(--carolina) 100%);background-size:200% auto;color:#fff !important;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:ghShimmer 3.4s linear infinite;}
.gh-hero-btn--compare:hover{background:var(--carolina-d);transform:translateY(-3px);}

/* Credential strip */
.gh-creds{position:relative;z-index:2;max-width:var(--wide);margin:0 auto;width:100%;}
.gh-creds-rule{height:1px;background:rgba(255,255,255,.12);margin:0 80px;}
.gh-creds-inner{display:flex;align-items:center;gap:24px;padding:18px 80px 24px;flex-wrap:wrap;}
.gh-cred{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap;}
.gh-cred a{color:inherit;text-decoration:none;}
.gh-cred--gold{color:var(--nc-gold);}
.gh-cred--cta{color:var(--carolina);}
.gh-cred--cta a:hover{color:#fff;}
.gh-cred-divider{width:1px;height:14px;background:rgba(255,255,255,.15);}


/* ════════════════════════
   CONTENT TYPOGRAPHY
   ════════════════════════ */
article h2{font-family:var(--font-display);font-size:clamp(26px,3.5vw,34px);font-weight:600;letter-spacing:-.015em;line-height:1.2;color:var(--midnight);margin-top:72px;margin-bottom:20px;}
article h3{font-family:var(--font-body);font-size:clamp(20px,2.5vw,24px);font-weight:600;letter-spacing:-.01em;line-height:1.3;color:var(--midnight);margin-top:48px;margin-bottom:16px;}
article p{font-size:17px;line-height:1.78;color:var(--charcoal);margin-bottom:20px;max-width:var(--prose);}
article ul,article ol{max-width:var(--prose);margin:24px 0;padding:0;list-style:none;}
article li{padding-left:28px;position:relative;margin-bottom:14px;font-size:17px;line-height:1.65;color:var(--charcoal);}
article li::before{content:'';position:absolute;left:0;top:10px;width:8px;height:8px;background:var(--teal-500);border-radius:50%;}
.gh-inline{color:var(--carolina);font-weight:600;}
.gh-inline:hover{color:var(--carolina-d);}
.gh-date{color:var(--nc-gold-m);font-weight:600;}


/* ════════════════════════
   INSTANT ANSWER BLOCK
   AEO / Voice optimized
   ════════════════════════ */
.gh-answer{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-left:4px solid var(--carolina);border-radius:var(--r-lg);padding:26px 30px;margin:24px 0 30px;max-width:var(--prose);box-shadow:0 2px 12px rgba(75,156,211,.12);}
.gh-answer-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--carolina);margin-bottom:8px;display:block;}
.gh-answer p{font-size:15px;line-height:1.7;color:var(--midnight);margin:0;max-width:none;}


/* ════════════════════════
   BASELINE / COST STRIP
   Dark gradient, 4-item
   ════════════════════════ */
.gh-costs{background:linear-gradient(135deg,var(--blue-800),var(--blue-900));border-radius:var(--r-2xl);padding:44px 48px;margin:40px 0;position:relative;overflow:hidden;}
.gh-costs::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.15) 0%,transparent 70%);pointer-events:none;}
.gh-costs-hd{text-align:center;margin-bottom:28px;position:relative;z-index:2;}
.gh-costs-hd h3{font-family:var(--font-display);font-size:20px;font-weight:700;color:#fff !important;margin:0 0 4px;}
.gh-costs-hd p{color:rgba(255,255,255,.62) !important;font-size:13px;margin:0;max-width:none;}
.gh-costs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;position:relative;z-index:2;}
.gh-cost-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-lg);padding:20px 16px;text-align:center;position:relative;overflow:hidden;}
.gh-cost-box::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 6s ease-in-out infinite;}
.gh-cost-box:nth-child(2)::after{animation-delay:1.5s;}
.gh-cost-box:nth-child(3)::after{animation-delay:3s;}
.gh-cost-box:nth-child(4)::after{animation-delay:4.5s;}
.gh-cost-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:6px;}
.gh-cost-val{font-family:var(--font-display);font-size:22px;font-weight:800;color:#fff;display:block;margin-bottom:4px;}
.gh-cost-note{font-size:11px;color:rgba(255,255,255,.5);line-height:1.5;}
.gh-costs-src{margin-top:20px;padding:12px 20px;background:rgba(255,255,255,.06);border-radius:var(--r-md);position:relative;z-index:2;}
.gh-costs-src p{font-size:12px;color:rgba(255,255,255,.55);margin:0;max-width:none;}
.gh-costs-src a{color:rgba(75,156,211,.9);}


/* ════════════════════════
   6-CARD GRID
   ════════════════════════ */
.gh-6grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:28px 0;}
.gh-6card{background:var(--snow);border:1.5px solid rgba(0,0,0,.07);border-radius:var(--r-lg);padding:20px 18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;transition:transform 200ms var(--ease),box-shadow 200ms var(--ease),border-color 200ms;}
.gh-6card::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(75,156,211,.08),transparent);transform:skewX(-15deg);transition:left 500ms var(--ease);}
.gh-6card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:rgba(75,156,211,.25);}
.gh-6card:hover::before{left:150%;}
.gh-6card-icon{font-size:24px;margin-bottom:8px;}
.gh-6card h4{font-size:14px;font-weight:700;color:var(--midnight);margin:0 0 6px;}
.gh-6card p{font-size:13px;line-height:1.6;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   EXPERT TIP — teal
   ════════════════════════ */
.gh-tip{background:linear-gradient(135deg,var(--teal-50),#dcfce7);border-left:4px solid var(--teal-500);border-radius:var(--r-lg);padding:28px 32px;margin:40px 0;max-width:var(--prose);}
.gh-tip-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700;font-size:16px;color:var(--teal-700);}
.gh-tip p{font-size:15px;line-height:1.7;color:var(--teal-700);margin:0;max-width:none;}


/* ════════════════════════
   WARNING — amber
   ════════════════════════ */
.gh-warning{background:linear-gradient(135deg,var(--amber-50),#fff9e6);border-left:4px solid var(--nc-gold-m);border-radius:var(--r-lg);padding:28px 32px;margin:40px 0;max-width:var(--prose);}
.gh-warning-header{font-weight:700;font-size:16px;color:var(--amber-600);margin-bottom:10px;}
.gh-warning p{font-size:15px;line-height:1.7;color:var(--amber-600);margin:0;max-width:none;}


/* ════════════════════════
   CRITICAL ALERT — red
   ════════════════════════ */
.gh-alert-critical{background:linear-gradient(135deg,var(--error-bg),#fee2e2);border-left:4px solid var(--error);border-radius:var(--r-lg);padding:28px 32px;margin:40px 0;max-width:var(--prose);}
.gh-alert-critical .gh-warning-header{color:var(--error);}
.gh-alert-critical p{font-size:15px;line-height:1.7;color:var(--error);margin:0;max-width:none;}


/* ════════════════════════
   FORMULA BOX
   ════════════════════════ */
.gh-formula{background:linear-gradient(135deg,var(--teal-50),#dcfce7);border-left:4px solid var(--teal-500);border-radius:var(--r-lg);padding:26px 30px;margin:36px 0;max-width:var(--prose);}
.gh-formula-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-700);margin-bottom:10px;display:block;}
.gh-formula-eq{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--midnight);line-height:1.5;margin-bottom:10px;}
.gh-formula p{font-size:14px;line-height:1.7;color:var(--teal-700);margin:0;max-width:none;}


/* ════════════════════════
   CTA MODAL
   NC blue gradient
   ════════════════════════ */
.gh-cta-modal{background:linear-gradient(135deg,var(--nc-blue) 0%,#003D73 60%,#002B54 100%);border-radius:var(--r-2xl);padding:52px 44px;margin:56px 0;position:relative;overflow:hidden;}
.gh-cta-modal::before{content:"";position:absolute;top:-20%;right:-10%;width:50%;height:80%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-cta-hd{text-align:center;margin-bottom:36px;position:relative;z-index:2;}
.gh-cta-hd h2{font-family:var(--font-display);font-size:clamp(22px,2.8vw,30px);font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-cta-hd p{color:rgba(255,255,255,.78) !important;font-size:15px;margin:0;max-width:none;}
.gh-cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;position:relative;z-index:2;}
/* Glassmorphism cards with shimmer sweep */
.gh-cta-card{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.04));backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--r-xl);padding:32px 28px;position:relative;overflow:hidden;transition:border-color 300ms var(--ease),box-shadow 300ms var(--ease);}
.gh-cta-card::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 5s ease-in-out infinite;}
.gh-cta-card:nth-child(2)::after{animation-delay:2.5s;}
.gh-cta-card:hover{border-color:rgba(255,255,255,.3);box-shadow:0 0 0 1px rgba(75,156,211,.25),0 8px 32px rgba(0,0,0,.2);}
.gh-cta-card h3{font-family:var(--font-display);font-size:20px;font-weight:600;color:#fff !important;margin:0 0 8px;}
.gh-cta-card>p{font-size:14px;color:rgba(255,255,255,.72) !important;line-height:1.6;margin-bottom:20px !important;max-width:none;}
/* Ghost buttons with shimmer sweep */
.gh-ghost{display:block;text-align:center;padding:14px 24px;border-radius:var(--r-full);font-family:var(--font-body);font-size:15px;text-decoration:none !important;margin-bottom:8px;border:1.5px solid rgba(255,255,255,.32);background:transparent;color:#fff !important;font-weight:600;transition:all 280ms var(--ease);position:relative;overflow:hidden;}
.gh-ghost::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-15deg);animation:ghSweep 3.5s ease-in-out infinite;}
.gh-ghost:last-child{margin-bottom:0;}
.gh-ghost--primary{background:rgba(255,255,255,.1) !important;font-weight:700;}
.gh-ghost--primary::before{animation-delay:.2s;}
.gh-ghost--call::before{animation-delay:.5s;}
.gh-ghost--text::before{animation-delay:1s;}
.gh-ghost--sched::before{animation-delay:1.5s;}
.gh-ghost--call:hover{background:rgba(22,163,74,.3) !important;border-color:rgba(22,163,74,.6) !important;}
.gh-ghost--text:hover{background:rgba(139,92,246,.3) !important;border-color:rgba(139,92,246,.6) !important;}
.gh-ghost--sched:hover{background:rgba(245,158,11,.3) !important;border-color:rgba(245,158,11,.6) !important;}
.gh-ghost--compare:hover{background:rgba(75,156,211,.3) !important;border-color:var(--carolina) !important;}
.gh-ghost-sub{display:block;font-size:11px;margin-top:2px;color:rgba(255,255,255,.55) !important;font-weight:400;}


/* ════════════════════════
   DECISION SCENARIO CARDS
   3-card color-coded
   ════════════════════════ */
.gh-scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:32px 0;}
.gh-scenario{border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--sh-md);transition:transform 250ms var(--ease);}
.gh-scenario:hover{transform:translateY(-3px);}
.gh-scenario-hd{padding:20px 22px 14px;position:relative;overflow:hidden;}
.gh-scenario-hd::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 7s ease-in-out infinite;}
.gh-scenario-hd--blue{background:linear-gradient(135deg,#00529B,#003D73);}
.gh-scenario-hd--green{background:linear-gradient(135deg,#065F46,#047857);}
.gh-scenario-hd--purple{background:linear-gradient(135deg,#4C1D95,#5B21B6);}
.gh-scenario-hd--teal{background:linear-gradient(135deg,#0F766E,#0D9488);}
.gh-scenario-hd--amber{background:linear-gradient(135deg,#92400E,#B45309);}
.gh-scenario-badge{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);margin-bottom:8px;}
.gh-scenario-hd h4{font-family:var(--font-display);font-size:17px;font-weight:700;color:#fff !important;margin:0;}
.gh-scenario-body{background:var(--white);border:1.5px solid rgba(0,0,0,.07);border-top:none;border-radius:0 0 var(--r-xl) var(--r-xl);padding:20px 22px;}
.gh-scenario-body p{font-size:13px;line-height:1.65;color:var(--charcoal);margin-bottom:12px;max-width:none;}
.gh-verdict{padding:10px 14px;border-radius:var(--r-md);font-size:12px;font-weight:700;color:var(--midnight);}
.gh-verdict--blue{background:var(--blue-50);}
.gh-verdict--green{background:#F0FDF4;}
.gh-verdict--purple{background:#F5F3FF;}
.gh-verdict--teal{background:var(--teal-50);}
.gh-verdict--amber{background:var(--amber-50);}


/* ════════════════════════
   SIDE-BY-SIDE COMPARISON
   MA vs Medigap cost blocks
   ════════════════════════ */
.gh-sc-block{margin-bottom:32px;border-radius:var(--r-2xl);overflow:hidden;box-shadow:var(--sh-lg);}
.gh-sc-hd{padding:28px 36px 22px;position:relative;overflow:hidden;}
.gh-sc-hd::after{content:"";position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 7s ease-in-out infinite;}
.gh-sc-hd--teal{background:linear-gradient(135deg,#0F766E,#0D9488);}
.gh-sc-hd--blue{background:linear-gradient(135deg,#1A5FA0,#2563EB);}
.gh-sc-hd--purple{background:linear-gradient(135deg,#4C1D95,#7C3AED);}
.gh-sc-badge{display:inline-block;padding:4px 14px;border-radius:var(--r-full);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.18);color:rgba(255,255,255,.95);margin-bottom:10px;}
.gh-sc-hd h3{font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff !important;margin:0 0 6px;}
.gh-sc-hd p{font-size:14px;color:rgba(255,255,255,.78) !important;margin:0;max-width:none;}
.gh-sc-cols{display:grid;grid-template-columns:1fr 1fr;background:var(--white);border:1.5px solid rgba(0,0,0,.07);border-top:none;}
.gh-sc-col{padding:28px 28px 24px;}
.gh-sc-col:first-child{border-right:1px solid var(--mist);}
.gh-sc-col-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.gh-sc-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.dot-ma{background:#2563EB;}
.dot-mg{background:#0D9488;}
.gh-sc-col-label span{color:var(--slate);}
.gh-sc-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);gap:12px;}
.gh-sc-row:last-of-type{border-bottom:none;}
.gh-sc-row-label{font-size:13px;color:var(--slate);flex-shrink:0;}
.gh-sc-row-val{font-size:13px;font-weight:600;color:var(--midnight);text-align:right;}
.gh-sc-total{margin-top:12px;padding:14px 16px;border-radius:var(--r-md);text-align:center;}
.gh-sc-total-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.gh-sc-total-val{font-family:var(--font-display);font-size:26px;font-weight:800;}
.total-ma{background:#EFF6FF;border:1.5px solid #BFDBFE;}
.total-ma .gh-sc-total-label{color:#2563EB;}
.total-ma .gh-sc-total-val{color:#1E3A5F;}
.total-mg{background:#F0FDFA;border:1.5px solid #99F6E4;}
.total-mg .gh-sc-total-label{color:#0D9488;}
.total-mg .gh-sc-total-val{color:#0F4C45;}
.gh-sc-verdict{padding:20px 28px;background:var(--snow);border-top:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.gh-sc-verdict-text{font-size:14px;font-weight:600;color:var(--midnight);}
.gh-sc-verdict-pill{display:inline-block;padding:6px 16px;border-radius:var(--r-full);font-size:12px;font-weight:700;}
.pill-ma{background:#DBEAFE;color:#1E40AF;}
.pill-mg{background:#CCFBF1;color:#0F766E;}
.pill-tie{background:#F3E8FF;color:#6B21A8;}


/* ════════════════════════
   HOW-TO STEPS
   Dark gradient, shimmer
   ════════════════════════ */
.gh-howto{background:linear-gradient(135deg,var(--blue-800),var(--blue-900));border-radius:var(--r-2xl);padding:48px;margin:44px 0;position:relative;overflow:hidden;}
.gh-howto::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-howto-hd{text-align:center;margin-bottom:36px;position:relative;z-index:2;}
.gh-howto-hd h3{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff !important;margin:0 0 6px;}
.gh-howto-hd p{color:rgba(255,255,255,.72) !important;font-size:15px;margin:0;max-width:none;}
/* Use 4 or 5 steps — adjust grid-template-columns accordingly */
.gh-steps-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;position:relative;z-index:2;}
.gh-steps-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;position:relative;z-index:2;}
.gh-step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:26px 20px;position:relative;overflow:hidden;}
.gh-step::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-15deg);animation:ghSweep 4s ease-in-out infinite;}
.gh-step:nth-child(2)::before{animation-delay:.8s;}
.gh-step:nth-child(3)::before{animation-delay:1.6s;}
.gh-step:nth-child(4)::before{animation-delay:2.4s;}
.gh-step:nth-child(5)::before{animation-delay:3.2s;}
.gh-step-num{width:38px;height:38px;border-radius:50%;background:rgba(255,199,44,.2);border:1.5px solid rgba(255,199,44,.5);color:var(--nc-gold);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 0 14px;}
.gh-step h4{font-size:14px;font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-step p{font-size:12px;color:rgba(255,255,255,.68) !important;line-height:1.6;margin:0;max-width:none;}


/* ════════════════════════
   2-COL CARDS
   ════════════════════════ */
.gh-2col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:28px 0;}
.gh-col-card{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh-md);}
.gh-col-card h4{font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:14px;}
.gh-col-list{list-style:none;margin:0 !important;padding:0 !important;}
.gh-col-list li{padding:7px 0 7px 20px !important;position:relative;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px !important;line-height:1.6 !important;color:var(--charcoal) !important;}
.gh-col-list li:last-child{border-bottom:none;}
.gh-col-list li::before{content:"\2192" !important;position:absolute;left:0;color:var(--carolina);font-size:12px;top:8px !important;width:auto !important;height:auto !important;background:none !important;border-radius:0 !important;}


/* ════════════════════════
   TIMING / ENROLLMENT GRID
   ════════════════════════ */
.gh-timing{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0;}
.gh-timing-card{background:var(--snow);border:1.5px solid rgba(0,0,0,.07);border-radius:var(--r-lg);padding:20px 18px;box-shadow:var(--sh-sm);}
.gh-timing-card.urgent{border-color:var(--error);background:linear-gradient(135deg,#FEF2F2,var(--white));}
.gh-timing-window{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--carolina);margin-bottom:5px;}
.gh-timing-card.urgent .gh-timing-window{color:var(--error);}
.gh-timing-dates{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:7px;}
.gh-timing-card p{font-size:12px;line-height:1.6;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   BAR CHART INFOGRAPHIC
   ════════════════════════ */
.gh-chart{background:linear-gradient(135deg,var(--snow),var(--white));border-radius:var(--r-2xl);padding:56px 48px;margin:64px 0;box-shadow:var(--sh-xl);border:1px solid rgba(0,0,0,.06);}
.gh-chart-header{text-align:center;margin-bottom:40px;}
.gh-chart-header h3{font-family:var(--font-display);font-size:26px;font-weight:600;margin:0 0 8px;color:var(--midnight);}
.gh-chart-header p{font-size:15px;color:var(--slate);margin:0;max-width:none;}
.gh-bar{margin-bottom:16px;padding:24px 28px;background:var(--white);border-radius:var(--r-xl);border:1px solid rgba(0,0,0,.05);box-shadow:var(--sh-xs);transition:transform var(--dur-normal) var(--ease),box-shadow var(--dur-normal);}
.gh-bar:hover{transform:translateY(-2px);box-shadow:var(--sh-sm);}
.gh-bar-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.gh-bar-title{font-size:16px;font-weight:600;color:var(--midnight);}
.gh-bar-pct{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--midnight);}
.gh-bar-desc{font-size:13px;color:var(--slate);margin-bottom:16px;}
.gh-bar-track{width:100%;height:8px;background:var(--cloud);border-radius:var(--r-full);overflow:hidden;}
.gh-bar-fill{height:100%;border-radius:var(--r-full);}
.gh-bar-fill--blue{background:linear-gradient(90deg,#3B82F6,#60A5FA,#93C5FD);}
.gh-bar-fill--green{background:linear-gradient(90deg,#0D9488,#2DD4BF,#5EEAD4);}
.gh-bar-fill--amber{background:linear-gradient(90deg,#D97706,#FBBF24,#FCD34D);}
.gh-bar-fill--purple{background:linear-gradient(90deg,#7C3AED,#A78BFA,#C4B5FD);}
.gh-chart-source{margin-top:28px;padding:16px 24px;background:var(--blue-50);border-radius:var(--r-md);border-left:4px solid var(--carolina);}
.gh-chart-source p{font-size:13px;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   COMPARISON TABLE
   ════════════════════════ */
.gh-comparison{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:48px 0;}
.gh-comparison-card{background:var(--snow);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:32px 28px;box-shadow:var(--sh-md);}
.gh-comparison-card h3{margin:0 0 20px;padding-bottom:16px;border-bottom:3px solid var(--carolina);font-family:var(--font-display);font-size:22px;}
.gh-comp-item{padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.gh-comp-item:last-child{border-bottom:none;}
.gh-comp-label{font-weight:600;font-size:12px;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.gh-comp-value{font-size:15px;line-height:1.5;color:var(--charcoal);}


/* ════════════════════════
   TESTIMONIAL
   ════════════════════════ */
.gh-testimonial{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:36px;margin:48px 0;max-width:var(--prose);box-shadow:var(--sh-md);position:relative;}
.gh-testimonial::before{content:'\201C';position:absolute;top:-8px;left:24px;font-size:72px;color:var(--carolina);opacity:.2;font-family:Georgia,serif;line-height:1;}
.gh-testimonial blockquote{font-style:italic;font-size:16px;line-height:1.75;color:var(--charcoal);margin-bottom:16px;}
.gh-testimonial-author{font-size:14px;font-weight:600;color:var(--slate);}
.gh-testimonial-link{margin-top:12px;font-size:14px;}


/* ════════════════════════
   QUIZ
   3 questions, dark gradient
   ════════════════════════ */
.gh-quiz{background:linear-gradient(135deg,var(--blue-800) 0%,var(--blue-900) 60%,#071626 100%);border-radius:var(--r-2xl);padding:48px;margin:44px 0;position:relative;overflow:hidden;}
.gh-quiz::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-quiz-hd{text-align:center;margin-bottom:32px;position:relative;z-index:2;}
.gh-quiz-hd h3{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff !important;margin:0 0 6px;}
.gh-quiz-hd p{color:rgba(255,255,255,.78) !important;font-size:15px;margin:0;max-width:none;}
.gh-quiz-progress{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;position:relative;z-index:2;}
.gh-qdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:all 280ms var(--ease);}
.gh-qdot.active{width:24px;border-radius:5px;background:var(--nc-gold);}
.gh-qdot.done{background:var(--carolina);}
.gh-qstep{display:none;position:relative;z-index:2;}
.gh-qstep.active{display:block;}
.gh-qquestion{color:#fff;font-size:19px;font-weight:700;margin-bottom:18px;display:block;}
.gh-qopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gh-qopt{color:#fff !important;background:rgba(255,255,255,.08) !important;border:1.5px solid rgba(255,255,255,.22) !important;border-radius:var(--r-full) !important;padding:14px 20px !important;font-size:14px !important;font-weight:600 !important;cursor:pointer !important;font-family:inherit !important;width:100% !important;text-align:center !important;transition:all 220ms var(--ease) !important;}
.gh-qopt:hover{background:rgba(255,255,255,.14) !important;border-color:rgba(255,255,255,.45) !important;}
.gh-qopt.selected{background:rgba(75,156,211,.28) !important;border-color:var(--carolina) !important;}
.gh-qresult{display:none;position:relative;z-index:2;}
.gh-qresult-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r-2xl);padding:40px 36px;max-width:600px;margin:0 auto;}
.gh-qresult-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;margin-bottom:12px;display:block;}
.gh-qresult-text{color:rgba(255,255,255,.82);font-size:14px;line-height:1.7;margin-bottom:24px;display:block;}
.gh-qresult-cta{display:inline-flex;align-items:center;gap:8px;background:var(--success);color:#fff;padding:14px 32px;border-radius:var(--r-full);font-size:16px;font-weight:700;text-decoration:none;}
.gh-qrestart{display:inline-block;margin-top:16px;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.55);font-size:13px;padding:9px 20px;border-radius:var(--r-full);cursor:pointer;font-family:inherit;}


/* ════════════════════════
   TRUST LADDER
   4 steps, dark gradient
   ════════════════════════ */
.gh-ladder{background:linear-gradient(135deg,var(--blue-800),var(--blue-900));border-radius:var(--r-2xl);padding:48px;margin:56px 0;position:relative;overflow:hidden;}
.gh-ladder::before{content:"";position:absolute;top:-20%;right:-10%;width:45%;height:75%;background:radial-gradient(ellipse,rgba(75,156,211,.12) 0%,transparent 70%);pointer-events:none;}
.gh-ladder-hd{text-align:center;margin-bottom:40px;position:relative;z-index:2;}
.gh-ladder-hd h3{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-ladder-hd p{color:rgba(255,255,255,.72) !important;font-size:15px;margin:0;max-width:520px;margin-left:auto;margin-right:auto;}
.gh-ladder-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;position:relative;z-index:2;}
.gh-ladder-step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:26px 20px;text-align:center;}
.gh-ladder-step:first-child{border-radius:var(--r-xl) 0 0 var(--r-xl);}
.gh-ladder-step:last-child{border-radius:0 var(--r-xl) var(--r-xl) 0;}
.gh-ladder-num{width:38px;height:38px;border-radius:50%;background:rgba(75,156,211,.25);border:1.5px solid rgba(75,156,211,.5);color:var(--carolina);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.gh-ladder-title{font-weight:700;font-size:14px;color:#fff;margin-bottom:7px;}
.gh-ladder-desc{font-size:12px;color:rgba(255,255,255,.62);line-height:1.6;}


/* ════════════════════════
   TRUST STRIP — 3 badges
   ════════════════════════ */
.gh-trust-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:56px 0;}
.gh-trust-badge{background:var(--snow);border:1px solid rgba(0,0,0,.08);border-radius:var(--r-lg);padding:28px 20px;text-align:center;box-shadow:var(--sh-sm);transition:transform var(--dur-normal) var(--ease);}
.gh-trust-badge:hover{transform:translateY(-2px);}
.gh-trust-badge-icon{font-size:28px;margin-bottom:10px;}
.gh-trust-badge h4{font-family:var(--font-body);font-size:16px;font-weight:700;color:var(--midnight);margin-bottom:4px;}
.gh-trust-badge p{font-size:13px;color:var(--slate);margin:0;max-width:none;}


/* ════════════════════════
   SAVINGS PROGRAMS GRID
   ════════════════════════ */
.gh-programs{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:28px 0;}
.gh-program-card{background:var(--white);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh-md);position:relative;overflow:hidden;transition:transform 200ms var(--ease),box-shadow 200ms;}
.gh-program-card::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(75,156,211,.06),transparent);transform:skewX(-15deg);transition:left 500ms var(--ease);}
.gh-program-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.gh-program-card:hover::before{left:150%;}
.gh-program-icon{font-size:28px;margin-bottom:10px;}
.gh-program-card h4{font-size:16px;font-weight:700;color:var(--midnight);margin:0 0 8px;}
.gh-program-card p{font-size:13px;line-height:1.65;color:var(--charcoal);margin:0 0 12px;max-width:none;}
.gh-program-limit{display:inline-block;padding:4px 12px;border-radius:var(--r-full);font-size:11px;font-weight:700;background:var(--blue-50);color:var(--carolina);}


/* ════════════════════════
   RELATED LINKS
   ════════════════════════ */
.gh-related{background:var(--snow);border:1px solid rgba(0,0,0,.07);border-radius:var(--r-2xl);padding:40px;margin:56px 0;}
.gh-related>h3{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--midnight);margin:0 0 24px;}
.gh-related-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.gh-rlink{display:flex;align-items:center;gap:7px;padding:10px 14px;background:var(--white);border:1px solid rgba(0,0,0,.06);border-radius:var(--r-md);font-size:14px;font-weight:500;color:var(--charcoal);text-decoration:none;transition:all 180ms var(--ease);}
.gh-rlink::before{content:"\2192";color:var(--carolina);font-size:12px;flex-shrink:0;}
.gh-rlink:hover{color:var(--carolina);border-color:var(--carolina);}
.gh-county-hd{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--carolina);margin:24px 0 12px;padding-top:24px;border-top:1px solid var(--mist);}
.gh-county-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.gh-clink{display:flex;align-items:center;gap:5px;padding:9px 12px;background:var(--white);border:1px solid rgba(0,0,0,.06);border-radius:var(--r-md);font-size:13px;font-weight:600;color:var(--carolina);text-decoration:none;transition:all 180ms var(--ease);}
.gh-clink:hover{background:var(--blue-50);border-color:var(--carolina);}
.gh-clink::before{content:"\1F4CD";font-size:10px;}


/* ════════════════════════
   AUTHOR CARD
   ════════════════════════ */
.gh-author{max-width:920px;margin:64px auto 32px;border:1px solid rgba(0,0,0,.08);border-radius:var(--r-xl);background:var(--white);box-shadow:var(--sh-lg);overflow:hidden;}
.gh-author-header{background:linear-gradient(135deg,var(--blue-600),var(--blue-700));color:#fff;padding:40px 36px;text-align:center;}
.gh-author-header h2{font-family:var(--font-display);font-size:26px;font-weight:700;color:#fff !important;margin:0 0 8px;}
.gh-author-header p{font-size:15px;color:rgba(255,255,255,.9) !important;margin:0 0 6px;max-width:none;}
.gh-author-stars{display:inline-block;margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.18);border-radius:var(--r-sm);font-size:14px;color:#fff;}
.gh-author-contact-row{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:14px;font-size:14px;}
.gh-author-contact-row a{color:#fff !important;}
.gh-author-body{padding:40px 36px;}
.gh-author-body h3{font-family:var(--font-body);font-size:20px;font-weight:700;color:var(--blue-600);padding-bottom:10px;border-bottom:3px solid var(--blue-600);margin:0 0 16px;}
.gh-author-body p{font-size:15px;line-height:1.65;color:var(--charcoal);margin-bottom:14px;max-width:none;}
.gh-contact-box{background:var(--snow);padding:24px;border-radius:var(--r-md);margin:24px 0;}
.gh-contact-box h3{font-size:17px;margin-bottom:12px;border-bottom:none !important;padding-bottom:0 !important;}
.gh-contact-box p{font-size:14px;margin:0 0 8px;}
.gh-contact-box a{color:var(--carolina);font-weight:600;}
.gh-hours-box{background:var(--blue-50);padding:20px 24px;border-radius:var(--r-md);border-left:4px solid var(--blue-600);margin:24px 0;}
.gh-hours-box h3{font-size:17px;margin-bottom:12px;border-bottom:none !important;padding-bottom:0 !important;}
.gh-hours-box p{font-size:14px;margin:0 0 8px;}
.gh-license-box{background:#FEF3C7;padding:18px 22px;border-radius:var(--r-md);border-left:4px solid var(--amber-500);margin:24px 0;}
.gh-license-box p{font-size:14px;margin:0;}
.gh-license-box a{color:var(--carolina);font-weight:600;}
.gh-disclaimer{margin-top:24px;}
.gh-disclaimer h3{font-size:17px;margin-bottom:12px;}
.gh-disclaimer p{font-size:13px;line-height:1.7;color:rgba(26,35,50,.7);margin-bottom:8px;}


/* ════════════════════════
   FAQ — native <details>
   ════════════════════════ */
.gh-faq{margin:72px 0;max-width:var(--prose);}
.gh-faq-title{font-family:var(--font-display);font-size:clamp(26px,3vw,34px);font-weight:600;color:var(--midnight);margin-bottom:8px;}
.gh-faq-sub{font-size:16px;color:var(--slate);margin-bottom:32px;}
.gh-faq-list{display:flex;flex-direction:column;gap:8px;}
.gh-faq-item{background:var(--white);border:1.5px solid var(--mist);border-radius:var(--r-lg);overflow:hidden;transition:border-color 180ms,box-shadow 180ms;}
.gh-faq-item[open]{border-color:var(--carolina);box-shadow:var(--sh-md);}
.gh-faq-q{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:20px 22px;font-size:16px;font-weight:600;color:var(--midnight);cursor:pointer;list-style:none;}
.gh-faq-q::-webkit-details-marker{display:none;}
.gh-faq-q:hover{color:var(--carolina);}
.gh-faq-chev{width:18px;height:18px;flex-shrink:0;color:var(--silver);transition:transform 280ms var(--ease),color 150ms;}
.gh-faq-item[open] .gh-faq-chev{transform:rotate(180deg);color:var(--carolina);}
.gh-faq-a{padding:0 22px 20px;font-size:15px;line-height:1.7;color:var(--charcoal);}
.gh-faq-a p{font-size:15px;color:var(--charcoal);margin:0 0 8px !important;max-width:none;}
.gh-faq-a p:last-child{margin-bottom:0 !important;}


/* ════════════════════════
   FOOTER
   ════════════════════════ */
.gh-last-updated{background:var(--cloud);padding:16px 24px;border-radius:var(--r-md);font-size:14px;color:var(--slate);text-align:center;margin:32px 0;}
.gh-footer-trust{max-width:var(--content);margin:0 auto;padding:48px 24px;border-top:1px solid var(--mist);text-align:center;}
.gh-footer-trust p{font-size:13px;color:var(--silver);line-height:1.7;margin-bottom:8px;max-width:640px;margin-left:auto;margin-right:auto;}
.gh-footer-trust a{color:var(--carolina);}


/* ════════════════════════
   FLOATING CALL BUTTON
   Mobile only
   ════════════════════════ */
.gh-float-call{display:none;position:fixed;bottom:24px;right:24px;z-index:999;width:60px;height:60px;border-radius:50%;background:var(--success);color:#fff;border:none;box-shadow:0 6px 24px rgba(22,163,74,.4);cursor:pointer;align-items:center;justify-content:center;transition:transform var(--dur-normal) var(--ease),box-shadow var(--dur-normal);text-decoration:none;}
.gh-float-call:hover{transform:scale(1.08);box-shadow:0 8px 32px rgba(22,163,74,.5);}
.gh-float-call svg{width:26px;height:26px;}
@keyframes float-pulse{0%,100%{box-shadow:0 6px 24px rgba(22,163,74,.4);}50%{box-shadow:0 6px 24px rgba(22,163,74,.4),0 0 0 12px rgba(22,163,74,.12);}}
.gh-float-call.pulse{animation:float-pulse 2s ease-in-out 1;}


/* ════════════════════════
   RESPONSIVE — 768px
   ════════════════════════ */

<!-- ═══════════════════════════════════════════════════════════
     QUIZ  ·  NEPQ STAGE: ALL FOUR STAGES IN SEQUENCE
     ───────────────────────────────────────────────────────────
     The quiz is a NEPQ tool disguised as a utility. Its purpose
     is not just routing — it creates internal problem awareness
     through the act of answering questions. By the time someone
     finishes, they have self-diagnosed their own risk and are in
     a motivated state to talk to Rob.

     QUIZ TITLE RULE: Frame as discovery, not assessment.
       WRONG: "What Medicare Plan Is Right for You?"
       RIGHT: "Where Are You with Medicare Right Now?"
              "What Kind of Medicare Coverage Do You Need?"

     QUESTION DESIGN RULES (from NEPQ framework Section 7):
       Q1 (STEP 0) = CONNECTING question — current situation.
         "Where are you right now with Medicare?"
         "Have you already enrolled in Medicare?"
         Answer options reflect real situations, no "none of above."

       Q2 (STEP 1) = PROBLEM AWARENESS question — surfaces risk.
         "What's your main concern going into Medicare?"
         "Do you know which enrollment window applies to you?"
         Options should feel personally relevant to their situation.

       Q3 (STEP 2) = CONSEQUENCE question — stakes and specifics.
         "What matters most to you in a Medicare plan?"
         "Have you compared Medicare Advantage and Medigap?"

     RESULT STRINGS — NEPQ structure per result (Section 7.4):
       1. Validation: acknowledge their specific situation
       2. Risk: name the specific problem they face
       3. Rob: why he specifically is the right next step
       NEVER: "Call Rob for a free quote." (generic / transactional)

     KEY PATTERN: data-v values become the result lookup key.
       Key = q0val + '_' + q1val + '_' + q2val
       Define all result strings in the JS quizResults object below.
     ═══════════════════════════════════════════════════════════ -->
<div class="gh-container">
  <div class="gh-quiz" id="ghQuiz" aria-label="Find your Medicare path">
    <div class="gh-quiz-hd">
      <!-- NEPQ TITLE: Discovery framing, not assessment framing -->
      <h3>[QUIZ TITLE — e.g. "Where Are You with Medicare Right Now?"]</h3>
      <p>3 quick questions &mdash; personalized next step in under a minute.</p>
    </div>
    <div class="gh-quiz-progress" aria-label="Quiz progress">
      <div class="gh-qdot active" data-s="0"></div>
      <div class="gh-qdot" data-s="1"></div>
      <div class="gh-qdot" data-s="2"></div>
    </div>

    <!-- STEP 0 — NEPQ: CONNECTING question (current situation) -->
    <div class="gh-qstep active" data-s="0">
      <!-- Example: "Where are you right now with Medicare?"
           Options: "Turning 65 soon" / "Still on employer plan" / "Already enrolled" / "Just researching" -->
      <span class="gh-qquestion">[Q1 — CONNECTING: current situation. e.g. "Where are you right now with Medicare?"]</span>
      <div class="gh-qopts">
        <button class="gh-qopt" data-v="[val-a]">[OPTION A — e.g. "Turning 65 soon"]</button>
        <button class="gh-qopt" data-v="[val-b]">[OPTION B — e.g. "Still on employer plan at 65+"]</button>
        <button class="gh-qopt" data-v="[val-c]">[OPTION C — e.g. "Already enrolled, need review"]</button>
        <button class="gh-qopt" data-v="[val-d]">[OPTION D — e.g. "Just starting to research"]</button>
      </div>
    </div>

    <!-- STEP 1 — NEPQ: PROBLEM AWARENESS question (surfaces specific risk) -->
    <div class="gh-qstep" data-s="1">
      <!-- Example: "What's your biggest concern going into Medicare?"
           Options: "Keeping my doctors" / "Unexpected costs" / "Enrollment penalties" / "Understanding my options" -->
      <span class="gh-qquestion">[Q2 — PROBLEM AWARENESS: surfaces specific fear or risk. e.g. "What's your biggest concern about Medicare?"]</span>
      <div class="gh-qopts">
        <button class="gh-qopt" data-v="[val-a]">[OPTION A — e.g. "Keeping my current doctors"]</button>
        <button class="gh-qopt" data-v="[val-b]">[OPTION B — e.g. "Unexpected out-of-pocket costs"]</button>
        <button class="gh-qopt" data-v="[val-c]">[OPTION C — e.g. "Missing an enrollment deadline"]</button>
        <button class="gh-qopt" data-v="[val-d]">[OPTION D — e.g. "Understanding my plan options"]</button>
      </div>
    </div>

    <!-- STEP 2 — NEPQ: CONSEQUENCE question (stakes and specifics) -->
    <div class="gh-qstep" data-s="2">
      <!-- Example: "Have you compared Medicare Advantage and Medigap?"
           Options: "Not yet" / "I've tried but I'm confused" / "Yes, want a second opinion" / "What's the difference?" -->
      <span class="gh-qquestion">[Q3 — CONSEQUENCE: decision stakes. e.g. "Have you compared Medicare Advantage and Medigap?"]</span>
      <div class="gh-qopts">
